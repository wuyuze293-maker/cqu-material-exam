<script type="application/json" id="t-data">[["晶体","原子按一定方式在三维空间内周期性地规则重复排列，有固定熔点、各向异性。"],["中间相","两组元A和B组成合金时，除了形成以A为基或以B为基的固溶体外，还可能形成晶体结构与A，B两组元均不相同的新相。由于它们在二元相图上的位置总是位于中间，故通常把这些相称为中间相。"],["配位数","晶体结构中任一原子周围最近邻且等距离的原子数。"],["有序固溶体","当一种组元溶解在另一组元中时，各组元原子分别占据各自的布拉维点阵的一种固溶体，形成一种各组元原子有序排列的固溶体，溶质在晶格完全有序排列。"],["非晶体","原子没有长程的周期排列，无固定的熔点，各向同性等。"],["致密度","晶体结构中原子体积占总体积的百分数。"],["间隙相","当非金属（X）和金属（M）原子半径的比值rX/rM<0.59时，形成的具有简单晶体结构的相，称为间隙相。"],["点阵畸变","在局部范围内，原子偏离其正常的点阵平衡位置，造成点阵畸变。"],["置换固溶体","当溶质原子溶入溶剂中形成固溶体时，溶质原子占据溶剂点阵的阵点，或者说溶质原子置换了溶剂点阵的部分溶剂原子，这种固溶体就称为置换固溶体。"],["间隙固溶体","溶质原子分布于溶剂晶格间隙而形成的固溶体称为间隙固溶体。"],["超结构","有序固溶体在X射线衍射图上会产生额外的衍射线条，称为超结构线，具有超结构线的有序固溶体称为超结构。"],["固溶体","以某一组元为溶剂，在其晶体点阵中溶入其他组元原子（溶质）所形成的均匀混合的固态溶体，它保持着溶剂的晶体结构类型。"],["电子浓度","合金相中各组元价电子总数与原子总数之比。"],["电子化合物","由第一族或过渡族元素与第二至第五族元素形成的金属间化合物，其晶体结构由电子浓度决定，不遵守原子价规律。"],["正常价化合物","符合原子价规律的金属间化合物，由电负性差较大的元素形成，可用分子式表示，如Mg2Si。"],["拓扑密堆相","由两种大小不同的原子所构成的密堆结构，配位数可高达12、14、15、16，如Laves相、σ相、μ相等。"],["间隙化合物","当非金属原子半径与金属原子半径之比rX/rM>0.59时，形成的具有复杂晶体结构的化合物，如Fe3C、Cr23C6等。"],["固溶强化","溶质原子溶入基体中，由于溶质原子与基体原子尺寸不同或弹性模量不同，引起晶格畸变，阻碍位错运动，从而提高合金强度和硬度的现象。"],["空位","晶体中原子脱离正常格点后留下的空结点，是热力学平衡的点缺陷。"],["位错","晶体中已滑移区和未滑移区的分界线，是一种线缺陷。位错的运动导致晶体塑性变形。"],["柏氏矢量","描述位错引起的晶格畸变程度和方向的矢量，是位错的特征矢量。用柏氏回路确定。"],["刃型位错","位错线与柏氏矢量垂直的位错，有多余的半原子面，可滑移和攀移。"],["螺型位错","位错线与柏氏矢量平行的位错，无多余半原子面，只能滑移和交滑移，不能攀移。"],["混合位错","位错线与柏氏矢量既不平行也不垂直的位错，兼有刃型和螺型分量的特征。"],["位错密度","单位体积晶体中位错线的总长度，单位为cm/cm³或cm⁻²。"],["堆垛层错","晶体中正常堆垛次序发生错误的一种原子组态，属于面缺陷。FCC中正常为ABCABC，层错可能是ABABC等。"],["小角度晶界","相邻晶粒间取向差小于10°~15°的晶界，可用位错模型描述。包括倾转晶界和扭转晶界。"],["大角度晶界","相邻晶粒间取向差大于15°的晶界，不能用位错模型描述，常用CSL模型或O点阵模型。"],["相界面","两个相之间的分界面，按原子匹配程度分为共格界面、半共格界面和非共格界面。"],["扩散","原子或分子在热运动驱动下的迁移过程，宏观上表现为物质的定向输送。"],["菲克第一定律","稳态扩散时，扩散通量J与浓度梯度成正比：J=-D(dC/dx)，D为扩散系数。"],["菲克第二定律","非稳态扩散时，浓度随时间的变化率：∂C/∂t=D(∂²C/∂x²)。"],["上坡扩散","扩散沿浓度升高方向进行的现象，驱动力是化学位梯度而非浓度梯度。调幅分解是典型的上坡扩散。"],["柯肯达尔效应","在置换固溶体扩散偶中，由于两种组元扩散速率不同，标记面会向扩散较快的组元一侧移动，证明扩散通过空位机制进行。"],["扩散激活能","原子从一个平衡位置跃迁到相邻位置所需克服的能量势垒。D=D₀exp(-Q/RT)。"],["相律","吉布斯相律：f=C-P+2（常压下f=C-P+1），描述平衡系统中自由度、组元数和相数之间的关系。"],["匀晶相图","两组元在液态和固态均能无限互溶的相图，具有液相线和固相线。"],["共晶相图","两组元在液态无限互溶而在固态有限互溶（或不溶），冷却时发生共晶反应L→α+β的相图。"],["包晶相图","两组元在液态无限互溶而在固态有限互溶，冷却时发生包晶反应L+α→β的相图。"],["杠杆定律","在两相区内，用于计算两平衡相相对量的工具：两相的质量分数与它们到合金成分点的距离成反比。"],["共晶反应","在恒定温度下，液相同时转变为两个固相的反应：L→α+β。Fe-C中共晶：L(4.3%C)→γ(2.11%C)+Fe₃C，1148°C。"],["共析反应","在恒定温度下，一个固相同时转变为两个固相的反应：γ→α+β。Fe-C中共析：γ(0.77%C)→α(0.0218%C)+Fe₃C，727°C。"],["包晶反应","在恒定温度下，液相与一个固相反应生成另一个固相：L+α→β。Fe-C中：L(0.53%C)+δ(0.09%C)→γ(0.17%C)，1495°C。"],["珠光体","铁素体(α)和渗碳体(Fe₃C)片层交替排列的机械混合物，含碳0.77%，由奥氏体在727°C共析分解得到。"],["莱氏体","奥氏体和渗碳体的机械混合物，含碳4.3%，由液相在1148°C共晶反应得到。室温下奥氏体变为珠光体，称为变态莱氏体。"],["马氏体","碳在α-Fe中的过饱和间隙固溶体，体心正方结构(BCT)，由奥氏体以无扩散切变方式转变得到，硬而脆。"],["贝氏体","过冷奥氏体在中温区转变的产物，上贝氏体呈羽毛状（碳化物在铁素体条间），下贝氏体呈针状（碳化物在铁素体内）。"],["铁素体","碳在α-Fe中的间隙固溶体，BCC结构，碳的最大溶解度0.0218%（727°C），软而韧。"],["奥氏体","碳在γ-Fe中的间隙固溶体，FCC结构，碳的最大溶解度2.11%（1148°C），塑性好，无磁性。"],["渗碳体","铁与碳形成的间隙化合物Fe₃C，含碳6.69%，硬而脆，是碳钢中的重要强化相。"],["形核","凝固或相变的第一步，新相在母相中形成稳定核心的过程。分为均匀形核和非均匀形核。"],["均匀形核","在均匀的母相中，依靠自身结构起伏和能量起伏形成晶核的过程，需要较大的过冷度。"],["非均匀形核","在母相中的杂质、模壁等外来表面上形成晶核的过程，临界形核功小于均匀形核，所需过冷度较小。"],["临界晶核半径","晶核半径等于r*时，晶核的生成和消失概率相等。r<r*时晶核不稳定会熔化，r>r*时晶核可稳定长大。"],["成分过冷","凝固时由于界面前沿溶质富集导致液相线温度降低，当实际温度低于液相线温度时产生的过冷，是决定晶体生长形态的关键因素。"],["平衡分配系数","k₀=C_s/C_L，固相溶质浓度与液相溶质浓度之比。k₀<1时凝固前沿溶质富集，k₀>1时贫化。"],["枝晶偏析","由于非平衡凝固时溶质在固液界面分配不均匀，导致晶粒内部成分不均匀（枝干与枝间成分不同），属于显微偏析，可通过扩散退火消除。"],["滑移","晶体的一部分相对于另一部分沿特定晶面（滑移面）和晶向（滑移方向）发生的相对移动，是塑性变形的主要方式。"],["孪生","晶体在切应力作用下沿孪晶面和孪生方向发生的均匀切变，变形部分与未变形部分呈镜面对称，通常发生在滑移困难时。"],["临界分切应力","使滑移系开动所需的最小分切应力τ_c，由Schmid定律τ_c=σ·cosφ·cosλ确定，是材料的本征参数。"],["施密特定律","τ_c=σ·cosφ·cosλ=σ·m，当作用于滑移方向上的分切应力达到临界值时滑移开始。m=cosφ·cosλ为施密特因子。"],["加工硬化","金属在塑性变形过程中，随变形量增加，强度和硬度升高，塑性和韧性下降的现象。微观原因是位错密度增加和相互缠结。"],["回复","冷变形金属在低温加热时，点缺陷运动消失、位错重新排列（多边形化）的过程，性能变化小，不涉及大角度晶界迁移。"],["再结晶","冷变形金属加热到一定温度后，通过大角度晶界迁移，无畸变的新晶粒取代变形组织的过程。驱动力是变形储存能，不是相变。"],["二次再结晶","一次再结晶完成后，少数大晶粒吞并小晶粒导致晶粒异常长大的现象，驱动力是晶界能降低，通常因正常晶粒长大受抑制而发生。"],["晶粒长大","再结晶完成后，晶粒尺寸随加热温度升高或保温时间延长而增大的过程，驱动力是晶界能降低。"],["热加工","在再结晶温度以上进行的塑性加工，变形同时发生动态回复或动态再结晶，不产生加工硬化。"],["冷加工","在再结晶温度以下进行的塑性加工，产生加工硬化，强度和硬度升高，塑性降低。"],["Hall-Petch公式","σ_s=σ₀+k·d^(-1/2)，描述多晶体屈服强度与晶粒尺寸的关系。晶粒越细，强度越高。细晶强化是唯一同时提高强度和塑性的方法。"],["弹性模量","材料在弹性变形阶段应力与应变的比值(E=σ/ε)，反映原子间结合力的强弱，是对组织不敏感的力学性能参数。"],["屈服强度","材料发生屈服（开始产生明显塑性变形）时的应力。有明显屈服点的材料取下屈服点，无明显屈服点的取σ_0.2（产生0.2%残余应变时的应力）。"],["抗拉强度","材料在拉伸断裂前承受的最大载荷对应的工程应力σ_b=F_max/A₀，在应力-应变曲线上对应于颈缩开始点。"],["延伸率","δ=(l₁-l₀)/l₀×100%，试样拉断后标距的伸长量与原始标距的百分比，反映材料的塑性。"],["硬度","材料抵抗局部压入变形的能力。常用有布氏硬度(HB)、洛氏硬度(HR)、维氏硬度(HV)等，是非破坏性检测方法。"],["断裂韧性","含裂纹材料抵抗裂纹失稳扩展的能力，用K_IC（平面应变断裂韧性）表示。当K_I≥K_IC时裂纹失稳扩展。"],["疲劳","材料在交变应力（或应变）作用下，经多次循环后发生断裂的现象。疲劳断裂应力远低于静载强度。"],["蠕变","材料在恒定应力（通常<σ_s）作用下，随时间的延长发生缓慢塑性变形的现象。通常T≥0.3~0.5T_m时显著。"],["韧性","材料在断裂前吸收能量的能力，通常用冲击功(A_K)或断裂韧性(K_IC)来表示，是强度和塑性的综合表现。"],["冲击韧性","材料抵抗冲击载荷的能力，用摆锤式冲击试验（夏比V型缺口）测定冲击功A_KV或冲击韧性a_k。"],["韧脆转变温度","材料从韧性断裂转变为脆性断裂的温度。BCC金属（如低碳钢）有明显的韧脆转变温度，FCC金属几乎没有。"],["热处理","将固态金属或合金通过加热、保温和冷却，改变其内部组织，从而获得所需性能的工艺。四把火：退火、正火、淬火、回火。"],["退火","将金属加热到适当温度保温后缓慢冷却（炉冷）的热处理工艺，目的是降低硬度、消除内应力、细化组织。"],["正火","将钢加热到Ac₃/Ac_cm以上30~50°C保温后空冷的热处理，得到的组织比退火态更细，硬度更高。"],["淬火","将钢加热到奥氏体区后以大于临界冷却速度急冷，获得马氏体（或贝氏体）组织的热处理，目的是大幅提高硬度和强度。"],["回火","将淬火钢加热到A₁以下温度保温后冷却的热处理，消除淬火内应力，调整硬度与韧性的配合。"],["淬透性","钢在淬火时获得马氏体的能力，以马氏体层的深度衡量。C曲线越右移，临界冷却速度越小，淬透性越好。"],["淬硬性","钢淬火后能达到的最高硬度，主要取决于马氏体的含碳量，与淬透性是不同的概念。"],["调质处理","淬火+高温回火（500~650°C）的复合热处理，获得回火索氏体组织，具有良好的综合力学性能。"],["时效","过饱和固溶体在室温或加热过程中发生脱溶分解，析出第二相，使合金强度和硬度升高的现象。铝合金可通过时效强化。"],["固溶处理","将合金加热到单相区保温使第二相充分溶解，然后快速冷却获得过饱和固溶体的处理，是时效强化的预备工序。"],["金属键","金属原子的最外层电子很少，且价电子极易挣脱原子核的束缚而成为自由电子，并在整个晶体内运动，即弥漫于金属正离子组成的晶格之中形成电子云。这种由金属中的自由电子与金属正离子相互作用所构成的键合，称为金属键。"],["离子键","金属原子失去最外层的价电子后成为带正电的正离子，而非金属原子得到价电子后成为带负电的负离子，这样正、负离子依靠相互间的静电引力结合在一起，形成了离子键。\n1.2.3 共价键"],["共价键","由两个或多个电负性相差不大的原子，通过共用电子对（电子云重叠）形成的化学键。根据共用电子对在两成键原子之间是否偏离或偏近某一个原子，共价键又分为非极性共价键和极性共价键两种。"],["范德瓦耳斯力","对于电中性的原子或分子，其内部会由于各种原因出现正、负电荷中心不重合，形成电偶极矩，依靠这种微弱的偶极吸引力将原子或分子结合起来的键合，称为范德瓦耳斯力。它包括静电力、诱导力、色散力。\n1.2.5 氢键"],["布拉维点阵（空间点阵","将实际晶体结构看成完整无缺的理想晶体，并将其中每个质点抽象为规则排列于空间的阵点，每个阵点具有相同的周围环境，由阵点在三维空间做周期性规则排列而形成的三维阵列即为空间点阵，简称点阵。布拉维通过数学方法推导得出，三维空间点阵类型只有14种，即14种布拉维点阵。"],["单胞与复合单胞","在空间点阵中选取一个能够反映其特点的最小单元（一般为体积最小、对称性最高的平行六面体），即布拉维格子，仅在8个顶角上有阵点的单胞称为简单单胞，其单胞内平均只有一个阵点。除8个顶角外，在其他位置（如面心、体心或底心等处）也分布着阵点的单胞称为复合单胞。\n2.1.3 晶系与布拉维点阵"],["晶带及晶带轴、共带面","所有平行或相交于同一直线的晶面构成一个晶带，此直线称为晶带轴，属于此晶带的晶面称为共带面。"],["同素异构转变","某些固态金属在不同的温度和压力下具有不同的晶体结构，这种性质称为多晶型性，这种类型的转变称为同素异构转变，转变的产物称为同素异构体。"],["固溶体","以某一组元为溶剂，在其晶体点阵中溶入其他组元原子（溶质原子）所形成的均匀混合的固态溶体。其最大的特点是保持了原溶剂的晶体结构类型。"],["中间相","当两组元A和B按一定的比例形成合金相时，除了形成以A为基或以B为基的固溶体（端际固溶体）外，还可能形成晶体结构与组元均不相同的新相，由于它们位于二元相图的中间，通常称为中间相，又称为金属间化合物。"],["肖特基缺陷、弗仑克尔缺陷","（1）肖特基缺陷：离开平衡位置的原子迁移到晶体表面或内表面的正常结点位置上，使晶体内部留下空位。\n（2）弗仑克尔缺陷：离开平衡位置的原子挤入点阵的间隙位置，在晶体中同时形成数目相等的空位和间隙原子。"],["再结晶","冷变形金属加热退火过程中，出现无畸变的等轴新晶粒，并逐步取代全部变形晶粒的过程。在再结晶阶段，首先在畸变度大的区域产生新的无畸变晶粒的核心，然后核心通过逐渐消耗周围的变形基体长大，直至形变组织完全改组为新的、无畸变的等轴细晶粒。"],["冷加工、温加工和热加工","冷加工：在再结晶温度以下，而又不加热的加工过程。\n温加工：在再结晶温度以下，且高于室温的加工过程。\n热加工：在再结晶温度以上进行的加工过程。"],["平衡凝固与非平衡凝固","平衡凝固：凝固过程中每个阶段都能达到平衡，液固两相成分分别沿液相线和固相线变化，需要极缓慢冷却。\n非平衡凝固：实际凝固过程中，固液相之间溶质重新分布不充分、不均匀，扩散不完全。"],["热过冷和成分过冷","热过冷：液态金属中的实际温度低于理论凝固温度 $ T_m $ 导致的过冷。\n成分过冷：固溶体合金凝固时，界面前沿液相溶质分布改变液相理论凝固温度，使实际温度低于该凝固温度而产生的过冷。"],["相区接触法则","两个单相区之间必定有一个由该两相组成的两相区把它们分开，两个两相区必须以单相区或三相线水平隔开，即二元相图中相邻相区的相数差为1（点接触除外），这一规则称为相区接触法则。\n8.2 匀晶相图\n8.2.1 相图分析\n8.2.2 平衡凝固过程分析\n8.2.3 非平衡凝固过程分析"],["共晶转变、共晶组织。(2","共晶转变：一个确定成分的液相在确定的温度下，同时结晶出两个确定成分的固相的转变。反应式：$ L + $。\n共晶组织：经共晶转变产生的两个固相的混合物，又称共晶体，多为片层状或棒状。"],["伪共晶","在平衡凝固条件下，只有共晶成分的合金才能获得100%的共晶组织。而在非平衡凝固条件下，成分在共晶点附近的亚共晶或过共晶合金也能得到全部共晶组织，这种由非共晶成分的合金得到的全部共晶组织称为伪共晶组织。"],["离异共晶","在共晶组织非常少而初生相数量较多的情况下，有时共晶组织中的α相（或β相）会依附于初生α相（或β相），将共晶体中的另一相推至最后凝固的晶界处，从而使共晶组织特征消失，这种两相分离的共晶称为离异共晶。\n8.4 包晶相图\n8.4.1 相图分析\n8.4.2 平衡凝固过程与组织\n8.4.3 非平衡凝固与包晶偏析"],["包晶偏析","包晶转变的产物β相包围着初生相α生长，使液相与α相隔开，阻止了液相和α相之间原子的直接相互扩散。由于原子在β相中的扩散速度慢，包晶转变缓慢。快速冷却时包晶反应不完全，在低于包晶温度下同时存在参与转变的液相和α相，这种由于包晶转变的不完全性而产生的组织变化与成分偏析，称为包晶偏析。"],["成分三角形","对于三元系合金，取等边三角形ABC，三角形的3个顶点表示纯组元A、B、C，三角形的3条边表示3个二元系合金A-B、B-C、C-A的成分，三角形内的任一点表示含有三个组元的三元系合金。此三角形称为成分三角形或浓度三角形。\n9.1.2 三元相图的空间模型"],["单变量线","在三元相图的相界线中，只有一个独立变量的相界线称为单变量线。通常是指三相平衡时，随着温度变化，液相成分变化的轨迹。\n9.1.3 等温截面与垂直截面"],["重心法则和直线法则","直线法则：在一定温度下，三元系合金出现两相平衡时，合金的成分点、两个平衡相的成分点必定位于成分三角形内的同一条直线上（三点共线）。\n重心法则：在一定温度下，某成分的三元合金处于三相平衡时，合金的成分点必定位于三个平衡相的成分点连线构成的三角形质量重心。"],["一级相变、二级相变","一级相变：相变时新相和旧相的化学势相等，但化学势的一阶偏导数不相等。伴随熵变和体积变化，有潜热。\n二级相变：相变时新相和旧相的化学势相等，化学势的一阶偏导数也相等，但二阶偏导数不相等。熵和体积不变，比热容、压缩系数、膨胀系数变化。"],["扩散型相变、切变型相变（非扩散型相变","扩散型相变：相变过程中，新相的形核和长大主要依靠原子长距离扩散进行，相界面非共格。如珠光体转变。\n切变型相变（非扩散型相变）：新相长大通过母相原子集体有规则切变式位移，无扩散，相界面共格，成分不变。如马氏体转变。"],["时效强化","过饱和固溶体在室温或较高温度下保温，发生脱溶析出细小弥散的沉淀相，使合金强度、硬度升高的现象称为时效强化。"],["马氏体相变","钢从奥氏体状态快速冷却（淬火），抑制扩散性分解，在较低温度下（低于 $ M_s $ 点）发生无扩散型相变，依靠原子协同切变进行点阵重构，形成马氏体。这种无扩散型相变称为马氏体转变。"],["贝氏体相变","钢从奥氏体过冷到 $ B_s M_s $ 温度范围内等温，发生的中温转变。无铁原子扩散，靠切变进行点阵重构，碳原子扩散形成碳化物析出，最终得到非片层排列的铁素体与碳化物两相组织。"],["非晶态合金","金属的熔体通过液态急冷等方法，抑制结晶过程，使原子排列呈短程有序、长程无序的玻璃态，这种非晶态金属称为金属玻璃。"],["非晶、准晶、纳米晶","非晶：原子排列短程有序、长程无序的固体。\n准晶：具有长程有序但无平移对称性（有五次或更高次对称轴）的固体。\n纳米晶：至少一个维度尺寸为纳米级（<100nm）的晶体材料，晶界占比高。"]]</script>
<script type="application/json" id="n-data">[["Cu为面心立方（FCC）结构，晶格常数 a = 2×√2×r","代入 r = 0.128 nm = 0.128×10^-9 m，得 a = 2×√2×0.128×10^-9 ≈ 0.362×10^-9 m 晶胞体积 V = a³ = (0.362×10^-9)³ ≈ 4.75×10^-29 m³","c1"],["Mn的同素异构体有一为立方结构，其晶格常数为0.632 nm，密度ρ为7.26 g/cm³，原子半径r为0.112 nm。问Mn晶胞中有几个原子，其致密度为多少？","晶胞原子数 n = (ρ×a³×Nₐ)/M，Mn的M=54.94 g/mol，代入得 n = (7.26×(0.632×10⁻⁷)³×6.023×10²³)/54.94 ≈ 20 致密度 K = (n×(4/3)πr³)/a³，代入得 K = (20×(4/3)π×(0.112×10⁻⁷)³)/(0.632×10⁻⁷)³ ≈ 0.68 归纳总结三种典型的金属晶体结构的晶体学特征。 结构类型 点阵常数 原子半径 晶胞原子数 配位数 致密度 密排面 密排方向 体心立方（BCC） a=b=c (√3×a)/4 2 8（或14） 0.68 {110} <111> 面心立方（FCC） a=b=c (√2×a)/4 4 12 0.74 {111} <110> 密排六方（HCP） a₁=a₂=a₃≠c（c/a=1.633） a/2 6 12 0.74 {0001} <1120> 比较说明间隙固溶体、间隙相和间隙化合物的特点。 间隙固溶体：溶质原子嵌入溶剂晶格间隙，保持溶剂晶体结构，固溶度小，强化效果源于晶格畸变； 间隙相：过渡金属与C、N等小原子形成，晶体结构简单（如NaCl型），熔点硬度高，金属键+共价键； 间隙化合物：过渡金属与C等形成，晶体结构复杂（如Fe₃C），熔点硬度较高，脆性较大，共价键+金属键。","c1"],["金属的3种常见晶体结构中，不能作为一种空间点阵的是哪种结构？试解释之。","密排六方（HCP）结构。原因：HCP的原子堆垛方式为ABAB…，其阵点周围环境不完全相同，不符合空间点阵“阵点周围环境一致”的要求，其空间点阵为简单六方。 空间点阵和晶体结构的区别与联系。 区别：空间点阵是抽象的几何点阵列（阵点），无具体原子；晶体结构是阵点上放置原子/离子/分子后的实际结构； 联系：晶体结构 = 空间点阵 + 基元（原子/离子/分子），空间点阵是晶体结构的几何抽象。","c1"],["晶体和非晶体区别与联系是什么？","区别：晶体原子长程有序，有固定熔点，各向异性；非晶体原子长程无序、短程有序，无固定熔点，各向同性； 联系：在一定条件下可相互转化（如金属玻璃晶化、晶体非晶化）。","c1"],["原子间的结合键共有几种？各自的特点如何？","离子键：正负离子通过静电引力结合，无方向性、饱和性，键能高，材料熔点硬度高、脆性大、绝缘； 共价键：原子共用电子对，有方向性、饱和性，键能高，材料熔点硬度高、部分为半导体（如Si）； 金属键：自由电子与正离子相互作用，无方向性、饱和性，键能中等，材料导电导热性好、延展性好； 范德瓦耳斯键：分子间偶极引力，无方向性、饱和性，键能低，材料熔点硬度低； 氢键：H原子与电负性大的原子间作用，有方向性、饱和性，键能较低，影响材料熔点、溶解性（如H₂O）。 在立方晶胞中画出下列晶向：[110]；[1₂̄1]；[012]；[133]；[123]；[103]。 绘图核心：以晶胞顶点为原点，沿坐标轴按指数比例取点，连接原点与目标点即为晶向（示例：[110]为从原点(0,0,0)到(1,1,0)的矢量）。 在立方晶胞中画出下列晶面：(011)；(112)；(102)；(131)；(122)；(123)。 绘图核心：求晶面在x、y、z轴截距，连接截距点形成晶面（示例：(011)截距为x=∞、y=1、z=1，平行x轴的平面）。 试证明在理想的密排六方晶体结构中，底面边长a和高c的关系为：c/a=1.633。 理想HCP中，上下底面原子与中间层原子相切，底面原子间距a=2r，中间层原子到上下底面原子的距离为√[(c/2)² + (a/√3)²] = 2r 代入a=2r，解得 c = 2×√[(2r)² - (a/√3)²] = 2×√[a² - a²/3] = (2√6/3)a ≈ 1.633a，故c/a=1.633。","c1"],["在面心立方的(111)密排面上，有哪些密排方向？","密排方向为<110>晶向族，包括[110]、[101]、[011]、[1̄10]、[1̄01̄]、[01̄1̄]。 简要解释为什么α-Fe致密度比γ-Fe小，但α-Fe溶解碳比γ-Fe少得多。 α-Fe为BCC结构，致密度0.68，间隙为四面体（0.291R）和八面体（0.154R），八面体间隙不对称且小； γ-Fe为FCC结构，致密度0.74，八面体间隙（0.414R）大且对称，C原子易嵌入，故γ-Fe固溶度（2.11wt.%）远大于α-Fe（0.0218wt.%）。","c1"],["在铅的(100)平面上，1 mm²有多少原子？已知铅为FCC面心立方结构，其原子半径r=0.175×10^-6 mm。","FCC晶格常数 a=2×√2×r=2×√2×0.175×10^-6≈0.495×10^-6 mm (100)面原子数：顶角4个（每个占1/4）+面心1个，总原子数=4×(1/4)+1=2 (100)面面积 a²=(0.495×10^-6)²≈0.245×10^-12 mm² 1 mm²原子数=1 / (0.245×10^-12) ×2≈8.16×10^12 个 锆（Zr）具有HCP结构，密度为6.51 g/cm³，M_Zr=91.22 g/mol。(a)计算晶胞体积；(b)如果c/a为1.593，计算c和a。 (a) HCP晶胞原子数n=6，晶胞体积 V=(n×M)/(ρ×Nₐ)=(6×91.22)/(6.51×6.023×10²³)≈1.39×10^-22 cm³=139 nm³ (b) HCP晶胞体积 V=(3×√3/2)×a²×c，c=1.593a，代入得 139=(3×√3/2)×a²×1.593a，解得a≈3.23 nm，c=1.593×3.23≈5.15 nm 下列合金相为何种类型：Cr₇C₃、Mg₂Pb、WC、FeAl、Cu₃Al、Fe₄N、Fe₃C。 Cr₇C₃：复杂间隙化合物；Mg₂Pb：正常价化合物；WC：简单间隙相；FeAl：电子化合物；Cu₃Al：电子化合物；Fe₄N：间隙相；Fe₃C：复杂间隙化合物。","c1"],["形成无限固溶体和有序固溶体的必要条件分别是什么？","无限固溶体：晶体结构相同、原子半径差<15%、电负性相近、电子浓度匹配； 有序固溶体：异类原子间结合力大于同类原子间、成分符合一定化学计量比（如Cu₃Au）、低温条件。 计算Fe在850℃时，每立方米体积中的空位数。已知Fe在850℃时的空位形成能、密度及原子质量分别为1.08 eV/atom、7.65 g/cm³、55.85 g/mol。 单位体积原子数 N=(ρ×Nₐ)/M=(7.65×6.023×10²³)/55.85≈8.2×10²² cm⁻³=8.2×10²⁸ m⁻³ 空位浓度 Nv/N = exp(-Qv/(kT))，Qv=1.08 eV=1.08×1.6×10^-19 J，k=8.62×10^-5 eV/(atom·K)，T=850+273=1123 K 代入得 Nv/N=exp(-1.08/(8.62×10^-5×1123))≈exp(-11.1)≈1.6×10^-5，故Nv=8.2×10²⁸×1.6×10^-5≈1.3×10²⁴ m⁻³ 纯Cu的空位形成能是1.5 aJ/atom（1 aJ=10^-18 J），将纯Cu加热到850℃后激冷到室温（20℃），如果高温下的空位全部保留，试求过饱和空位浓度与室温平衡空位浓度的比值。 比值 Nv(高温)/Nv(室温) = exp[-Qv/k(1/T高温 - 1/T室温)] Qv=1.5×10^-18 J，T高温=850+273=1123 K，T室温=20+273=293 K，k=1.38×10^-23 J/(atom·K) 代入得 exp[-1.5×10^-18/(1.38×10^-23)×(1/1123 - 1/293)]≈exp(34.5)≈1.1×10^15 判断以下位错反应能否进行。 位错反应条件：①柏氏矢量守恒（b₁+b₂=b₃）；②能量降低（|b₁|²+|b₂|²>|b₃|²） (1) (a/2)[101] + (a/6)[121] → (a/3)[11̄1]柏氏矢量守恒：(a/2+a/6, 0+a/6, a/2+a/6)=(2a/3, a/6, 2a/6)≠(a/3, a/3, -a/3)，不守恒，反应不能进行。 (2) (a/3)[112] + (a/6)[111] → (a/2)[111]柏氏矢量守恒：(a/3+a/6, a/3+a/6, 2a/3+a/6)=(a/2, a/2, 5a/6","c1"],["在晶体的同一滑移面上有两个半径分别为r₁和r₂的位错环，其中r₁>r₂，它们的柏氏矢量相同，试问在切应力作用下何者更容易运动？为什么？","r₂（小半径位错环）更容易运动。 原因：位错线弯曲的曲率半径R与切应力τ的关系为τ=Gb/(2R)，半径越小，曲率半径R越小，所需切应力越小，故小半径位错环更易运动。","c5"],["如果对铜单晶在[112]方向施加拉力，拉伸应力为2.5×10^3 Pa，在此条件下，(a)取向因子最大的滑移系有哪几个？(b)其分切应力有多大？","(a) FCC滑移系为{111}×<110>，取向因子m=cosφcosλ（φ为拉力轴与滑移面法线夹角，λ为拉力轴与滑移方向夹角），最大m对应的滑移系为(11̄1)[101]、(1̄11)[011]等（具体需计算各滑移系m值）。 (b) 分切应力τ=σ×m，若m_max=0.5（FCC最大取向因子），则τ=2.5×10^3×0.5=1.25×10^3 Pa 简要分析金属的层错能与扩展位错的关系。 层错能越低，扩展位错的平衡宽度d越大（d=Gb₁b₂/(2πγ)），扩展位错越稳定，交滑移越困难； 层错能越高，扩展位错易收缩成全位错，交滑移容易进行。","c5"],["试分析在(11̄1)面上运动的柏氏矢量为(a/2)[1̄10]的螺型位错受阻时，能够通过交滑移转移到(111)、(1̄11)、(1̄1̄1)面中的哪个面上继续运动？为什么？","能转移到(111)面。 原因：交滑移要求新滑移面与原滑移面共含柏氏矢量，(11̄1)与(111)的交线为[1̄10]（柏氏矢量方向），满足共含条件，故可交滑移；其他面与原滑移面不共含柏氏矢量，无法交滑移。 给出位错运动的点阵阻力与晶体结构的关系式，说明为什么晶体滑移通常发生在原子最密排的晶面和晶向。 点阵阻力（派-纳力）τ_P-N=αGexp(-2πd/((1-ν)b))，其中d为晶面间距，b为柏氏矢量，α为常数。 密排面d最大，密排方向b最小，代入公式得τ_P-N最小，滑移阻力最小，故滑移优先发生在密排面和密排方向。 单晶体Zn在拉伸之前的滑移方向与拉伸轴的夹角为45°，拉伸后滑移方向与拉伸轴的夹角为30°，求拉伸后的断后伸长率。 滑移方向旋转规律：L₀/L=cos45°/cos30°，断后伸长率δ=(L-L₀)/L₀=(cos45°/cos30° - 1)^-1≈(0.707/0.866 - 1)^-1≈63.4% 已知平均晶粒直径为1mm和0.0625mm的α-Fe的屈服强度分别为112.7MPa和196MPa，问平均晶粒直径为0.0196mm的α-Fe的屈服强度为多少。 霍尔-佩奇公式：σ_s=σ₀ + kd^(-1/2) 代入数据：112.7=σ₀ + k×(1×10^-3)^(-1/2)；196=σ₀ + k×(0.0625×10^-3)^(-1/2) 解得σ₀≈70.3 MPa，k≈1.39 MPa·m^(1/2) 当d=0.0196×10^-3 m时，σ_s=70.3 + 1.39×(0.0196×10^-3)^(-1/2)≈384 MPa 试指出Cu和α-Fe两晶体易滑移的晶面和晶向，并求出他们的滑移面间距，滑移方向上的原子间距。","c5"],["Cu（FCC）：易滑移晶面{111}，滑移面间距d= a/√3（a=0.362 nm）≈0.209 nm；易滑移晶向<110>，原子间距b= a√2/2≈0.256 nm。","α-Fe（BCC）：易滑移晶面{110}，滑移面间距d= a/√2（a=0.286 nm）≈0.202 nm；易滑移晶向<111>，原子间距b= a√3/2≈0.248 nm。","c5"],["今有纯Ti、Al、Pb这3种铸锭，试判断它们在室温轧制的难易顺序，分析是否可以连续轧制？如果不能，应采取什么措施才能使之轧制成薄板。","室温轧制难易顺序：Pb > Al > Ti 分析：Pb再结晶温度低（-33℃），室温为热加工，可连续轧制；Al再结晶温度423K（150℃），室温为冷加工，加工硬化后需中间退火才能连续轧制；Ti室温下为HCP结构，滑移系少，塑性差，不能直接室温轧制。 措施：Ti需加热至883℃以上（转变为BCC结构，滑移系增多）进行热加工，或采用温加工+中间退火。 铁的回复激活能为88.9kJ/mol，如果经冷变形的铁在400℃进行回复处理，使其残留加工硬化为60%需160min，问在450℃回复处理至同样效果需要多少时间。 回复动力学公式：ln(t₂/t₁)=Q/R(1/T₂ - 1/T₁) Q=88900 J/mol，R=8.31 J/(mol·K)，T₁=400+273=673 K，T₂=450+273=723 K ln(t₂/160)=88900/8.31×(1/723 - 1/673)≈-1.05，t₂≈160×0.349≈55.8 min 简述一次再结晶与二次再结晶的驱动力。 一次再结晶驱动力：冷变形金属的储存能（畸变能），新晶粒取代变形晶粒以降低能量。 二次再结晶驱动力：一次再结晶后细小晶粒的晶界能，大晶粒吞并小晶粒以减少晶界面积，降低总能量。","c5"],["动态再结晶与静态再结晶后的组织结构的主要区别是什么？","动态再结晶：晶粒细小、等轴，晶内有变形亚结构（位错胞），晶粒尺寸均匀； 静态再结晶：晶粒较粗大，晶内无变形亚结构，晶粒尺寸易出现不均匀（若发生二次再结晶）。","c5"],["在一个FCC金属中，一个螺型位错接近一个障碍物并暂时钉扎于此。当应力增加后，螺型位错可以通过交滑移越过障碍物。(a)如果同样的螺型位错在初始时分解为两个部分位错，此时交滑移能否发生？为什么能或为什么不能？(b)这一障碍物是在铜（低层错能）还是在铝（高层错能）中更有效？","(a) 不能。原因：分解后的扩展位错由两个不全位错+层错组成，层错阻碍位错交滑移，需先收缩成全位错才能交滑移，故分解后无法直接交滑移。 (b) 在铜中更有效。原因：铜层错能低，扩展位错宽度大，难收缩成全位错，交滑移困难，障碍物阻碍作用更显著；铝层错能高，扩展位错易收缩，交滑移容易，障碍物作用较弱。 低于室温时，单晶体Zn产生很大的塑性变形是可能的，而对于多晶体Zn而言，在这个温度下它只能获得很小的塑性变形。请解释这一现象。 单晶体Zn：低温下虽滑移系少，但无晶界阻碍，位错可沿唯一滑移系滑移，产生较大塑性变形； 多晶体Zn：晶粒间需协调变形，需多个滑移系开动，而低温下Zn为HCP结构，仅3个滑移系，无法满足协调变形要求，晶界处易产生应力集中导致开裂，故塑性变形小。","c5"],["合金均匀化退火前的冷塑性变形对均匀化过程有何影响？是加速还是减缓？为什么？","加速均匀化过程。 原因：冷塑性变形产生大量晶体缺陷（位错、空位），缺陷提供扩散通道，提高原子扩散系数；同时变形储能增加，驱动力增大，故均匀化速度加快。 有一截面为10×10mm的镍基合金试样，其长度为40mm，拉伸试验结果如下表，试计算其抗拉强度R_m，弹性模量E以及断裂总延伸率A_t。 （假设试验数据：最大载荷F_max，弹性阶段应力应变数据，断裂后长度L_f） 抗拉强度R_m=F_max/(10×10×10^-6)（需F_max数据）； 弹性模量E=Δσ/Δε（取弹性阶段应力应变变化量）； 断裂总延伸率A_t=(L_f - 40)/40×100%（需L_f数据）。 试估算Fe和Cu的最低再结晶温度。 再结晶温度T_R≈(0.35~0.45)T_m（T_m为熔点，K）","c5"],["Cu的T_m=1083℃=1356 K，T_R≈0.4×1356≈542 K（269℃）。","分析纤维组织及织构是怎样形成的，其特点是什么，对金属的性能有什么影响。 形成：冷加工时，晶粒沿变形方向伸长，夹杂物、第二相沿变形方向排列形成纤维组织；晶粒择优取向形成织构。 特点：纤维组织呈纤维状，织构具有择优取向。 影响：使金属性能各向异性，沿纤维方向强度、塑性高于横向；织构可改善材料特定性能（如硅钢片磁性），但可能导致加工缺陷（如制耳）。 简要分析加工硬化、细晶强化、固溶强化及弥散强化在本质上有何异同。 相同点：均通过阻碍位错运动提高强度。 不同点：加工硬化由位错交互作用（缠结、交割）引起；细晶强化由晶界阻碍位错引起；固溶强化由溶质原子晶格畸变与位错交互作用引起；弥散强化由第二相粒子通过奥罗万机制或切割机制阻碍位错引起。","c5"],["金属铸件能否通过再结晶退火来细化晶粒？为什么？","不能。 原因：再结晶退火的前提是金属存在冷加工变形（储存能），铸件无冷加工变形，无再结晶驱动力，无法发生再结晶，故不能细化晶粒。 一种合金材料，其中稳定第二相的体积分数为2%，第二相平均尺寸为5×10^-4 mm，现供货要求材料晶粒直径不大于1mm，试分析能否达到要求。 能达到要求。 分析：第二相粒子通过齐纳钉扎阻碍晶粒长大，晶粒极限尺寸D_m=4r/(3f)，r=2.5×10^-4 mm，f=0.02，D_m=4×2.5×10^-4/(3×0.02)≈0.0167 mm < 1 mm，故第二相可有效阻碍晶粒长大，满足要求。","c5"],["如何区分冷、热加工？为什么金属材料经热加工后力学性能普遍较铸态的好？金属在热加工过程中都会发生动态再结晶吗？","区分：冷加工（T<T再结晶）：加工硬化明显，无动态再结晶；热加工（T>T再结晶）：加工硬化与动态再结晶同步，无残留加工硬化。 热加工力学性能好的原因：①焊合铸态气孔、疏松，提高致密度；②破碎粗大晶粒，细化组织；③消除偏析，均匀成分；④形成合理流线，改善力学性能。 并非都会发生动态再结晶：层错能高的金属（如Al）热加工时以动态回复为主，层错能低的金属（如Cu）易发生动态再结晶。","c5"],["残余应力有哪几类？金属材料中的残余应力有什么影响？如何消除？","分类：①宏观残余应力（整体范围平衡）；②微观残余应力（晶粒/亚晶范围平衡）；③点阵畸变（原子范围平衡）。 影响：降低材料塑性、韧性，易导致开裂；加速腐蚀；影响尺寸稳定性。 消除方法：回复退火（消除宏观和部分微观应力）、再结晶退火（消除全部残余应力）。 试设计测定金属再结晶激活能的方案。 方案：①制备多组相同冷变形量的试样；②分别在不同温度（T₁、T₂、T₃…）下进行等温再结晶退火，记录达到相同再结晶体积分数（如50%）的时间t₁、t₂、t₃…；③根据ln(t)=A+Q/(RT)，以ln(t)对1/T作图，直线斜率为Q/R，计算激活能Q。 第三部分 相图及相变基础","c5"],["什么是固溶体？按溶质原子在溶剂晶格中的位置可分为哪两类？简述其形成条件。","固溶体：溶质原子溶解在溶剂晶格中形成的单相固体，保持溶剂晶体结构。 分类：置换固溶体（溶质原子占据溶剂晶格结点）、间隙固溶体（溶质原子嵌入溶剂晶格间隙）。 形成条件：①置换固溶体：晶体结构相同、原子半径差<15%、电负性相近、电子浓度匹配；②间隙固溶体：溶质原子半径<0.59溶剂原子半径，溶剂为过渡金属。 画出二元共晶相图的示意图，标注各相区、液相线、固相线、共晶反应线及共晶点，写出共晶反应式并说明反应特点。 示意图（核心特征）：液相线（L→α、L→β）、固相线（α→L、β→L）、共晶反应线（恒温线）、共晶点E（成分C_E，温度T_E）；相区包括L、α、β、L+α、L+β、α+β。 共晶反应式：L_E → α_Cα + β_Cβ（E为共晶点，Cα、Cβ分别为α、β相的共晶成分）。 反应特点：恒温进行（f=0），三相共存，液相分解为两个固相的混合物（共晶组织）。 简述二元包晶相图的包晶反应式及反应特点，说明包晶反应与共晶反应的区别。 包晶反应式：L_CL + α_Cα → β_Cβ（CL、Cα、Cβ分别为液相、α相、β相的包晶成分）。 反应特点：恒温进行（f=0），三相共存，液相与固相α反应生成固相β，β相包裹α相生长。 区别：共晶反应是液相分解为两个固相（L→α+β）；包晶反应是液相与一个固相反应生成另一个固相（L+α→β）；共晶组织为两相混合物，包晶组织易形成单相β（若反应完全）。 某二元合金相图中存在L→α+β共晶反应，已知共晶温度为600℃，共晶点成分w(B)=30%，α相最大固溶度w(B)=10%，β相最大固溶度w(B)=90%。计算w(B)=15%的合金在室温下α相和β相的相对质量分数。 室温下α相固溶度w(B)=5%（假设冷却过程中固溶度沿固溶线下降，此处取典型值，若有具体固溶线数据按实际计算），β相固溶度w(B)=85%。 杠杆定律：w_α = (w_β - w_合金)/(w_β - w_α) = (85% - 15%)/(85% - 5%) = 87.5% w_β = (w_合金 - w_α)/(w_β - w_α) = (15% - 5%)/(85% - 5%) = 12.5%","c8"],["什么是枝晶偏析？产生原因是什么？如何消除？","枝晶偏析：固溶体合金不平衡凝固时，先结晶的枝晶轴富含高熔点组元，后结晶的枝晶间富含低熔点组元，导致成分不均匀。 产生原因：不平衡凝固时，原子扩散不充分，溶质原子无法均匀分布。 消除方法：均匀化退火（加热至固相线以下温度保温，使原子充分扩散）。 简述二元相图中“三相反应”的共同特征，写出共晶、包晶、共析三种三相反应的反应式及反应类型符号。 共同特征：恒温进行（f=0），三相共存，反应前后相数变化（共晶：1→2；包晶：2→1；共析：1→2）。 反应式及符号：①共晶反应：L→α+β（E）；②包晶反应：L+α→β（P）；③共析反应：γ→α+β（E）（共析反应为固态三相反应，温度低于共晶反应）。 现有A-B二元合金，A的熔点1000℃，B的熔点800℃，两者形成匀晶相图。计算w(B)=40%的合金在900℃时的平衡相组成及相对质量分数（假设液相线为直线，固相线为直线，900℃时液相成分w(B)=50%，固相成分w(B)=30%）。 平衡相：液相L（w(B)=50%）和固相α（w(B)=30%）。 相对质量分数：w_L = (w_α - w_合金)/(w_α - w_L) = (30% - 40%)/(30% - 50%) = 50% w_α = (w_合金 - w_L)/(w_α - w_L) = (40% - 50%)/(30% - 50%) = 50%","c8"],["什么是三元相图的投影图？简述投影图的类型及用途。","投影图：将三元相图的相界线、反应线、特殊点投影到浓度三角形上得到的图形。 类型：液相面投影图（标注液相线投影、三相反应投影线、共晶点、包晶点）、固相面投影图。 用途：快速判断合金的凝固路径、相变类型及平衡相组成，简化三维相图的分析。","c9"],["什么是形核？形核方式有哪两类？简述均质形核与异质形核的区别。","形核：液态金属中形成固态晶核的过程。 形核方式：均质形核（无外来杂质，液态金属内部自发形核）、异质形核（依附于外来杂质、模壁等形核）。 区别：①均质形核：形核功大，过冷度大（ΔT≈0.2T_m）；②异质形核：形核功小，过冷度小（ΔT≈0.02T_m），实际金属结晶多为异质形核。 写出均质形核的临界晶核半径r_k和形核功ΔG_k的计算公式，说明影响临界晶核半径和形核功的因素。 临界晶核半径：r_k = 2σL_m / (ΔHΔT)（σ为液固界面能，L_m为摩尔结晶潜热，ΔT为过冷度）。 形核功：ΔG_k = (16πσ³T_m²) / (3ΔH²ΔT²)。 影响因素：①σ增大，r_k、ΔG_k增大；②ΔT增大，r_k、ΔG_k减小；③L_m增大，r_k、ΔG_k减小。 简述晶体长大的两种主要方式（平面长大和枝晶长大），说明其发生条件及组织特征。 平面长大：①条件：过冷度小，液固界面为正温度梯度（液相温度高于固相温度）；②组织特征：晶体沿散热方向生长，界面平整，形成柱状晶或等轴晶（纯金属多为此方式）。 枝晶长大：①条件：过冷度大，液固界面为负温度梯度（固相温度高于液相温度）；②组织特征：晶体先形成主干（一次枝晶），再生长分支（二次、三次枝晶），形成枝晶组织，固溶体合金多为此方式。","c1"],["什么是铸造合金的流动性？影响流动性的因素有哪些？流动性对铸件质量有何影响？","流动性：液态合金填充铸型的能力。 影响因素：①成分：共晶成分合金流动性最好（熔点低，凝固区间窄）；②温度：浇注温度越高，流动性越好；③杂质：杂质增多，流动性下降。 对铸件质量的影响：流动性好，铸件易充型，减少缩孔、缩松、浇不足等缺陷；流动性差，易产生上述缺陷，影响铸件致密度和力学性能。 简述铸件中常见的缺陷（缩孔、缩松、气孔、偏析），说明其产生原因及防止措施。 缩孔/缩松：①原因：液态合金凝固时体积收缩，得不到补充；②防止措施：合理设计铸件结构（设置冒口）、采用顺序凝固。 气孔：①原因：液态合金中溶解的气体未及时排出，凝固时析出；②防止措施：烘干铸型、脱氧处理、控制浇注温度。 偏析：①原因：不平衡凝固，原子扩散不充分；②防止措施：均匀化退火、合理控制冷却速度。","c1"],["什么是细化晶粒？细化晶粒的方法有哪些？说明细化晶粒对材料力学性能的影响。","细化晶粒：减小铸件或锻件的晶粒尺寸，提高组织均匀性。 方法：①孕育处理（添加形核剂，促进异质形核）；②变质处理（添加变质剂，阻碍晶粒长大）；③控制冷却速度（加快冷却，增大过冷度）；④振动/搅拌（破碎晶粒）。 影响：晶粒细化后，材料强度、硬度提高（细晶强化），塑性、韧性改善（晶粒边界增多，阻碍位错运动，变形均匀）。","c1"],["影响固态扩散的因素有哪些？分别说明其对扩散系数的影响。","温度：温度升高，扩散系数D增大（D = D₀exp(-Q/R T)，Q为扩散激活能），原子热运动加剧，空位浓度增大。 成分：①组元间亲和力越大，扩散激活能Q越大，D越小；②固溶体类型：间隙固溶体中扩散系数大于置换固溶体（间隙原子尺寸小，迁移阻力小）。 晶体结构：①密排结构扩散系数小于非密排结构（原子迁移路径窄）；②晶界、位错等缺陷处扩散系数大（缺陷提供扩散通道）。 应力：拉应力促进扩散，压应力阻碍扩散（应力梯度为扩散驱动力）。","c1"],["什么是自扩散和互扩散？什么是上坡扩散？举例说明上坡扩散的产生原因。","自扩散：纯金属中原子的扩散（无浓度梯度，由热运动引起）。 互扩散：合金中不同组元的相互扩散（有浓度梯度）。 上坡扩散：原子从低浓度区向高浓度区扩散（逆浓度梯度）。 产生原因：①化学势梯度驱动（如固溶体中溶质原子富集形成有序相）；②应力梯度（如冷变形后应力松弛）；③温度梯度（热扩散）。 举例：钢的渗碳过程中，碳原子从表面（高浓度）向内部（低浓度）扩散为顺浓度梯度扩散；而某些合金中，为形成稳定化合物，溶质原子可能逆浓度梯度迁移（上坡扩散）。 简述扩散在材料科学中的应用（至少列举3种），说明扩散机制在其中的作用。 应用1：均匀化退火，利用原子扩散消除枝晶偏析，使成分均匀。 应用2：表面硬化（如钢的渗碳、渗氮），利用间隙原子扩散提高表面硬度和耐磨性。 应用3：相变过程，如奥氏体转变为珠光体，依赖碳原子和铁原子的扩散实现相结构转变。 作用：扩散机制决定了原子迁移的速率和路径，是上述工艺实现的核心（如渗碳依赖碳的间隙扩散机制，均匀化退火依赖空位机制）。 已知某金属的扩散系数D₀=1.0×10^-5 m²/s，扩散激活能Q=80 kJ/mol，计算该金属在600℃和800℃时的扩散系数（R=8.31 J/(mol·K)）。 扩散系数公式：D = D₀exp(-Q/(R T)) 600℃时：T₁=600+273=873 KD₁ = 1.0×10^-5 × exp(-80000/(8.31×873)) ≈ 1.0×10^-5 × exp(-10.9) ≈ 1.7×10^-10 m²/s 800℃时：T₂=800+273=1073 KD₂ = 1.0×10^-5 × exp(-80000/(8.31×1073)) ≈ 1.0×10^-5 × exp(-8.8) ≈ 1.5×10^-9 m²/s","c1"],["什么是晶界扩散？说明晶界扩散与体扩散的区别，简述晶界扩散的实际意义。","晶界扩散：原子沿晶界的扩散，晶界为缺陷区域，原子迁移阻力小。 区别：①扩散系数：晶界扩散系数D_b > 体扩散系数D_v（晶界原子排列疏松，激活能低）；②温度依赖性：低温下晶界扩散占主导，高温下体扩散占主导。 实际意义：①低温热处理时，晶界扩散可加速成分均匀化；②晶界扩散影响相变动力学（如晶界形核依赖原子扩散）；③晶界扩散可能导致晶界腐蚀、氧化（有害杂质沿晶界扩散）。","c1"],["写出  和  完整的电子排布式","（原子序数26）：。\n（原子序数17）：。\n1.2 原子间的键合\n1.2.1 金属键\n1.2.2 离子键\n1.2.3 共价键\n1.2.4 范德瓦耳斯力\n1.2.5 氢键\n1.2.1 金属键","c1"],["试用金属键的特点解释金属具有良好的导热性、导电性和塑性的原因","（1）良好的导热性：自由电子在运动过程中通过碰撞进行能量传递，使金属具有良好的导热性。\n（2）良好的导电性：自由电子在外加电场的作用下定向移动产生电流，使金属具有良好的导电性。\n（3）良好的塑性：金属键无方向性，当金属受力变形时，原子间的相互位置易改变且不破坏金属键，使金属具有良好的塑性。\n1.2.2 离子键","c1"],["金属具有良好的导电性、导热性、应力断裂性；而共价晶体导电导热差，塑性也差；试分析原因","金属（金属键）：① 导电性好：自由电子在外电场作用下定向移动形成电流。② 导热性好：自由电子在运动过程中通过碰撞进行能量传递。③ 塑性好：金属键无方向性和饱和性，当金属受力变形、原子间发生相对位移时，金属键不易被破坏。\n共价晶体（共价键）：① 导电、导热性差：共用电子对不能自由运动，束缚在原子周围。② 塑性差：共价键有方向性和饱和性，原子间相对位置固定，在外力作用下不易发生位移变形，否则会破坏键合，导致脆性断裂。\n1.2.4 范德瓦耳斯力","c8"],["空间点阵与晶体结构有何关系？","晶体结构和空间点阵是两个不同的概念。\n（1）空间点阵是晶体中质点排列的几何学抽象，描述了质点排列的周期性和对称性，每个阵点周围环境相同，只有14种类型。\n（2）晶体结构是指晶体中实际质点（原子、离子、分子等）的具体排列情况。\n（3）两者关系可表示为：晶体结构 = 空间点阵 + 结构基元。","c2"],["为什么密排六方不能称为空间点阵？","空间点阵中的每个阵点周围必须具有完全相同的环境。对于密排六方结构，晶胞内的原子与晶胞顶角上的原子都拥有不同的空间环境，故不能将单个原子抽象为一个阵点，因此密排六方不是一种空间点阵。应将晶胞内的原子与晶胞顶角上的原子共同抽象为一个阵点（结构基元为原子对），从而得到简单六方点阵。\n2.1.2 晶胞","c2"],["根据点阵参数之间的关系，晶系可以分为哪些类型？","根据6个点阵参数间的相互关系，可将全部空间点阵归属于7种类型，即七大晶系。","c2"],["空间点阵有几种类型？分别是什么？","空间点阵的类型有14种，具体见表。","c2"],["请简要分析没有底心四方点阵和面心四方点阵的原因","因为在所谓的底心四方和面心四方点阵中可以抽象出更符合晶胞选取规则的简单四方和体心四方点阵。\n2.2 晶向指数和晶面指数\n2.2.1 晶向指数\n2.2.2 晶面指数\n2.2.3 六方晶系的晶向指数和晶面指数\n2.2.4 晶带\n2.2.1 晶向指数","c2"],["指出FCC、BCC、HCP结构中四面体间隙和八面体间隙的数目、位置，并给出间隙大小","| 结构 | 八面体间隙 | 四面体间隙 |\n| :— | :— | :— |\n| FCC | 位置：体心和各棱中点；数目：4；大小：0.414R | 位置：各体对角线的1/4、3/4处；数目：8；大小：0.225R |\n| BCC | 位置：各面心和各棱中点；数目：6；大小：0.154R（<100>）、0.633R（<110>） | 位置：各面中线的1/4处；数目：12；大小：0.291R |\n| HCP | 位置：相间三棱柱中心线的1/4、3/4处；数目：6；大小：0.414R | 位置：①棱及中心线的3/8、5/8处；②相间三棱柱中心线的1/8、7/8处；数目：12；大小：0.225R |\n2.4 金属的晶体结构\n2.4.1 三种典型的金属晶体结构\n2.4.2 多晶型性\n2.4.1 三种典型的金属晶体结构","c1"],["γ-Fe在912℃时转变为α-Fe这种转变称为什么转变？转变后的体积膨胀还是收缩？假定铁原子半径不变，则体积变化率 $  $ 是多少？","（1）称为多晶型转变（或同素异构转变）。\n（2）γ-Fe（FCC）致密度0.74 > α-Fe（BCC）致密度0.68，转变后体积膨胀。\n（3）设原子半径为R，FCC晶胞体积 $ V_= ()^3  $（每个原子占体积），BCC晶胞体积 $ V_= ()^3  $。计算得体积膨胀率约为 9%。\n2.5 离子晶体结构\n2.5.1 离子晶体的结构规则\n2.5.2 典型的离子晶体结构\n2.5.1 离子晶体的结构规则","c1"],["简述离子晶体的结构规则（鲍林规则","（1）负离子配位多面体规则：正离子周围形成一个负离子配位多面体，正负离子距离取决于半径和，配位数取决于半径比。\n（2）电价规则：每个负离子的电价等于或接近于与之邻接的各正离子静电强度的总和。\n（3）负离子多面体共用顶、棱和面的规则：共用棱、面会降低结构稳定性，对电价高、配位数低的正离子尤为显著。\n（4）不同种类正离子配位多面体间的连接规则：高电价正离子的低配位数多面体之间尽量互不结合。\n（5）节约规则：同种正离子与同种负离子的结合方式应最大限度地趋于一致。\n2.5.2 典型的离子晶体结构","c1"],["指出金刚石结构的空间点阵类型、原子结合键类型和晶胞中的原子数、配位数","空间点阵类型：面心立方点阵。原子结合键类型：共价键。晶胞中原子数：8个。配位数：4。","c1"],["影响固溶体固溶度的因素有哪些？","① 晶体结构因素：晶体结构相同是形成无限固溶体的必要条件。\n② 原子尺寸因素：溶质与溶剂原子半径的相对差小于±14%~15%，才可能形成较大溶解度的置换固溶体。\n③ 电负性因素：电负性差越大，越倾向于形成化合物，固溶度越小。\n④ 电子浓度因素：电子浓度有一极限值（约1.4），高价组元在低价组元中的固溶度较小。\n⑤ 温度：固溶度大多随温度升高而增大。","c2"],["为什么间隙固溶体只能是有限固溶体，而置换固溶体既可以是有限固溶体也可以是无限固溶体？","间隙固溶体：溶质原子（H、C、N等小原子）进入溶剂晶格间隙，间隙尺寸有限，且溶入会引起严重晶格畸变，导致能量升高，因此溶解度很小，只能是有限固溶体。\n置换固溶体：溶质原子占据溶剂原子位置，若溶质与溶剂原子尺寸相近、晶体结构相同、电负性相近、电子浓度适当，则溶质可以任意比例溶入，形成无限固溶体；否则只能形成有限固溶体。\n2.7.2 中间相","c2"],["简述中间相的分类","中间相可分为四大类：\n（1）正常价化合物：按化学原子价规律形成，如 Mg₂Pb。\n（2）电子化合物：电子浓度决定晶体结构，如 CuZn。\n（3）与原子尺寸因素有关的化合物：包括间隙相（r_N/r_M < 0.59）、间隙化合物（r_N/r_M > 0.59）和拓扑密堆相。\n（4）有序固溶体（超结构）：长程有序的固溶体，如 Cu₃Au。","c2"],["点缺陷主要有哪些类型？","点缺陷主要包括：空位（晶格结点上缺失原子）、间隙原子（原子进入晶格间隙位置）、置换原子（外来原子占据晶格结点位置）。\n3.1.2 点缺陷的平衡浓度","c3"],["在点、线、面三种晶体缺陷中，它们在晶体中出现都是热力学稳定的吗？为什么？","（1）点缺陷是热力学稳定的。点缺陷的存在一方面使内能升高，另一方面使熵增大，自由能 $ F = U - TS $ 存在极小值，对应一定的平衡浓度。\n（2）线缺陷和面缺陷不是热力学稳定的。它们引起的应变能增加远大于熵增，自由能始终随缺陷数量增加而升高，因此是热力学不稳定的。\n3.2 线缺陷（位错）\n3.2.1 位错的基本类型\n3.2.2 伯氏矢量\n3.2.3 位错的运动\n3.2.4 位错的应力场与应变能\n3.2.5 位错与缺陷的相互作用\n3.2.6 位错的增殖\n3.2.7 实际晶体中的位错\n3.2.1 位错的基本类型","c1"],["请从原子排列、弹性应力场、滑移性质、伯氏矢量等方面对比刃型位错与螺型位错的主要特征","| 特征 | 刃型位错 | 螺型位错 |\n| :— | :— | :— |\n| 原子排列 | 存在额外半原子面，形如刀刃插入 | 滑移面上下原子错排呈螺旋状 |\n| 应力场 | 有正应力分量和切应力分量 | 纯切应力场，无正应力分量 |\n| 滑移性质 | 滑移面唯一 | 滑移面不唯一 |\n| 位错线与b的关系 | 位错线 ⊥ b | 位错线 ∥ b |\n| 运动方向与b的关系 | 滑移方向 ∥ b | 滑移方向 ⊥ 位错线（但b ∥ 位错线） |","c3"],["简述伯氏矢量的物理意义及特性","物理意义：伯氏矢量是反映位错周围点阵畸变总累积的物理量，其大小 |b| 表示畸变程度（滑移量），方向表示滑移方向。\n特性：①守恒性（与回路起点、大小、形状无关）；②唯一性（一条位错线有唯一的b）；③可加性（位错分解或合并时b满足矢量和）。\n3.2.3 位错的运动","c1"],["指出面心与体心立方金属晶体中的全位错与不全位错。（每种位错至少写出一个","面心立方（FCC）：全位错 $  $；不全位错 $    $（弗兰克不全位错）。\n体心立方（BCC）：全位错 $  $；不全位错 $  $。\n3.3 面缺陷（界面）\n3.3.1 外表面\n3.3.2 晶界\n3.3.3 孪晶界\n3.3.4 相界\n3.3.5 堆垛层错\n3.3.2 晶界","c3"],["简述大角度晶界和小角度晶界的结构模型","小角度晶界（位向差<10°）：由位错构成。包括：对称倾斜晶界（一列平行刃型位错）、不对称倾斜晶界（两组相互垂直的刃型位错）、扭转晶界（交叉螺型位错）。\n大角度晶界（位向差>10°）：原子排列较不规则。模型有：非晶态模型、过渡结构模型、小岛模型、重合位置点阵模型。","c3"],["描述晶界的特性","① 晶界处点阵畸变大，存在晶界能，有自发降低趋势。\n② 常温下阻碍位错运动，产生细晶强化；高温下晶界粘滞性导致晶粒滑动。\n③ 晶界扩散速度快。\n④ 固态相变时新相易在晶界优先形核。\n⑤ 晶界富集杂质，熔点低，易过烧。\n⑥ 晶界腐蚀速度快。\n3.3.4 相界","c3"],["相界分为哪几类？请比较这几类相界的化学能、应变能、总能量大小","相界分为：共格相界、半共格相界、非共格相界。\n化学能（表面能）：共格 < 半共格 < 非共格。\n应变能：非共格 < 半共格 < 共格。\n总能量：共格 < 半共格 < 非共格。\n3.3.5 堆垛层错","c1"],["简述菲克第一定律和菲克第二定律，写出其表达式，并说明其中变量的物理含义","（1）菲克第一定律（稳态扩散）：扩散通量 $ J $ 与浓度梯度 $  $ 成正比。\n其中：$ J $ 为扩散通量（单位时间通过单位面积的物质量），$ D $ 为扩散系数，$ $ 为质量浓度，负号表示扩散方向与浓度梯度方向相反。\n（2）菲克第二定律（非稳态扩散）：浓度随时间的变化率与浓度分布曲线的二阶导数成正比。","c4"],["请简述扩散的微观机制有哪些？","（1）交换机制：相邻原子直接交换位置（引起大畸变）或环形交换（三个以上原子循环交换）。\n（2）间隙机制：间隙原子从一个间隙位置迁移到另一个间隙位置。小原子（H、C、N）以此方式扩散。\n（3）空位机制：原子离开结点进入邻近空位，原位置留下新空位。置换原子主要以此方式扩散。\n（4）短路扩散：沿晶界、表面、位错等缺陷快速扩散（$ D_{} > D_{} > D_{} $）。","c4"],["扩散激活能的物理意义为何？扩散系数 $ D = D_0 (-Q/RT) $ 中的 $ Q $ 的含义是什么？简述 $ Q $ 的测试方法。试比较置换扩散和间隙扩散的激活能的大小","（1）物理意义：原子从一个平衡位置到另一个平衡位置需要克服的能垒，即扩散激活能。\n（2）$ Q  Q = U  Q = U + U_v $（迁移能+空位形成能）。\n（3）测试方法：测定不同温度下的扩散系数 $ D $，作 $ D 1/T $ 图，直线斜率 $ = -Q/R $，外推得 $ D_0 $。\n（4）大小比较：间隙扩散激活能 < 置换扩散激活能。","c4"],["简述影响扩散的主要因素","① 温度：最主要因素，温度越高，扩散系数越大（$ D = D_0 e^{-Q/RT} $）。\n② 晶体结构：致密度低的结构扩散快；各向异性。\n③ 晶体缺陷：晶界、表面、位错为快速扩散通道。\n④ 固溶体类型：间隙固溶体扩散激活能小，扩散快。\n⑤ 化学成分：原子间结合力强则扩散慢；第三组元的影响复杂。\n⑥ 应力作用：应力梯度可促进扩散。","c4"],["为什么滑移面和滑移方向往往是金属晶体中原子排列最密的晶面和晶向？","原子密度最大的晶面（密排面）面间距最大，原子间结合力较弱，点阵阻力最小，容易发生滑移；最密排方向原子间距最短，位错伯氏矢量最小，位错能量最低，因此滑移方向总是密排方向。","c2"],["用晶向和晶面指数的组合写出面心立方、体心立方及密排六方晶体的全部滑移系","面心立方（FCC）：滑移面 {111}，滑移方向 ⟨110⟩，共12个。\n体心立方（BCC）：室温下滑移面 {110}，滑移方向 ⟨111⟩，共12个；高温下还有 {112}、{123} 滑移面，共48个。\n密排六方（HCP）：滑移面 {0001}，滑移方向 ⟨1120⟩，共3个；当 c/a < 1.633 时，还有 {10ī0}、{10ī1} 等滑移面。","c2"],["（1）简述晶体滑移和孪生变形的异同点。（2）滑移和孪生是如何相互影响的？","（1）相同点：都是切变；都沿一定晶面、晶向进行；都不改变晶体结构；都是位错运动结果；都是塑性变形重要机制。\n不同点：滑移不改变晶体位向，孪生改变位向（镜面对称）；滑移位移量大（原子间距整数倍），孪生位移量小（1/n原子间距）；滑移临界分切应力低，孪生高；滑移先发生，孪生在滑移受阻时发生；滑移由全位错运动引起，孪生由分位错运动引起。\n（2）孪生本身对塑性变形贡献小，但孪生可以改变晶体位向，使不利取向的滑移系变为有利取向，促进滑移继续进行；滑移与孪生交替进行，可获得较大总变形量。\n5.3 多晶体的塑性变形\n5.3.1 晶界对变形的影响\n5.3.2 晶粒大小对变形的影响","c7"],["晶界对多晶体的塑性变形有何影响？","（1）晶界的协调作用：多晶体中各晶粒变形必须相互协调配合，要求每个晶粒至少能在5个独立滑移系上滑移。\n（2）晶界的阻碍作用（低温）：常温下晶界阻碍位错运动，提高形变抗力，产生细晶强化。\n（3）晶界的促进作用（高温）：高温下晶界具有粘滞性，晶粒间可发生相对滑动，是高温重要变形方式。","c3"],["哪一种强化机制可以使金属材料的强度和塑性同时提高？解释其原因","细晶强化。原因：晶粒细化使晶界增多，位错运动受阻，强度提高；同时变形更均匀，应力集中减小，裂纹不易萌生和扩展，因此塑性和韧性也提高。\n5.4 合金的塑性变形\n5.4.1 单相固溶体合金的塑性变形\n5.4.2 多相合金的塑性变形\n5.4.1 单相固溶体合金的塑性变形","c8"],["说明固溶强化产生的原因，以及影响固溶强化效果的因素","原因：溶质原子与位错交互作用（弹性交互、化学交互、电交互），阻碍位错运动；同时固溶体短程有序结构被滑移破坏也会增加变形阻力。\n影响因素：①溶质原子浓度（浓度越高，强化效果越好）；②原子尺寸差（差越大，强化效果越好）；③溶质类型（间隙原子强化效果优于置换原子）；④电子因素（价电子差越大，强化效果越好）。","c1"],["什么是屈服现象，解释其出现的原因","屈服现象：在低碳钢的应力-应变曲线上，拉伸试样开始屈服时应力突然下降，并在应力基本恒定下继续发生屈服伸长，出现应力平台（上、下屈服点）。\n原因：柯氏气团（溶质原子聚集在位错周围）钉扎位错，使位错难以运动。需要较大应力（上屈服点）使位错挣脱钉扎；一旦挣脱，位错运动容易，应力下降（下屈服点），形成屈服平台。\n5.4.2 多相合金的塑性变形","c7"],["简述多相合金发生塑性变形时，第二相粒子对合金的强化机制","（1）不可变形粒子：位错以绕过机制（Orowan机制）通过粒子，形成位错环，强化效果显著。粒子越细、越多、越弥散，强化效果越好。\n（2）可变形粒子：位错切过粒子与基体一起变形，强化机制复杂（如有序强化、共格应变强化、层错强化等）。\n5.5 塑性变形对材料组织与性能的影响\n5.5.1 显微组织及亚结构的变化\n5.5.2 性能的变化\n5.5.3 形变织构\n5.5.4 残余应力","c7"],["简述塑性变形对材料组织和性能的影响","（1）显微组织变化：晶粒沿变形方向拉长，形成纤维组织；出现滑移带或孪晶带。\n（2）亚结构变化：位错密度增加，形成位错缠结和胞状亚结构。\n（3）性能变化：加工硬化（强度、硬度提高，塑性下降）；电阻率增加，磁导率降低；化学活性增加，耐腐蚀性下降。\n（4）形变织构：晶粒取向出现择优取向，产生各向异性。\n（5）残余应力：产生宏观残余应力、微观残余应力和点阵畸变（储存能）。","c7"],["什么是形变织构？拔丝织构的表示方式是 (hkl)⟨uvw⟩ 还是 ⟨uvw⟩？","形变织构：多晶体在塑性变形过程中，原来位向互不相同的各个晶粒在空间取向上逐渐呈现一定规律性（择优取向），这种组织状态称为形变织构。\n拔丝时形成的织构称为丝织构，用 ⟨uvw⟩ 表示（各晶粒的某一晶向平行于拉拔方向）。\n6.1 冷变形金属的回复\n6.1.1 回复过程中的组织变化\n6.1.2 回复动力学\n6.1.3 回复机制","c1"],["金属铸件是否可以通过再结晶退火来细化晶粒？试说明原因","不能。再结晶的驱动力是变形金属经回复后未被释放的储存能。铸件未发生冷变形，体系内没有储存能，因而不会发生再结晶过程，无法通过再结晶退火细化晶粒。铸件细化晶粒可采用变质处理、加快冷却速度等方法。","c6"],["什么是再结晶温度？在相同的条件下，Cu的再结晶温度和Fe的再结晶温度哪个高？","再结晶温度：冷变形金属开始进行再结晶的最低温度。工业生产中通常将经过大变形量（～70%以上）的冷变形金属，经1h退火能完成再结晶（再结晶体积分数≥95%）所对应的温度定为再结晶温度。\n再结晶温度经验公式：$ T_R (0.35 0.40) T_m $（绝对温度）。Fe的熔点（1538℃）高于Cu的熔点（1083℃），因此Fe的再结晶温度更高。","c6"],["简述再结晶温度的影响因素","① 变形程度：变形程度越大，储存能越多，再结晶温度越低。\n② 原始晶粒尺寸：晶粒越细，变形抗力越大，储存能越高，再结晶温度越低。\n③ 微量溶质原子：溶质原子阻碍位错运动和晶界迁移，提高再结晶温度。\n④ 第二相粒子：细小弥散的第二相粒子阻碍再结晶，提高再结晶温度；粗大粒子可能促进再结晶。\n⑤ 退火工艺参数：加热速度过慢，回复充分，驱动力减小，再结晶温度升高；加热速度极快，再结晶温度也升高。","c6"],["工业纯铁分别经过变形量为5%、20%和40%的冷变形，然后在相同温度再结晶退火，请问哪种变形量所对应的晶粒尺寸最大，为什么？说明再结晶晶粒大小的影响因素及变化规律","（1）5%变形量对应的晶粒尺寸最大。因为2%~10%左右的变形量处于临界变形度范围，再结晶核心少，而长大速度很大，因此晶粒特别粗大。\n（2）再结晶晶粒大小的影响因素：\n① 变形度：变形度越大，晶粒越细。临界变形度附近晶粒最粗大。\n② 原始晶粒尺寸：原始晶粒越细，再结晶晶粒越细。\n③ 杂质和合金元素：一般细化晶粒。\n④ 变形温度：变形温度越高，回复程度越大，储存能减少，再结晶晶粒粗大。\n⑤ 退火温度：退火温度越高，晶粒越粗大。\n6.3 晶粒长大\n6.3.1 正常晶粒长大\n6.3.2 异常晶粒长大（二次再结晶）","c6"],["解释晶粒异常长大（也称二次再结晶）现象及发生（或诱发）的各种原因，讨论这种现象对性能的影响","定义：再结晶结束后，少数晶粒异常长大，称为二次再结晶（不连续晶粒长大）。\n发生原因：正常晶粒长大被分散相微粒、织构或表面热蚀沟等强烈阻碍。当阻碍因素局部消失时，少数晶粒迅速长大。\n对性能的影响：二次再结晶会降低材料的强度、塑性和韧性，增大加工表面粗糙度。一般情况下应避免；但硅钢片需要利用二次再结晶获得粗大晶粒，以提高导磁性能。","c6"],["简述层错能对金属热塑性变形行为的影响","高层错能金属（如Al、α-Fe）：扩展位错窄，螺型位错易交滑移，刃型位错易攀移，容易发生动态回复，剩余储能不足以引起动态再结晶，动态回复是主要软化机制。\n低层错能金属（如Cu、Ni、奥氏体钢）：扩展位错宽，交滑移和攀移困难，不易发生动态回复，容易发生动态再结晶。","c3"],["简述静态回复和动态回复位错运动的区别，以及静态回复和动态回复、静态再结晶和动态再结晶显微组织的区别","位错运动区别：静态回复位错运动主要靠热激活（攀移、滑移）；动态回复在位错运动的同时还受塑性变形影响，位错增殖与湮灭同时进行。\n显微组织区别：静态回复后晶粒仍保持纤维状；动态回复晶粒内部保持等轴亚晶，但晶粒仍呈纤维状。静态再结晶形成无畸变等轴晶粒；动态再结晶晶粒细小，晶内存在较高位错密度，晶界呈锯齿状。","c3"],["什么是再结晶织构？分析再结晶织构的形成机理","再结晶织构：具有变形织构的金属经再结晶后，新晶粒通常仍具有择优取向（织构），称为再结晶织构。\n形成机理：\n① 定向形核理论：在形变织构基体上形成特定取向的核心，长大形成再结晶织构。\n② 定向生长理论：形核无特殊取向，但只有某些取向的核心具有较大长大速度，在竞争中被保留。","c6"],["金属凝固的必要条件是什么？试用热力学定律解释原因","必要条件：过冷。\n热力学解释：由热力学第二定律，等温等压下过程自发进行的方向是自由能降低的方向。凝固的自由能变化 $ G = G_s - G_L $。只有在熔点 $ T_m $ 以下，$ G_s < G_L $，即 $ G < 0 $ 时，凝固才能自发进行。因此实际凝固温度必须低于熔点，即需要过冷度。","c6"],["简述纯晶体凝固的热力学条件、结构条件和能量条件，并说明需要这些条件的原因","热力学条件：$ G = G_s - G_L < 0 $，即需要过冷。因为只有自由能降低，过程才能自发。\n结构条件：结构起伏（晶胚）。液相中原子短程有序集团此消彼长，为晶胚形成提供可能。\n能量条件：能量起伏。形成临界晶核需要克服形核功，这部分能量需要依靠能量起伏补充。\n7.1.3 均匀形核","c6"],["什么是临界晶核？简述临界晶核的物理意义，并写出其与过冷度的定量关系","临界晶核：在一定的过冷度下，能够自发长大的最小晶胚。\n物理意义：当晶胚半径 $ r < r^* $ 时，晶胚长大导致自由能增加，不稳定；当 $ r r^* $ 时，晶胚长大导致自由能降低，成为稳定晶核。\n与过冷度的定量关系：$ r^* =  $，过冷度越大，临界晶核半径越小。","c6"],["液体凝固时固-液界面的微观结构有哪些类型？用什么判据判断固-液界面的性质？","类型：光滑界面和粗糙界面。\n判据：杰克逊因子 $ =    $ 为粗糙界面；$ > 2 $ 为光滑界面（部分教材以 $  $ 为光滑界面，中间为混合型）。","c6"],["简述凝固时获得细小晶粒的三种方法","① 增大过冷度：提高冷却速度，使形核率增加幅度大于长大速度，细化晶粒。\n② 加入形核剂（变质处理）：提供非均匀形核基底，提高形核率。\n③ 振动与搅拌：机械振动、电磁振动、超声波等使枝晶破碎，增加晶核数量。\n7.2 固溶体合金的凝固\n7.2.1 固溶体凝固时的溶质分布\n7.2.2 成分过冷\n7.2.3 成分过冷对合金凝固组织的影响\n7.2.1 固溶体凝固时的溶质分布","c6"],["何为成分过冷？纯金属能发生成分过冷吗？为什么？以下哪些因素有利于成分过冷的出现？","成分过冷：合金凝固时，界面前沿液体中实际温度低于由溶质分布所决定的凝固温度时产生的过冷。\n纯金属不能发生成分过冷，因为纯金属无溶质分布变化，凝固温度恒定。\n有利于成分过冷的因素：A. 液相温度梯度 $ G $ 越小；B. 凝固速度 $ R $ 越大；C. 合金原始成分 $ w_0 $ 越大；D. 液相线斜率 $ m $ 越大。\n7.2.3 成分过冷对合金凝固组织的影响","c6"],["根据液体中的成分过冷区示意图分析不同温度梯度下成分过冷的大小及其对结晶过程中组织形貌的影响","① 无成分过冷（$ G/R $ 大）：平直界面生长，形成平面状组织。\n② 小成分过冷：胞状界面生长，形成胞状组织（棒状晶，横截面六边形）。\n③ 大成分过冷：树枝状生长，形成树枝状组织。\n7.3 铸锭的组织与缺陷\n7.3.1 铸锭的宏观组织\n7.3.2 铸锭的偏析\n7.3.3 铸锭中的缩孔与气孔","c6"],["铸锭的一般组织可分为哪几个区域？分别写出其形成机理","三个区域：表层细晶区、柱状晶区、中心等轴晶区。\n形成机理：\n① 表层细晶区：液态金属接触冷模壁，强烈过冷且模壁作为非均匀形核基底，大量形核形成细小等轴晶。\n② 柱状晶区：细晶区形成后模壁温度升高，过冷度减小，不再形核。细晶区中生长方向垂直于模壁（散热最快方向）的晶粒优先生长，侧向受限，形成柱状晶。\n③ 中心等轴晶区：柱状晶前沿液体远离模壁，散热困难，温差减小，温度整体降至熔点以下时，液体中多处形核沿各方向长大形成等轴晶。","c1"],["简述铸锭的宏观偏析和微观偏析","宏观偏析（区域偏析）：肉眼或低倍可见的宏观范围成分不均匀，包括正常偏析、反偏析和比重偏析。\n微观偏析（显微偏析）：显微镜下才见的晶粒内部及晶粒间成分不均匀，包括胞状偏析、枝晶偏析和晶界偏析。\n7.4 区域熔炼","c1"],["简述区域熔炼的原理","将固溶体合金棒（$ k_0 < 1 $）由左向右局部熔化，熔化区再冷却凝固。随着熔化区不断右移，溶质原子在液相中富集，使左端先凝固部分溶质减少被提纯，右端溶质富集。反复多次可获得高纯度材料。\n8.1 相图基础\n8.1.1 相平衡与相律\n8.1.2 相图的建立\n8.1.3 相图的几何规律\n8.1.1 相平衡与相律","c1"],["简述相平衡的概念及条件","相平衡：多相体系中相与相之间达到物理化学的平衡，且不随时间变化。相平衡时各相的性质和数量不随时间变化，宏观上没有物质从一相到另一相的净迁移。\n相平衡热力学条件：各相的温度和压力相等，任一组元在各个相中的化学势相等，且系统吉布斯自由能最小。","c1"],["根据Ti-Ni二元相图，写出765℃、942℃、984℃、1118℃、1304℃发生的三相反应类型及反应式","765℃：共析转变，β-Ti → α-Ti + Ti₂Ni。\n942℃：共晶转变，L → β-Ti + TiNi。\n984℃：包晶转变，L + TiNi → TiNi₃。\n1118℃：共晶转变，L → TiNi₃ + TiNi₂。\n1304℃：共晶转变，L → TiNi₂ + (Ni)。","c5"],["为什么铸件常选用靠近共晶成分的合金？而压力加工件则选用单相固溶体成分的合金？","铸件选用共晶成分附近：共晶合金结晶温度区间小，流动性好，充型能力强，缩孔分散，铸造性能好。\n压力加工件选用单相固溶体：单相固溶体塑性好，易于变形加工；两相或多相合金可能因第二相脆性而降低加工性能。","c2"],["何谓一级相变和二级相变？说明一级相变和二级相变中有哪些参量突变，各举出一个实际相变的例子","一级相变：化学势的一阶偏导（-S, V）突变。有潜热和体积变化。例：液-固相变、同素异构转变。\n二级相变：化学势的二阶偏导（Cp, α, κ）突变。无潜热，无体积变化。例：磁性转变、有序-无序转变。","c5"],["试述金属固态相变的主要特征","① 相变阻力：除界面能外，还有体积应变能。\n② 非均匀形核：优先在晶界、位错等缺陷处形核。\n③ 相界面：共格、半共格、非共格，常先形成共格界面。\n④ 位向关系与惯习面：新相与母相有确定位向关系，新相沿特定晶面（惯习面）优先发展。\n⑤ 新相形态：受应变能和界面能共同控制，呈球状、针状、盘状等。\n⑥ 过渡相：阻力大时先形成亚稳过渡相。\n⑦ 可能出现马氏体相变（无扩散切变）。","c5"],["请从热力学角度简述材料能够存在非平衡的亚稳态的原因","由自由能曲线可知，体系可能存在多个局域极小值（亚稳态）和全局极小值（稳态）。从亚稳态转变到稳态需要克服能垒，在没有足够驱动力（如热激活）的情况下，体系可以长时间停留在亚稳态。\n10.2 脱溶\n10.2.1 脱溶过程\n10.2.2 脱溶强化\n10.2.3 调幅分解\n10.2.1 脱溶过程","c1"],["试述调幅分解的概念和特点，以及调幅分解与脱溶分解在形成析出相时最主要的区别","调幅分解：过饱和固溶体通过上坡扩散，自发分解成结构相同、成分不同且呈周期性波动的共格微区。不需要形核。\n特点：无相界面，仅浓度梯度；产物弥散、分布均匀。\n与脱溶分解的主要区别：调幅分解无形核阶段，通过上坡扩散连续长大；脱溶分解需要形核，通过下坡扩散长大。","c1"],["以Al-4.5%Cu合金为例，分析过饱和固溶体的脱溶分解过程（脱溶贯序），并讨论脱溶温度对脱溶贯序的影响","脱溶贯序：α过饱和固溶体 → G.P.区 → θ″相 → θ′相 → θ相（CuAl₂）。\n温度影响：低温时效（～130℃）：出现完整贯序，G.P.区和θ″相强化效果最好；中温时效：可能跳过G.P.区，直接析出θ′相；高温时效：直接析出平衡θ相，出现过时效。","c2"],["基于Al-Cu合金的固溶处理与时效，回答：（1）脱溶过程进行到哪个阶段产生的强化效果最大？（2）试用位错理论说明产生脱溶强化的原因","（1）θ″相充分析出时强化效果最大（达到硬度峰值）。\n（2）脱溶强化原因：细小弥散的沉淀相（G.P.区、θ″相）与基体共格或半共格，产生共格应变场；位错运动时需切过或绕过粒子，需消耗额外能量，从而提高强度。\n10.3 钢中的固态相变\n10.3.1 珠光体转变\n10.3.2 马氏体转变\n10.3.3 贝氏体转变\n10.3.1 珠光体转变","c3"],["钢中的马氏体转变有哪些特点？","① 无扩散性（切变方式）。② 表面浮凸现象。③ 共格界面。④ 惯习现象（沿母相特定晶面形成）。⑤ 存在确定位向关系（如K-S关系）。⑥ 在一定温度范围内进行（$ M_s M_f $）。⑦ 转变速度极快。⑧ 部分合金具有可逆性。⑨ 转变不完全，有残余奥氏体。","c1"],["钢中马氏体的组织形态有哪些？晶内亚结构分别是什么？","板条马氏体（低碳钢）：亚结构为高密度位错（位错马氏体）。\n片状马氏体（高碳钢）：亚结构为孪晶（孪晶马氏体）。","c1"],["贝氏体的实质是什么？为什么说贝氏体转变属于半扩散型相变？上贝氏体与下贝氏体的组织结构和力学性能有何特点？","实质：贝氏体是由非片层状排列的铁素体和碳化物组成的两相组织。\n半扩散型相变：Fe原子不扩散（切变），C原子扩散（碳化物析出）。\n上贝氏体：羽毛状，铁素体板条间有断续渗碳体，强度低，韧性差。\n下贝氏体：针状，铁素体内有细小碳化物弥散分布，强度高，韧性好。\n10.4 材料的亚稳态\n10.4.1 亚稳态概述\n10.4.2 非晶态\n10.4.3 准晶态\n10.4.4 纳米晶","c4"],["什么是材料的亚稳态？材料在平衡条件下只以一种状态存在，而非平衡的亚稳态可能出现哪些形式？举例说明这些亚稳态的用途","亚稳态：材料以高于平衡态自由能的状态存在，是热力学非平衡但动力学稳定的状态。\n存在形式及用途：\n① 细晶组织（纳米晶）：高强度、高硬度。\n② 高密度晶体缺陷（加工硬化）：强化金属。\n③ 过饱和固溶体（固溶处理+时效）：Cu-Al合金时效强化。\n④ 非平衡转变产物（马氏体）：钢淬火获得高强度。\n⑤ 非晶态（金属玻璃）：高强度、高电阻率、优异磁学性能。","c1"],["金属键","金属原子的最外层电子很少，价电子极易挣脱原子核束缚成为自由电子，弥漫于金属正离子组成的晶格之中形成电子云。这种由自由电子与金属正离子相互作用构成的键合称为金属键。","c1"],["共价键","由两个或多个电负性相差不大的原子通过共用电子对形成的化学键。","c1"],["离子键","金属原子失去价电子成为正离子，非金属原子得到电子成为负离子，正负离子依靠静电引力结合形成的键合。","c1"],["范德瓦耳斯力","电中性的原子或分子因正负电荷中心不重合形成电偶极矩，依靠这种微弱偶极吸引力结合的键合，包括静电力、诱导力、色散力。","c1"],["写出  和  完整的电子排布式","；\n考点4 五种结合键及其特点","c1"],["简述原子间结合键的类型及其特点","（1）金属键：电子共有化，无饱和无方向性，良好导电导热塑性。\n（2）离子键：以离子为结合单元，无方向无饱和，熔点高硬度高，常温绝缘。\n（3）共价键：共用电子对，有方向有饱和性，结构稳定熔点高质硬脆。\n（4）范德瓦耳斯力：无方向无饱和性，键能小，普遍存在。\n（5）氢键：有方向有饱和性，键能介于化学键与范德瓦耳斯力之间。","c1"],["试用金属键的特点解释金属具有良好的导热性、导电性和塑性的原因","金属键的自由电子在电场下定向移动导电；碰撞传递能量导热；无方向性使原子滑移不破坏键合，故塑性好。","c1"],["请从结合键的角度说明工程材料的分类和特点","（1）金属材料：金属键，自由电子+正离子，强度硬度高，塑性韧性优异。\n（2）陶瓷材料：离子键或共价键，硬度高、耐磨耐蚀，塑性韧性差。\n（3）高分子材料：分子链内共价键，链间二次键，塑性韧性好，强度硬度低。\n（4）复合材料：结合键复杂，性能可设计。\n考点5 实际材料中的结合键","c1"],["陶瓷材料中的主要结合键是什么？从结合键的角度解释陶瓷材料具有高熔点和高硬度的原因","主要结合键是离子键和共价键。键合很强，破坏键合需要很高能量，因此熔点高、硬度高。\n考点6 结合力与结合能","c1"],["根据原子间的作用能曲线分析双原子间的作用力与作用能随原子间距的变化规律","距离无限远：作用能为零。\n距离减小：吸引力为主，作用能下降。\n平衡距离 ：作用能最低。\n距离小于 ：排斥力为主，作用能上升。","c1"],["为什么以金属键结合的固体材料的密度比以离子键结合的固体材料的大？","金属元素原子质量高，且金属键无方向性，原子趋于密堆排列；离子键需满足电荷平衡，排列不致密。","c1"],["请定性比较陶瓷材料、高分子材料、金属材料的弹性模量大小，并从结合键的角度分析存在差异的原因","陶瓷 > 金属 > 高分子。陶瓷以共价/离子键结合，键能大；金属以金属键结合，键能次之；高分子分子链间为弱分子键。","c1"],["材料的结合键有哪些？结合键的类型和键能大小对材料的力学性能有何影响？","结合键有金属键、离子键、共价键、范德瓦耳斯力、氢键。键能越大，硬度越高、弹性模量越大、热膨胀系数越小。金属键塑性好；共价/离子键塑性差。","c1"],["从结合键的角度分析金属的塑性优于陶瓷的原因","金属键无方向性，原子滑移不破坏键合；陶瓷以离子键/共价键结合，原子相对位置改变会破坏键合或产生强排斥，故塑性差。","c1"],["钨的力学、物理和化学性能有哪些主要特点？请根据结合键分析原因","钨以金属键为主，含部分共价键。特点：极高熔点（共价键成分）、高密度（金属键密堆）、一定导电导热（自由电子）、高强度高硬度（共价键）、耐腐蚀（键能大）。\n专题2 晶体结构\n2.1 晶体学基础\n考点1 高频名词解释","c1"],["布拉维点阵（空间点阵","将实际晶体结构中的每个质点抽象为规则排列于空间的阵点，每个阵点具有相同的周围环境，由阵点在三维空间做周期性规则排列而形成的阵列。三维空间点阵只有14种。","c2"],["单胞与复合单胞","仅在8个顶角上有阵点的单胞称为简单单胞；除顶角外，在面心、体心或底心等处也有阵点的单胞称为复合单胞。","c1"],["晶向族","晶体中因对称关系而等价、原子排列情况相同但空间位向不同的一组晶向，用  表示。","c2"],["晶面族","晶面上原子排列情况相同、晶面间距完全相同、空间位向不同的各组晶面，用  表示。","c2"],["晶带及晶带轴、共带面","所有平行或相交于同一直线的晶面构成一个晶带，此直线称为晶带轴，属于此晶带的晶面称为共带面。","c1"],["晶带定律","晶带轴  与该晶带的晶面  满足关系式 。\n考点2 晶体与非晶体的区别","c1"],["晶体与非晶体有何区别？","① 晶体内部质点在三维空间呈周期性重复排列（长程有序），非晶体仅短程有序、长程无序；② 晶体有固定熔点，非晶体无固定熔点；③ 单晶体各向异性，非晶体各向同性。","c1"],["为什么单晶体呈现各向异性，而多晶体一般情况下不呈现各向异性？","单晶体在不同晶向上原子排列不同，导致性能不同；多晶体晶粒取向随机分布，各向异性相互抵消，表现为“伪”各向同性。\n考点3 晶胞选取规则的应用","c1"],["由A和B原子排列示意图抽象出其二维空间点阵，并选取最具代表性的晶胞，写出其计量成分式（假设A、B原子半径相等，相邻原子相切","二维点阵为正方形点阵，晶胞为正方形，计量成分式：AB。","c2"],["请简要分析没有底心四方点阵和面心四方点阵的原因","因为在所谓的底心四方和面心四方点阵中可以抽象出更符合晶胞选取规则的简单四方和体心四方点阵。","c2"],["空间点阵与晶体结构有何关系？","空间点阵是质点排列的几何抽象，描述周期性和对称性，只有14种；晶体结构是实际质点的具体排列，有无限多种。关系：晶体结构 = 空间点阵 + 结构基元。","c2"],["为什么密排六方不能称为空间点阵？","密排六方晶胞内原子与顶角原子周围环境不同，不能将单个原子抽象为阵点。应将晶胞内原子与顶角原子共同抽象为一个阵点（结构基元为原子对），得到简单六方点阵。","c2"],["请指出α-Fe、Cu、NaCl晶体分别属于何种晶系和布拉维点阵","α-Fe：立方晶系、体心立方点阵；Cu：立方晶系、面心立方点阵；NaCl：立方晶系、面心立方点阵。","c2"],["NaCl、立方ZnS、金刚石都属于立方晶系，它们各属于何种布拉维点阵？","均属于面心立方点阵。\n考点5 七种晶系","c2"],["根据点阵参数之间的关系，晶系可以分为哪些类型？","三斜、单斜、正交、六方、菱方、四方、立方。表格略。","c2"],["空间点阵有多少类型？分别是什么？","14种。简单三斜、简单单斜、底心单斜、简单正交、底心正交、体心正交、面心正交、简单六方、简单菱方、简单四方、体心四方、简单立方、体心立方、面心立方。","c2"],["为什么六方晶系的密勒指数采用四轴标定？请说明六方晶系中的四轴晶面指数需要符合什么约束条件？判断下列晶面指数的表示是否正确：(1110)、(1120)、(1010","三轴标定不能显示六方晶系的对称性和等价关系。四轴晶面指数(hkil)满足 。(1110)错误（应为），(1120)错误（），(1010)正确。","c2"],["标出HCP晶胞中ABCDEF面、ABO’面的晶面指数，OC方向、OC’方向的晶向指数","ABCDEF面: (0001)，ABO’面: (10̄11)；OC方向: [12̄10]，OC’方向: [12̄13]","c2"],["写出六方晶胞内ABCDA面的晶面指数，以及AB、BC、CD晶向的晶向指数","面: (10̄11)；AB: [1123]，BC: [12̄10]，CD: [2̄113]","c2"],["在立方晶系中，回答：（1）写出<111>、<123>晶向族包含的所有晶向；（2）写出{110}晶面族包含的所有晶面","（1）<111>有8个，<123>有48个。（2）{110}有6个：(110)、(101)、(011)、(1̄10)、(1̄01)、(01̄1)。","c2"],["写出六方晶系中<2̄1̄10>晶向族代表的所有晶向，并写出{1340}晶面族代表的全部晶面","<2̄1̄10>晶向族：。{1340}晶面族需根据六方对称性写出等效晶面。\n考点11 晶带定律及其应用","c2"],["晶面(110)和晶面(121)所属晶带的晶带轴是什么？请再写出三个属于该晶带的晶面指数","晶带轴：[111]；其他晶面如(231)、(143)、(112)。\n考点12 晶面间距的大小及计算","c2"],["何为晶面间距？晶面间距、晶面指数和原子排列疏密有什么关系？","相邻两个平行晶面之间的距离。低指数晶面间距大，原子排列密集；高指数晶面间距小，原子排列稀疏。","c2"],["对于简单立方晶体，随着晶面指数值的增大，相邻两晶面间的晶面间距会增大还是减小？为什么？","减小。由 ，指数增大则分母增大，d减小。","c2"],["同素异构转变","某些固态金属在不同温度和压力下具有不同晶体结构，这种转变称为同素异构转变。","c1"],["配位数","晶体结构中，某原子周围与之直接相结合（最近邻）的原子个数。","c2"],["致密度","晶体结构中原子体积占总体积的百分比，。\n考点2 理论密度与晶胞参数的关系计算","c2"],["讨论晶胞的点、线、面密度与致密度","线密度：某晶向单位长度原子数；面密度：单位晶面原子数；体密度：单位体积原子数；线致密度：原子所占长度比例；面致密度：原子所占面积比例；体致密度：原子体积占比。","c2"],["三种典型的金属晶体结构的配位数分别是多少？","FCC:12，BCC:8，HCP:12（c/a=1.633时）。","c2"],["基于纯金属的晶体结构，回答：(1)指出FCC、BCC、HCP结构中的密排面和密排方向；(2)指出FCC、HCP密排面堆垛顺序的不同","(1) FCC:{111}<110>，BCC:{110}<111>，HCP:{0001}<1120>；(2) FCC:ABCABC…，HCP:ABAB…。\n考点6 四面体间隙与八面体间隙","c2"],["指出FCC、BCC、HCP结构中四面体间隙和八面体间隙的数目、位置，并给出间隙大小","表格略。详见参考答案。","c1"],["负离子配位多面体","离子晶体中，正离子周围形成的负离子配位多面体。\n考点2 离子晶体的结构规则","c1"],["简述离子晶体的结构规则（鲍林规则","(1)负离子配位多面体规则；(2)电价规则；(3)负离子多面体共用顶、棱和面的规则；(4)不同种类正离子配位多面体间的连接规则；(5)节约规则。","c1"],["简述硅酸盐晶体结构的共同特点","(1) 基本结构单元[SiO₄]⁴⁻四面体；(2) 氧原子可被两个四面体共用；(3) 四面体可共顶连接成链、层、网；(4) Si-O-Si键角约145°。","c2"],["指出金刚石结构的空间点阵类型、原子结合键类型和晶胞中的原子数、配位数","面心立方点阵；共价键；8个原子；配位数4。","c1"],["相和显微组织","相：合金中具有相同聚集状态、相同化学成分、相同结构和性质，并以界面相互隔开的均匀组成部分。组织：用显微镜观察到的金属材料内部形貌。","c1"],["固溶体","以某一组元为溶剂，在其晶体点阵中溶入其他组元原子所形成的均匀固态溶体，保持原溶剂晶体结构。","c2"],["中间相","合金中晶体结构与组元均不相同的新相，位于相图中间，又称金属间化合物。","c2"],["正常价化合物","金属与电负性较强的IVA、VA、VIA族元素按原子价规律形成的化合物，如Mg₂Pb。","c1"],["电子化合物","电子浓度是决定晶体结构主要因素的一类化合物，相同电子浓度具有相同晶体结构。","c1"],["间隙相","非金属原子半径与金属原子半径比小于0.59时，形成的具有简单晶体结构的中间相。","c1"],["间隙化合物","非金属与金属原子半径比大于0.59时，形成的具有复杂晶体结构的中间相。","c1"],["拓扑密堆相","由两种大小不同的金属原子构成的、空间利用率和配位数很高的复杂结构中间相。","c1"],["超结构","长程有序的固溶体，X射线衍射图上有超结构线。","c1"],["偏聚和有序化","同种原子间作用力大时溶质原子偏聚；异种原子间作用力大时出现短程有序分布，称为有序化。\n考点2 合金相的基本概念及分类","c1"],["简要讨论固溶体的分类依据，并进行分类","按溶质位置：置换固溶体、间隙固溶体；按相对分布：有序、无序；按溶剂：一次固溶体、二次固溶体；按固溶度：有限、无限。\n考点3 置换固溶体与间隙固溶体","c2"],["影响固溶体固溶度的因素有哪些？","①晶体结构；②原子尺寸（差<±15%）；③电负性（相近易溶）；④电子浓度；⑤温度。","c2"],["为什么间隙固溶体只能是有限固溶体，而置换固溶体既可以是有限固溶体也可以是无限固溶体？","间隙固溶体溶质原子进入间隙，尺寸小但引起畸变，溶解度有限。置换固溶体若原子尺寸相近、结构相同、电负性相近、电子浓度合适，可无限互溶。","c2"],["根据表2-1判断：(1)哪些元素可能与铜形成完全互溶的置换固溶体？(2)哪些元素可以与铜形成部分互溶的置换固溶体？(3)哪些元素可以与铜形成间隙固溶体？","(1) Ni、Pd、Pt（FCC结构，原子半径差<15%）；(2) Co、Cr、Fe、Zn、Ag、Al；(3) C、H、O。","c2"],["C原子可与Fe形成间隙固溶体，请问C原子在α-Fe的晶格间隙中占据八面体间隙还是四面体间隙？为什么？","八面体间隙。因为八面体间隙在<110>方向尺寸0.633R，大于四面体间隙0.291R，C原子只需推开2个原子，比推开4个容易。","c2"],["γ-Fe和α-Fe对C原子的溶解能力存在明显的差异，请说明原因","γ-Fe（FCC）八面体间隙尺寸大，且存在温度高，固溶度大（2.11%）；α-Fe（BCC）八面体间隙尺寸小，固溶度小（0.0218%）。","c1"],["与纯溶剂组元相比，固溶体的结构、力学性能和物理性能发生了哪些变化？","结构：点阵畸变，点阵常数变化，偏聚或有序化；力学性能：固溶强化，硬度强度提高，塑性下降；物理性能：电阻率增加，磁性能变化等。\n考点4 中间相的分类及特点","c2"],["简述中间相的分类","正常价化合物、电子化合物、与原子尺寸因素有关的化合物（间隙相/间隙化合物/TCP相）、有序固溶体。","c2"],["简述中间相的特点","①可用分子式表示但不一定符合化合价规律；②可有一定成分范围；③金属键与其他键混合；④高硬度高熔点但脆性大。","c2"],["什么是电子化合物？MgCu₂和CuZn哪个是电子化合物？","电子浓度决定晶体结构的化合物。CuZn是电子化合物，MgCu₂是拓扑密堆相。","c1"],["简要讨论固溶体与中间相在结构、键合、性能方面存在的主要差异","结构：固溶体保持溶剂结构，中间相结构不同；键合：固溶体金属键为主，中间相混合键；性能：固溶体塑韧性好，中间相高硬度高熔点脆性大。","c2"],["请简要说明间隙固溶体、间隙相、间隙化合物的异同点","相同点：都由过渡族金属与小原子（C、N等）组成，小原子占据间隙。不同点：间隙固溶体保持溶剂点阵，间隙相结构简单（r_N/r_M<0.59），间隙化合物结构复杂（r_N/r_M>0.59）；前两者可用分子式表示，后者不行；性能上间隙相/化合物更硬更脆。\n专题3 晶体缺陷\n3.1 点缺陷\n考点1 高频名词解释","c2"],["晶体缺陷的概念及分类","实际晶体中偏离理想结构的情况。分为：点缺陷（空位、间隙原子等）、线缺陷（位错）、面缺陷（晶界、表面等）。","c1"],["肖特基缺陷、弗仑克尔缺陷","肖特基缺陷：原子迁移到表面，内部留下空位；弗仑克尔缺陷：原子挤入间隙，同时形成空位和间隙原子。","c1"],["点缺陷的平衡浓度","在一定温度下，空位存在使内能升高但熵增大，自由能存在极小值，对应平衡浓度：。\n考点2 点缺陷的形成及平衡浓度","c3"],["已知铜的空位形成能，1273K时空位平衡浓度，求个原子中有1个空位时的温度","由，代入解得。","c3"],["简述空位平衡浓度的概念及影响因素","空位平衡浓度是热力学平衡态下的空位数量与结点总数之比。随温度升高指数增大，与空位形成能有关。\n考点3 点缺陷的热力学稳定性","c3"],["点、线、面缺陷在晶体中出现都是热力学稳定的吗？为什么？","点缺陷是热力学稳定的（内能增加与熵增平衡）。线缺陷和面缺陷不是热力学稳定的（应变能增加远大于熵增）。\n3.2 线缺陷（位错）\n考点1 高频名词解释","c3"],["刃型位错与螺型位错的主要特征对比","刃型：b⊥位错线，有额外半原子面，滑移面唯一，应力场有正应力分量；螺型：b∥位错线，滑移面不唯一，应力场纯切应力。","c3"],["伯氏矢量的物理意义及特性","物理意义：反映位错周围点阵畸变总累积，大小表示滑移量，方向表示滑移方向。特性：守恒性、唯一性、可加性。","c1"],["刃型位错和螺型位错的运动方式","刃型位错既能滑移又能攀移，螺型位错只能滑移。","c3"],["位错交割后形成扭折还是割阶的判断","曲折线段在原滑移面上为扭折，不在原滑移面上为割阶。\n考点3 位错的应力场与线张力","c3"],["位错线张力的方向","垂直于位错线，指向使其变直的方向。","c3"],["平行刃型位错和螺型位错之间有无相互作用？","无相互作用，因为应力场无重叠分量。\n考点5 位错的增殖","c3"],["简述螺型位错的双交滑移增殖机制","螺型位错发生两次交滑移后，在交滑移面上留下难以滑移的刃型位错段，形成F-R源，增殖位错。\n考点6 实际晶体中的位错","c3"],["实际晶体中位错伯氏矢量应满足的条件","结构条件：b必须连接原子平衡位置；能量条件：b越小越稳定。","c3"],["面心立方和体心立方的全位错与不全位错","FCC：全位错，不全位错；BCC：全位错，不全位错。","c3"],["全位错和不全位错定义及最短单位位错伯氏矢量","全位错：b等于点阵矢量整数倍；不全位错：b不等于点阵矢量整数倍。FCC:，BCC:，HCP:。\n考点7 堆垛层错与扩展位错","c3"],["晶界、亚晶界和孪晶界","晶界：同相但位向不同晶粒之间的界面；亚晶界：亚晶粒之间的界面；孪晶界：孪晶之间的界面（共格或非共格）。","c3"],["小角度晶界与大角度晶界","小角度晶界：位向差<10°，由位错构成；大角度晶界：位向差>10°，原子排列不规则。","c3"],["重合位置点阵","大角度晶界处两晶粒点阵延伸，部分原子有规律重合，组成比原晶格大的新点阵。","c2"],["共格相界和半共格相界","共格：界面原子同时位于两相晶格结点上；半共格：部分匹配，通过位错松弛应力。","c1"],["表面能","晶体表面单位面积自由能的增加，等于产生单位新表面所做的功。","c1"],["晶界能","形成单位面积晶界时系统自由能的增加量。\n考点2 晶界及结构模型","c3"],["简述大角度晶界和小角度晶界的结构模型","小角度晶界：由位错构成（对称倾斜晶界：刃型位错列；不对称：两组刃型位错；扭转：螺型位错网）。大角度晶界：非晶态模型、过渡结构模型、小岛模型、重合位置点阵模型。","c3"],["晶界位向差与晶界能的关系","小角度晶界能随位向差增大而增大；大角度晶界能基本为定值，特殊重合位置晶界能较低。","c3"],["比较表面能、大角度晶界能、小角度晶界能、孪晶界能的大小","表面能 > 大角度晶界能 > 小角度晶界能 > 共格孪晶界能。","c3"],["表面能和晶界能哪个高？为什么？","表面能更高。表面原子一侧无键合，割断键合多；晶界原子两侧仍有键合，仅键合状况变化。\n考点4 晶界的特性","c3"],["描述晶界的特性","①存在晶界能；②常温阻碍位错运动（细晶强化），高温粘滞滑动；③扩散快；④新相优先形核；⑤富集杂质易过烧；⑥腐蚀速度快。","c3"],["为什么单相金属晶粒多呈六边形？","三叉晶界处界面张力平衡要求交角120°，六边形晶粒满足此条件，界面平直，总界面能最低。\n专题4 固体中的扩散\n考点1 高频名词解释","c1"],["上坡扩散、下坡扩散","下坡扩散：物质从高浓度向低浓度扩散（顺扩散）；上坡扩散：物质从低浓度向高浓度扩散（逆扩散），驱动力是化学势梯度。","c4"],["稳态扩散、非稳态扩散","稳态扩散：任一点浓度不随时间变化，扩散通量为常数；非稳态扩散：浓度随时间变化，扩散通量与位置有关。","c4"],["自扩散、互扩散（化学扩散","自扩散：无浓度差，仅由热振动产生的扩散；互扩散：存在浓度差，依赖浓度梯度进行的扩散。","c4"],["短路扩散","沿晶界、表面、位错等晶体缺陷的扩散，因激活能小、扩散速率快，称为短路扩散。","c4"],["柯肯达尔效应","置换型扩散偶中，两组元扩散速率不同导致标记面发生移动的现象。","c4"],["反应扩散（相变扩散","扩散过程中，当组元浓度超过基体固溶度极限时形成新相的扩散现象。\n考点2 菲克第一定律与菲克第二定律","c4"],["简述菲克第一定律和菲克第二定律，写出表达式，说明变量含义","菲克第一定律（稳态）：，J为扩散通量，D为扩散系数，为浓度，负号表示扩散方向与浓度梯度相反。菲克第二定律（非稳态）：。","c4"],["菲克第一定律的应用条件是什么？对于浓度梯度随时间变化的情况，能否应用菲克第一定律？","菲克第一定律适用于稳态扩散。非稳态情况下不能直接应用，需结合质量守恒定律推导出菲克第二定律。","c4"],["薄膜一侧H浓度0.25 mol/m³，另一侧0.025 mol/m³，厚度100 μm，H流量2.25×10⁻⁴ mol/(m²·s)，求扩散系数","","c4"],["Ni和Ta之间插入0.05 cm厚MgO层，D=9×10⁻¹² cm²/s，Ni晶格常数3.6×10⁻⁸ cm，稳态时Ta/MgO界面Ni浓度为0，求每秒通过MgO层的Ni原子数（面积4 cm²","Ni体积浓度 = 4/(3.6×10⁻⁸)³ = 8.57×10²² cm⁻³，浓度梯度 = (0-8.57×10²²)/0.05 = -1.71×10²⁴ cm⁻⁴，通量J = -D·dρ/dx = 1.54×10¹³ cm⁻²s⁻¹，原子数 = J×4 = 6.16×10¹³ s⁻¹。","c1"],["A板厚L，B板厚2L，A侧表面浓度ρ₀，B侧表面浓度0，扩散系数分别为D₁、D₂，界面浓度连续，求稳态扩散通量","设界面浓度为ρ₁，对A：，对B：，联立解得。\n考点4 菲克第二定律的计算应用\n题组1 误差函数解——渗碳","c4"],["920℃对纯铁渗碳，表面碳含量1.20%，D=2×10⁻¹¹ m²/s，希望0.1 mm深处碳含量0.90%，求渗碳时间（erf(0.23)=0.25","，，","c1"],["碳在奥氏体中扩散，D₀=2×10⁻⁵ m²/s，Q=144000 J/mol。(1)求870℃和930℃下的D；(2)870℃下获得930℃渗碳10h的相同渗层需多长时间？(3)经济成本比较（870℃:100元/h，930℃:150元/h）；(4)除经济外还需考虑什么因素？","(1) D₈₇₀=5.2×10⁻¹² m²/s，D₉₃₀=1.1×10⁻¹¹ m²/s；(2) D₁t₁=D₂t₂，t₈₇₀=1.1/0.52×10≈21.2h；(3) 成本：870℃:2120元，930℃:1500元，930℃更经济；(4) 设备寿命、晶粒长大、残余应力等。","c4"],["Cu-Zn合金，900℃处理10 min表面Zn含量变化达某值，800℃达到同样效果需多久？（Q=1.66×10⁵ J/mol","由，代入得\n题组2 正弦解——均匀化退火","c1"],["Cu-Zn合金枝晶偏析，880K退火3h可减弱到一定程度。Q=134 kJ/mol，R=8.314 J/(mol·K)。(1)退火0.5h达到同样效果需多少度？(2)如何缩短退火时间？","(1) 由，代入得，解得；(2) 缩小枝晶间距（快速凝固或热加工）、提高退火温度。\n考点5 柯肯达尔效应与达肯方程","c6"],["Cu和Cu-30%Zn扩散偶，界面处放Mo丝。(1)保温扩散后发生什么现象？为什么？(2)哪一侧更疏松？","(1) 标记面向Cu-30%Zn侧移动。因为Zn扩散速率大于Cu，Zn净流出；(2) Cu-30%Zn侧更疏松，因Zn净流出留下空位聚集形成孔洞。","c4"],["柯肯达尔效应对材料微观结构有什么影响？","焊接面一侧产生孔洞和凹陷，另一侧产生膨胀和凸起。","c4"],["间隙型扩散和置换型扩散是否都能发生柯肯达尔效应？为什么？","只有置换型扩散能发生。间隙型扩散中溶剂原子不扩散，不会引起不等量扩散。","c4"],["纯A和纯B扩散偶，扩散1h标记面移动1.52×10⁻³ cm，x_A=0.478时∂x_A/∂z=126 cm⁻¹，互扩散系数 cm²/s，求标记面移动速度及本征扩散系数D_A、D_B","v_m = x/(2t)=1.52×10⁻³/(2×3600)=2.11×10⁻⁷ cm/s；由v_m=(D_A-D_B)∂x_A/∂z得D_A-D_B=1.675×10⁻⁹；由得0.478D_B+0.522D_A=1.43×10⁻⁹；解得D_A=2.23×10⁻⁹，D_B=0.56×10⁻⁹ cm²/s。\n考点6 上坡扩散及其应用","c4"],["Fe-C合金与Fe-C-Si合金扩散偶，发现Fe-C-Si侧C含量降低，Fe-C侧C含量升高。这种现象叫什么？根本原因是什么？举出其他例子","上坡扩散。根本原因是Si提高了C在Fe中的化学势，形成化学势梯度。其他例子：铜铝合金时效早期富铜区、调幅分解。\n考点7 扩散的微观机制","c4"],["扩散的微观机制有哪些？","①交换机制（直接交换、环形交换）；②间隙机制；③空位机制；④短路扩散（晶界、表面、位错）。","c4"],["置换原子和间隙原子的扩散分别采用何种机制？简述原理","置换原子：空位机制，原子跳入邻近空位，形成新空位；间隙原子：间隙机制，原子从间隙跳到相邻间隙。","c4"],["(1)纯铁的扩散机制可能有哪些？(2)镍在铁镍固溶体中以哪种机制扩散？","(1) 空位机制、短路扩散（自扩散不可能通过间隙机制）；(2) 空位机制，因Ni与Fe原子半径相近，形成置换固溶体。\n考点8 扩散系数与扩散激活能\n题组1 置换型与间隙型扩散的激活能比较","c2"],["简述扩散激活能的物理意义，比较置换固溶体和间隙固溶体中的扩散激活能大小并说明原因","物理意义：原子跃迁需要克服的能垒。间隙扩散激活能仅为原子迁移能，置换扩散激活能=迁移能+空位形成能，故间隙扩散激活能更小。","c2"],["间隙型扩散和置换型扩散哪个更难？为什么？","置换型扩散更难，因激活能更大。","c4"],["硼钢中镍原子和碳原子哪个扩散系数更大？为什么？","碳原子扩散系数更大。碳原子小，间隙扩散机制，激活能小；镍原子置换扩散，激活能大。","c4"],["铝在铜中扩散：500℃时D=2.6×10⁻¹⁷ m²/s，1000℃时D=1.6×10⁻¹⁴ m²/s，求D₀和Q，及750℃时的D","由Arrhenius公式，解得Q≈180.44 kJ/mol，D₀≈4.1×10⁻⁶ m²/s，D₇₅₀=2.64×10⁻¹⁴ m²/s。","c4"],["纯金属薄膜渗碳实验数据如表，求1136K和1223K时的扩散系数，以及Q和D₀","D₁₁₃₆=5.56×10⁻⁸ m²/s，D₁₂₂₃=1.85×10⁻⁷ m²/s；解得Q≈159.85 kJ/mol，D₀≈1.25 m²/s。\n题组3 扩散常数与扩散激活能的实验测定","c4"],["Q的含义是什么？给出通过实验测定Q和D₀的方法","Q是每摩尔原子扩散激活能。方法：测不同温度下的D，作lnD~1/T图，斜率=-Q/R，截距=lnD₀。\n考点9 影响扩散的因素","c1"],["简述影响扩散的因素","①温度；②固溶体类型（间隙扩散快）；③晶体结构（非密堆结构扩散快）；④晶体缺陷（短路扩散）；⑤化学成分（结合力强扩散慢，第三组元影响）；⑥应力及其他场。","c4"],["根据单晶银和多晶银自扩散系数随温度变化图，分析温度、晶体缺陷的影响","温度升高D增大；低于700℃时多晶D大于单晶（晶界扩散贡献），高于700℃时接近（晶内扩散为主）。","c4"],["(1)H原子在γ-Fe中与Fe自扩散激活能哪个大？(2)H在α-Fe和γ-Fe中扩散激活能哪个大？(3)为什么渗碳选在γ-Fe中进行？","(1) Fe自扩散激活能大（空位机制）；(2) H在γ-Fe中激活能大（FCC致密）；(3) γ-Fe温度高、C溶解度大、浓度梯度大。\n考点10 反应扩散","c4"],["(1)什么是反应扩散？扩散层中是否存在两相区？为什么？(2)利用Fe-O相图分析纯铁在1000℃氧化时的物相分布与氧浓度分布","(1) 反应扩散：扩散过程中形成新相。不存在两相区，因两相区中化学势梯度为零，无扩散驱动力，且相律F=0不允许扩散。(2) 从表面向内依次为Fe₂O₃→Fe₃O₄→FeO→Fe（根据相图），氧浓度阶梯下降。\n专题5 材料的变形\n考点1 高频名词解释","c4"],["包申格效应","材料经预先加载产生少量塑性变形后，同向加载弹性极限升高，反向加载弹性极限降低的现象。","c1"],["滑移带、滑移线","滑移带：塑性变形后在宏观或光学显微镜下看到的相互平行细线；滑移线：高倍下观察到滑移带由更细的平行线组成。","c7"],["滑移系","一个滑移面和该面上的一个滑移方向合称一个滑移系，表示滑移可能采取的空间取向。","c7"],["单系滑移","只有一个滑移系上的分切应力最大并达到临界值，该滑移系单独开动。","c7"],["多系滑移","两个或多个滑移系同时或交替开动的滑移过程。","c7"],["交滑移","螺型位错从一个滑移面转移到与之相交的另一滑移面上继续滑移的过程。","c7"],["滑移的临界分切应力","使滑移系开动所需的最小分切应力，是材料的固有属性。","c7"],["施密特因子","，其中为滑移方向与拉力轴夹角，为滑移面法线与拉力轴夹角。","c1"],["屈服现象","低碳钢拉伸时应力突然下降，并在基本恒定下继续屈服伸长，出现应力平台，对应上、下屈服点。","c7"],["柯氏气团","溶质原子或杂质原子在位错周围聚集形成的原子气团，钉扎位错。","c1"],["吕德斯带","屈服延伸阶段在试样表面产生的与拉伸轴约成45°角的变形带。","c1"],["应变时效","预变形后放置或加热再拉伸，屈服现象重现且屈服应力提高的现象。","c1"],["派-纳力（P-N力","位错在滑移面上运动时，因晶格周期性而产生的晶格阻力。","c1"],["纤维组织","大变形量后晶粒难以分辨，呈现纤维状条纹的组织。","c1"],["变形孪晶与退火孪晶","变形孪晶：机械变形产生的孪晶；退火孪晶：再结晶退火过程中形成的孪晶。","c3"],["弥散强化","第二相以细小弥散微粒均匀分布于基体相中产生的强化。","c1"],["择优取向","塑性变形中晶粒滑移面向主变形方向转动，使晶粒空间取向呈现规律性。","c1"],["形变织构","多晶体塑性变形后晶粒呈现择优取向的组织状态。丝织构用表示，板织构用{hkl}表示。","c1"],["加工硬化","冷加工变形后强度硬度提高、塑性下降的现象。","c7"],["细晶强化","晶粒细化使晶界增多，阻碍位错运动，提高强度的现象。","c1"],["固溶强化","溶质原子溶入溶剂晶格引起畸变，阻碍位错运动，提高强度的现象。\n考点2 弹性变形","c1"],["铝弹性模量70 GPa，长5 m、直径3 mm的铝线在200 N拉力下长度变为多少？","应力 Pa，应变，伸长 m，长度=5.00202 m。\n考点3 晶体的滑移系及塑性\n题组1 三种典型晶体的滑移系","c8"],["为什么滑移面和滑移方向往往是金属晶体中原子排列最密的晶面和晶向？","密排面间距大，点阵阻力小；密排方向原子间距小，位错伯氏矢量小，位错能量低，易滑移。","c2"],["写出FCC、BCC、HCP的全部滑移系","FCC：{111}<110>，12个；BCC：室温{110}<111>，12个（高温还有{112}、{123}，共48个）；HCP：{0001}<1120>，3个（c/a<1.633时还有{10ī0}、{10ī1}等）。\n题组2 滑移系作图及可滑移性判断","c7"],["临界分切应力受哪些因素影响？是否受外力大小及方向影响？","受晶体类型、纯度、温度、加工状态、变形速度、滑移系类型等影响。不受外力大小及方向影响，是材料固有属性。","c1"],["FCC单晶沿[112]方向施加100MPa拉应力，求滑移系(111)[10ī]上的分切应力","滑移面法线[111]与[112]夹角，滑移方向[10ī]与[112]夹角（取绝对值）， MPa。","c7"],["纯铜临界分切应力1MPa，若使(111)面上位错沿[110]方向滑移，在[101]方向施加的最小应力是多少？","滑移面法线[111]与[101]夹角，滑移方向[110]与[101]夹角， MPa。","c3"],["单晶体拉伸时，滑移面法线方向、滑移方向及拉力方向呈何种关系时最容易滑移？","和都最大时，即拉力轴与滑移方向夹角为0°、与滑移面法线夹角为0°时，但实际不可能同时为0，通常取时施密特因子最大。","c7"],["FCC单晶分别沿[111]和[123]方向拉伸，最先开动的滑移系是哪些？","[111]方向：与<110>方向夹角相同，多个滑移系同时开动；[123]方向：需计算施密特因子，通常(111)[10ī]或(111)[01ī]等。","c7"],["什么是单滑移、多滑移、交滑移？三者滑移线形貌各有什么特征？","单滑移：一组平行滑移线；多滑移：两组或多组交叉滑移线；交滑移：折线状或波纹状滑移线。","c7"],["BCC单晶沿[123]压缩，初始滑移系(101)[111]，自由表面为(111)，求滑移线方向","滑移线是滑移面与表面的交线。(101)与(111)的交线方向为[121]。","c7"],["(1)滑移和孪生有何异同？(2)两者如何相互影响？","(1) 相同：都是切变，沿一定晶面晶向，不改变结构，位错运动结果。不同：滑移不改变位向，孪生改变（镜面对称）；滑移位移大，孪生小；滑移临界分切应力低，孪生高；滑移先发生，孪生在滑移受阻时发生。\n孪生本身贡献小，但改变位向使不利滑移系变有利，促进滑移；两者交替进行获得大变形。","c7"],["Mg、α-Fe、Cu在室温下的主要塑性变形机制是什么？温度形变速度的影响？","Mg（HCP）：滑移+孪生；α-Fe（BCC）和Cu（FCC）：滑移为主。温度降低或形变速率增大时，孪生倾向增加。","c7"],["多晶体塑性变形时，各个晶粒之间的变形如何协调？","要求每个晶粒至少有5个独立滑移系开动，通过多系滑移使晶粒形状改变与邻近晶粒协调，避免开裂。","c7"],["哪种强化机制可使强度和塑性同时提高？解释原因","细晶强化。晶粒细化使晶界增多，位错运动受阻强度提高；同时变形更均匀，应力集中小，裂纹不易萌生扩展，塑韧性提高。\n考点8 霍尔-佩奇公式的计算及应用","c8"],["(1)写出霍尔-佩奇公式并说明含义。(2)已知d=0.1mm时σ_s=172.7MPa，d=0.036mm时σ_s=231.3MPa，求d=0.0196mm时的σ_s","(1) ，σ_0反映晶内变形阻力，k反映晶界强化作用。(2) 代入解得σ_0=84.8，k=27.8 MPa·mm^{1/2}，d=0.0196mm时σ_s=84.8+27.8/√0.0196=84.8+27.8/0.14=283.4 MPa。","c1"],["d=50μm时σ_s=135MPa，d=8μm时σ_s=260MPa，求σ_s=205MPa时的d","代入解得σ_0=51.7，k=589.3 MPa·μm^{1/2}，由205=51.7+589.3/√d得√d=589.3/153.3=3.84，d=14.8μm。\n考点9 单相固溶体合金的塑性变形\n题组1 固溶强化","c1"],["说明固溶强化产生的原因及影响因素","原因：溶质原子与位错交互作用阻碍位错运动，以及滑移破坏短程有序引起能量升高。影响因素：溶质浓度、原子尺寸差（越大越好）、间隙原子（优于置换）、电子浓度差（越大越好）。","c1"],["什么是屈服现象？解释原因","屈服现象：拉伸时应力突然下降，出现应力平台。原因：柯氏气团钉扎位错，需较大应力（上屈服点）挣脱，挣脱后运动容易，应力下降（下屈服点）。","c7"],["为什么产生吕德斯带？如何避免？","屈服延伸阶段应力集中处形成与拉伸轴约45°的变形带，逐带扩展形成平台。避免方法：预变形使位错摆脱气团，或加入Ti等固定C、N。","c1"],["吕德斯带和滑移带是否相同？","不同。吕德斯带是许多晶粒协调变形的结果，穿过整个截面；滑移带是单个晶粒内滑移的结果。","c7"],["(1)冷轧后立即拉伸与放置几天再拉伸的曲线有何不同？(2)比较上屈服点、滑移临界分切应力、孪生临界分切应力的大小","(1)立即拉伸：不出现屈服点（位错已挣脱钉扎）；放置几天：出现屈服且应力提高（应变时效，气团重新钉扎）。(2) 孪生临界分切应力 > 上屈服点 > 滑移临界分切应力。\n考点10 多相合金中的强化","c7"],["第二相粒子的强化机制","不可变形粒子：位错绕过（Orowan机制），形成位错环；可变形粒子：位错切过粒子。粒子越细、越多、越弥散，强化效果越好。","c1"],["可变形粒子α′和不可变形粒子α的强化机制分别是什么？","α′：位错切过机制；α：位错绕过机制。","c1"],["简述塑性变形对材料组织和性能的影响","组织：晶粒拉长形成纤维组织，出现滑移带/孪晶带，位错密度增加形成胞状结构。性能：加工硬化（强度硬度↑，塑性↓），电阻率↑，化学活性↑，耐蚀性↓，产生残余应力，出现形变织构。\n题组2 显微组织与亚结构的变化","c7"],["Al和Mg合金的滑移系，拉伸后显微组织形貌特征及原因","Al（FCC）：滑移系12个，滑移为主，产生滑移带；Mg（HCP）：滑移系3个，滑移难，易孪生，产生变形孪晶。","c7"],["层错能大小对胞状亚结构的影响","高层错能金属：扩展位错窄，易交滑移，易形成胞状亚结构；低层错能金属：扩展位错宽，交滑移困难，位错杂乱分布，不易形成胞状结构。","c3"],["什么是形变织构？拔丝织构的表示方式是什么？","多晶体塑性变形后晶粒呈现择优取向的组织状态。拔丝织构（丝织构）用表示。\n题组4 残余应力","c1"],["工件经塑性变形后产生哪几种内应力？如何消除？","第一类（宏观残余应力，平衡范围整个工件）、第二类（微观残余应力，晶粒尺度）、第三类（点阵畸变）。可通过扩散退火或去应力退火消除。","c7"],["说明单晶体加工硬化曲线各阶段的名称及位错机制","Ⅰ阶段（易滑移）：单系滑移，位错交割少，硬化率低；Ⅱ阶段（线性硬化）：多系滑移，位错交割剧烈，产生缠结和塞积，硬化率高；Ⅲ阶段（抛物线硬化）：交滑移发生，异号位错抵消，硬化率下降。","c3"],["与Cu和Nb相比，纯Mg软取向时曲线第一阶段很长且几乎没有第二阶段的原因","Mg是HCP结构，滑移系少，易滑移阶段只有单系滑移，位错交割机会少，硬化率低；第二阶段多系滑移难以发生，故第一阶段很长，且试样在第二阶段未充分发展即断裂。","c1"],["比较单晶体和多晶体应力-应变曲线的差异及原因","多晶体曲线不出现第Ⅰ阶段（易滑移），因晶界阻碍和协调变形要求多系滑移同时开动，硬化曲线更陡。\n考点13 材料的四种强化机制及应用","c1"],["提高金属强度可采取哪些措施？","固溶强化、加工硬化、细晶强化、第二相强化（沉淀强化/弥散强化）。","c8"],["加工硬化、细晶强化、固溶强化、第二相强化在本质上的异同","相同：通过阻碍位错运动提高强度。不同：固溶强化利用点缺陷，细晶强化利用晶界，第二相强化利用第二相粒子，加工硬化利用位错间的相互作用。","c7"],["分析对工业纯铝、Fe-0.2%C合金、Al-5%Cu合金可采用的强化机制及机理","工业纯铝：细晶强化、加工硬化；Fe-0.2%C：固溶强化（C）、加工硬化、细晶强化、沉淀强化（碳化物）；Al-5%Cu：沉淀强化（时效析出θ相）、固溶强化（Cu）、加工硬化、细晶强化。","c1"],["解释下列操作使纯铜强度硬度提高的原因：(1)90%轧制；(2)加32%Zn得到H68黄铜；(3)加1.2% Al₂O₃弥散分布","(1) 加工硬化（位错增殖）；(2) 固溶强化（Zn溶入Cu晶格引起畸变）；(3) 弥散强化（第二相粒子阻碍位错运动）。\n专题6 回复与再结晶\n6.1 冷变形金属的回复与再结晶\n考点1 高频名词解释","c8"],["再结晶","冷变形金属加热时，出现无畸变等轴新晶粒并逐步取代变形晶粒的过程。","c6"],["再结晶温度","冷变形金属开始再结晶的最低温度。工业生产中通常将大变形量（~70%以上）金属经1h退火完成再结晶（≥95%）的温度定为再结晶温度。","c6"],["二次再结晶","再结晶结束后，少数晶粒异常长大，又称异常晶粒长大或不连续晶粒长大。","c6"],["再结晶织构（退火织构","具有变形织构的金属再结晶后，新晶粒仍具有择优取向，称为再结晶织构。\n考点2 冷变形金属加热时的组织与性能变化","c6"],["根据某合金退火1h后的电导率、屈服强度和晶粒尺寸数据（表格），估计回复、再结晶与晶粒长大的温度，并推荐热加工温度","回复温度：500600℃（电导率开始上升，屈服强度开始下降）；再结晶温度：700800℃（屈服强度急剧下降，晶粒尺寸明显变小）；晶粒长大温度：900℃以上（晶粒尺寸显著增大）。推荐热加工温度：800℃（再结晶以上，晶粒未显著长大）。\n考点3 冷变形金属的回复","c6"],["高温回复中出现的多边化结构是什么？为什么其形成是自发过程？","多边化结构：同号刃型位错沿垂直于滑移面方向排列成位错墙（小角度亚晶界），将晶粒分割为亚晶。驱动力来自应变能下降，是自发过程。","c7"],["金属铸件是否可以通过再结晶退火来细化晶粒？","不能。再结晶驱动力是冷变形储存能，铸件未变形，无储存能。","c6"],["冷轧纯钢板，要求保持较高强度应进行何种热处理？需要继续冷轧变薄应进行何种热处理？","保持较高强度：去应力退火（回复退火）；继续冷轧：再结晶退火（消除加工硬化，软化）。","c8"],["高锰钢工件固溶处理后用冷拔钢丝绳吊挂，1100℃加热后钢丝绳在接近工件处断裂，为什么？","冷拔钢丝绳接触高温工件部位温度达到再结晶温度，发生再结晶，形成无畸变等轴晶粒，强度下降，导致断裂。\n考点5 再结晶温度及其影响因素","c8"],["简述再结晶温度的影响因素","①变形程度：越大，储存能越多，再结晶温度越低；②原始晶粒尺寸：越细，储存能越高，温度越低；③微量溶质原子：阻碍位错和晶界迁移，提高再结晶温度；④第二相粒子：细小弥散阻碍再结晶（温度升高），粗大可能促进；⑤退火工艺：加热速度过慢或过快都使再结晶温度升高。","c6"],["什么是再结晶温度？相同条件下Cu和Fe哪个再结晶温度高？","再结晶温度：大变形量金属经1h退火完成再结晶的最低温度。Fe熔点1538℃，Cu熔点1083℃，根据（绝对温度），Fe的再结晶温度更高。","c6"],["两块含碳量0.2%的钢铸锭，平均晶粒大小80μm和60μm。(1)同程度冷变形后同温度再结晶退火，哪块更容易再结晶？(2)A铸锭冷变形后放置四天再退火，B冷变形后立即退火，哪块更容易？(3)若B含碳量高于A，同程度冷变形后哪块再结晶温度更低？","(1) B（原始晶粒细，储存能高）；(2) B（A放置四天，位错被柯氏气团钉扎，难以再结晶）；(3) A（含碳量低，溶质原子阻碍作用小）。","c6"],["工业纯铝室温大变形后加热到100℃保温12天，室温强度明显降低。查表知工业纯铝T_R=150℃，所以排除了再结晶可能。请解释原因并设计实验验证","再结晶温度是指1h退火完成再结晶的温度。若保温时间足够长（12天），100℃也可能完成再结晶。实验验证：金相观察是否有等轴新晶粒；或测不同温度下完成再结晶所需时间，计算激活能判断。\n考点6 再结晶后晶粒大小的影响因素","c6"],["工业纯铁分别经5%、20%、40%冷变形，相同温度再结晶退火，哪种变形量对应的晶粒尺寸最大？为什么？说明再结晶晶粒大小的影响因素及变化规律","5%变形量晶粒最大。因为处于临界变形度范围（2%~10%），再结晶核心少，长大速度快。影响因素：变形度（临界变形度处最大，大变形度细化）、原始晶粒尺寸（越细越细）、杂质元素（细化）、变形温度（高则粗）、退火温度（高则粗）。","c6"],["方形纯铝板中部冲孔后在再结晶温度退火，小圆孔周围组织形貌如何变化？","小孔周围变形度分布不均，离孔不同距离处变形度不同。在临界变形度处再结晶晶粒特别粗大，形成一个粗晶环；孔边缘变形度很大，再结晶晶粒细小。\n考点7 再结晶动力学","c6"],["H70黄铜在400℃完成再结晶需1h，390℃需2h，求450℃完成再结晶需多久？","由，先求Q：，Q≈200 kJ/mol。再求450℃：，t≈0.04 h。\n考点8 晶粒的正常长大及长大速率","c6"],["为什么正五边形晶粒会在长大过程中消失，而正七边形会长大？","三叉晶界处界面张力平衡要求交角120°。正六边形晶粒满足此条件，界面平直。边数<6时晶界外凸，曲率中心在晶粒内，晶界向曲率中心迁移，晶粒缩小；边数>6时晶界内凹，曲率中心在晶粒外，晶界向外迁移，晶粒长大。","c6"],["影响晶界迁移率的因素","①温度（越高迁移越快）；②分散相粒子（阻碍迁移）；③晶粒位向差（大角度晶界迁移快）；④杂质元素（阻碍迁移）。\n考点9 二次再结晶","c3"],["解释二次再结晶现象、发生原因及对性能的影响","二次再结晶：再结晶结束后少数晶粒异常长大。原因：正常晶粒长大被分散相微粒、织构或表面热蚀沟阻碍，局部阻碍消失后少数晶粒迅速长大。影响：降低强度塑韧性，增大表面粗糙度，一般应避免；但硅钢片利用它获得粗大晶粒提高导磁性能。\n考点10 再结晶退火后的组织\n题组1 再结晶全图","c6"],["纯铝冷变形5%后于650℃退火1h组织粗化，增大至80%再于650℃退火1h仍得粗大晶粒。分析原因，结合Al再结晶全图制定合理细化工艺","5%处于临界变形度附近，得粗晶；80%变形度在650℃退火可能进入二次再结晶区，也得粗晶。合理工艺：变形度80%，退火温度选择300~400℃（一次再结晶区）。\n题组2 再结晶织构","c6"],["什么是再结晶织构？分析其形成机理","再结晶织构：具有变形织构的金属再结晶后新晶粒仍具有择优取向。形成机理：定向形核（亚晶位向相近，形核有择优取向）和定向生长（只有某些取向晶核具有较大长大速度，在竞争中占优）。\n题组3 退火孪晶","c6"],["对比分析回复、再结晶、正常长大、异常长大的驱动力及力学性能变化","| 过程 | 驱动力 | 力学性能变化 |\n| —— | ——– | ————– |\n| 回复 | 冷变形储存能 | 基本保持变形后性能 |\n| 再结晶 | 回复后未释放的储存能 | 恢复到冷变形前水平 |\n| 正常长大 | 总界面能的降低 | 强度塑性有所下降 |\n| 异常长大 | 总界面能的降低 | 性能恶化，强度塑性下降 |\n6.2 热变形及动态回复与动态再结晶\n考点1 高频名词解释","c6"],["冷加工、温加工和热加工","冷加工：再结晶温度以下且不加热的加工；温加工：再结晶温度以下且高于室温；热加工：再结晶温度以上。","c1"],["动态回复","热加工过程中，塑性变形使金属产生形变强化的同时发生的回复现象。","c7"],["动态再结晶","热加工过程中，塑性变形使金属产生形变强化的同时发生的再结晶现象。","c6"],["加工流线","热加工后，偏析、夹杂物等沿变形方向延伸，在宏观磨面上出现的流线或纤维组织。","c1"],["纤维组织和带状组织","纤维组织：塑性变形后晶粒被拉长呈纤维状；带状组织：各相沿变形方向交替呈带状分布。","c1"],["超塑性","材料在一定条件下热变形，可获得500%~2000%均匀塑性伸长且不发生颈缩的特性。\n考点2 动态回复与动态再结晶\n题组1 冷、热加工过程区分","c8"],["室温下轧制Sn和1000℃下拉拔W，哪种属于热加工？","Sn再结晶温度低于室温，室温轧制属热加工；W再结晶温度约1100℃，1000℃拉拔属冷加工。\n题组2 动态回复与动态再结晶","c1"],["简述层错能对金属热塑性变形行为的影响","高层错能金属：扩展位错窄，易交滑移和攀移，易发生动态回复，储能不足难以动态再结晶；低层错能金属：扩展位错宽，交滑移和攀移困难，易发生动态再结晶。","c3"],["简述静态回复和动态回复位错运动的区别，以及静态/动态回复、静态/动态再结晶显微组织的区别","位错运动：静态回复靠热激活（攀移、滑移）；动态回复在变形同时进行，位错增殖与湮灭平衡。显微组织：静态回复晶粒仍纤维状；动态回复晶粒内等轴亚晶，晶粒仍纤维状。静态再结晶形成无畸变等轴晶粒；动态再结晶晶粒细小，晶内位错密度高，晶界锯齿状。\n考点3 热加工对金属组织和性能的影响","c3"],["热加工对金属铸锭组织、性能有何影响？为什么热加工可进行大变形量变形？","影响：消除气孔疏松，改善夹杂物分布，将粗大柱状晶变为细小等轴晶；产生亚组织强化。原因：热加工时发生动态回复和动态再结晶，不断消除加工硬化，可进行大变形。","c1"],["低碳钢热轧板带状组织形成原因及控制方法","形成原因：两相区变形，铁素体沿奥氏体晶界析出后变形，或枝晶偏析/夹杂物被拉长，冷却时作为铁素体形核位置。控制方法：不在两相区变形；降低夹杂物含量；采用正火或高温扩散退火加正火处理。\n专题7 纯金属及合金的凝固\n7.1 纯晶体的凝固\n考点1 高频名词解释","c1"],["结构起伏","液态金属中原子排列短程有序、长程无序，短程有序原子集团此消彼长、尺寸不稳定的现象，又称相起伏。","c1"],["能量起伏","液体中各微小区域及同一区域不同瞬间能量偏离平均能量而瞬时涨落的不稳定现象。","c1"],["均匀形核","新相晶核在母相中均匀生成，不受杂质或外表面影响，又称匀质形核。","c6"],["非均匀形核","新相优先在母相中存在的异质处形核，依附于杂质或外来表面，又称异质形核。","c6"],["临界晶核半径、临界形核功","临界晶核半径：能自发长大的最小晶核的半径。临界形核功：形成临界晶核所需做的功。","c6"],["形核率","单位体积液体在单位时间内形成的晶核数目。","c6"],["光滑界面、粗糙界面","光滑界面：固-液界面原子排列规则，固相表面为完整密排面，宏观上由小平面组成；粗糙界面：界面上原子排列混乱，有厚度约几个原子的过渡层，宏观上平直。","c1"],["负温度梯度、正温度梯度","负温度梯度：液相温度随离界面距离增大而降低（dT/dz < 0）；正温度梯度：液相温度随离界面距离增大而升高（dT/dz > 0）。","c1"],["结晶潜热","金属结晶时从液相转变为固相过程中放出的热量。\n考点2 晶体凝固的条件","c6"],["简述纯晶体凝固的热力学条件、结构条件和能量条件，并说明需要这些条件的原因","热力学条件：，需要过冷。原因：只有自由能降低过程才能自发。\n结构条件：结构起伏。原因：为晶胚形成提供可能。\n能量条件：能量起伏。原因：形成临界晶核需克服形核功，需能量起伏补充。","c6"],["什么是临界晶核？简述临界晶核的物理意义，并写出其与过冷度的定量关系","临界晶核：能自发长大的最小晶胚。物理意义：时晶胚长大导致自由能增加，不稳定；时长大导致自由能降低，成为稳定晶核。关系：。","c6"],["某FCC金属，K， J/m³， J/m²， nm，K下均匀形核，求一个临界晶核中的晶胞个数和原子个数","晶胞体积 ，临界晶核体积 ，晶胞数 = ，原子数 = 。\n题组3 均匀形核的形核率和过冷度","c2"],["金属以非均匀形核结晶时，影响形核率的主要因素是什么？","①过冷度；②固体杂质的结构与晶体相似性（润湿角越小，形核率越高）；③杂质表面形状（凹曲面、粗糙表面有利于形核）。\n考点5 均匀形核与非均匀形核的比较","c6"],["为什么非均匀形核比均匀形核容易？","非均匀形核临界形核功比均匀形核小（乘以），且晶核形状为球冠状，所需原子数少；所需过冷度也小。","c6"],["比较均匀形核和非均匀形核的临界形核功和形核率大小，说明原因","非均匀形核功小于均匀形核功（乘以）；非均匀形核率大于均匀形核率（指数关系，形核功小则形核率大）。","c6"],["纯净水在-18℃冰箱中未结冰，震荡后立即结冰；自来水同样条件已结冰。解释原因","(1) 纯净水处于过冷状态；(2) 需要能量起伏触发形核；(3) 震荡提供外界能量，帮助越过形核能垒；(4) 自来水含杂质，提供非均匀形核基底；(5) 结论：非均匀形核比均匀形核容易，形核需要过冷度、结构起伏、能量起伏三条件。\n考点6 固-液界面结构及纯晶体的长大机理","c1"],["简述过冷度、临界过冷度（有效过冷度）、动态过冷度的区别","过冷度：熔点与实际结晶温度的差值。临界过冷度：形核率突然显著增大时的过冷度。动态过冷度：晶体长大所必需的界面过冷度。","c6"],["固-液界面的微观结构有哪些类型？用什么判据判断？","光滑界面和粗糙界面。判据：杰克逊因子，为粗糙界面，为光滑界面（部分教材为光滑，中间为混合型）。","c1"],["简述液态金属凝固过程中的长大机制","①连续长大（粗糙界面）；②二维晶核长大（光滑界面）；③借螺型位错长大（光滑界面）。长大速率：连续长大 > 借螺型位错长大 > 二维晶核长大。","c6"],["纯金属结晶时晶体长大的条件是什么？过冷度对晶体长大有何影响？","条件：需要动态过冷度。正温度梯度下平面状长大；负温度梯度下树枝状长大。过冷度越大，分枝越发达。","c6"],["同样负温度梯度下，Pb呈树枝状而Si界面平整，为什么？","Pb为粗糙界面，凸起可伸入过冷液相加速生长并形成分枝；Si为光滑界面，凸起难以形成，仍保持小平面特征。\n考点8 凝固时细晶粒的获得","c1"],["简述凝固时获得细小晶粒的三种方法","①增大过冷度（提高冷却速度）；②加入形核剂（变质处理）；③振动与搅拌（机械、电磁、超声）。","c6"],["平衡凝固与非平衡凝固","平衡凝固：每个阶段都能达到平衡，液固相成分沿液相线和固相线变化；非平衡凝固：扩散不充分、不均匀的凝固过程。","c6"],["平衡分配系数与有效分配系数","平衡分配系数；有效分配系数，反映液相混合程度。","c1"],["正常凝固","固溶体非平衡凝固后，锭子成分从表面向中心逐渐增加（）的分布规律。","c6"],["区域熔炼","将合金棒局部熔化后冷却凝固，熔化区向右移动，使左端溶质减少被提纯的方法。","c1"],["热过冷和成分过冷","热过冷：实际温度低于理论凝固温度；成分过冷：界面前沿液相实际温度低于由溶质分布决定的凝固温度。\n考点2 平衡分配系数的理解","c6"],["A-B相图，合金棒从一端非平衡凝固，固相无扩散、液相完全混合。求平衡分配系数和凝固结束后共晶体所占百分比","。由，代入，，，得，，共晶体占44.4%。\n考点4 固溶体非平衡凝固时的溶质分布","c4"],["简述区域熔炼的原理","将合金棒局部熔化，熔化区向右移动。因，溶质在液相富集，左端先凝固部分溶质减少被提纯。","c1"],["(1)何为成分过冷？纯金属能发生吗？(2)哪些因素有利于成分过冷？","(1) 界面前沿实际温度低于溶质分布决定的凝固温度。纯金属不能。(2) 温度梯度越小、凝固速度越大、原始成分越大、液相线斜率越大、越小越有利。","c6"],["Ni含量5%和25%的Cu-Ni合金，哪种成分过冷倾向更大？为什么？","25%Ni合金。越大，凝固温度范围越大，越易成分过冷。","c6"],["Al-Cu相图，，，，，，求能保持平面生长的最大Cu含量","，，由，得。","c5"],["什么是成分过冷？用成分过冷理论解释合金铸造性能与液固相线间垂直距离的关系","（同53题）液固相线垂直距离越大，成分过冷倾向越大，越易树枝状生长，流动性越差，缩孔越分散。\n题组2 固溶体合金凝固时的生长形貌","c6"],["根据成分过冷区示意图，分析不同温度梯度下成分过冷大小及其对组织形貌的影响","大时无成分过冷：平面状组织；中等时小成分过冷：胞状组织；小时大成分过冷：树枝状组织。","c6"],["区域偏析（宏观偏析）与显微偏析（微观偏析","宏观偏析：肉眼或低倍可见的宏观范围成分不均匀；微观偏析：显微镜下才见的晶粒内部及晶粒间成分不均匀。","c1"],["枝晶偏析","非平衡凝固时，先凝固的枝干和后凝固的枝间成分不均匀的现象，又称晶内偏析。","c6"],["晶界偏析","溶质原子富集在最后凝固的晶界部分所造成的偏析。","c3"],["铸锭的三个晶区及形成机理、性能特点","表层细晶区：模壁强烈过冷及非均匀形核，细小等轴晶，性能好但薄。\n柱状晶区：散热方向性优先生长，柱状晶，致密但界面脆弱。\n中心等轴晶区：温度均匀，多处形核，无择优取向，裂纹不易扩展但缩孔较多。","c1"],["三种铝锭组织对应浇铸条件判断及影响规律","(a) 680℃砂模（粗大等轴晶）；(b) 780℃钢模（全部柱状晶）；(c) 680℃钢模（柱状晶+等轴晶）。规律：铸模散热能力越强、浇铸温度越高，柱状晶区越大；搅拌、振动、加变质剂细化等轴晶。","c1"],["简述铸锭的宏观偏析和微观偏析","宏观偏析（正常、反、比重偏析）；微观偏析（胞状、枝晶、晶界偏析）。","c1"],["合金铸锭产生偏析的原因及获得无偏析铸态组织的凝固方法","原因：成分过冷、树枝状生长导致溶质纵向和横向输送不均。方法：平衡凝固（极慢冷）或极快速冷却（液体完全不混合，稳态凝固后固相成分恒定）。","c6"],["自由度","保持平衡相数不变的情况下，系统中可以独立改变的因素（温度、压力、成分等）的数目。","c1"],["相平衡","多相体系中各相的性质和数量不随时间变化，宏观上没有物质从一相到另一相的净迁移的状态。","c1"],["杠杆定律","二元相图两相区中，两相的质量分数与合金成分点到两相成分点的距离成反比：，。","c5"],["简述相平衡的概念及条件","相平衡：多相体系达到物理化学平衡且不随时间变化。条件：各相温度、压力相等，任一组元在各相中化学势相等，系统吉布斯自由能最小。","c1"],["根据水的相图回答：(1)写出相律表达式及参数含义；(2)求点和B点的自由度；(3)解释高压锅工作原理","(1) ，C组元数、P相数、F自由度数；(2) （三相点）；B（气液平衡线上）；(3) 高压锅内压力升高，水的沸点升高，食物更快煮熟。\n考点4 二元相图的测定方法","c5"],["简述热分析法测Cu-Ni二元合金相图的步骤","①配制不同Ni含量的合金，测冷却曲线；②纯Cu和纯Ni有水平台（恒温凝固），合金有两个转折点（开始和终了）；③将临界点对应温度和成分标在相图上；④连接开始凝固温度点得液相线，连接终了温度点得固相线。\n考点5 自由能-成分曲线与二元相图\n题组1 根据自由能-成分曲线画相图","c5"],["匀晶转变、包晶转变、共晶转变","匀晶转变：（单相固溶体）；包晶转变：；共晶转变：。","c5"],["共晶组织","共晶转变产生的两个固相的混合物，多为片层状或棒状。","c5"],["伪共晶","非共晶成分的合金在非平衡条件下获得的全部共晶组织。","c5"],["离异共晶","共晶组织很少时，一相依附于初生同类相生长，另一相被推至晶界，两相分离的共晶。","c5"],["包晶偏析","包晶转变不完全，初生相α被β包围，剩余液相直接结晶或参与其他反应，α相保留在β芯部的组织与成分偏析。","c5"],["共析转变","一定成分的固相在恒温下生成另外两个一定成分的固相的转变：。","c5"],["包析转变","两个一定成分的固相恒温下转变为一个新固相的转变：。","c1"],["稳定化合物和不稳定化合物","稳定化合物：有确定熔点，可熔化成同成分液相；不稳定化合物：加热至一定温度分解，无确定熔点。","c1"],["相区接触法则","相邻相区的相数差为1（点接触除外），两单相区间必有两相区隔开。\n考点2 简单二元相图及其应用\n题组1 二元共晶相图","c1"],["Mg-Ni相图，共晶反应L(23.5%Ni)→α+Mg₂Ni(54.6%Ni)。C₁亚共晶、C₂过共晶，先共晶相质量分数相等，C₁中α总量是C₂中α总量的2.5倍，求C₁和C₂的成分","由杠杆定律：，且，解得，。","c5"],["根据H₂O-NaCl相图回答：(1)为什么下雪天要在马路撒盐？(2)设计从海水提纯纯冰的方案","(1) NaCl溶于水使凝固点降低，雪周围变成盐水，熔点低于0℃，雪融化；(2) 在-20~0℃冷却海水，结晶体为冰，捞出即得纯水/纯冰。\n题组2 二元包晶相图","c5"],["根据Ti-W相图回答：(1)写出各相区相组成；(2)分析40%W和93%W合金平衡结晶过程，画冷却曲线；(3)分析两种合金非平衡组织与平衡组织的区别","(1) 略；(2) 40%W：L→L+β→β→β+α（包晶）→室温β+αⅡ；93%W：L→L+β→β→室温β+αⅡ；(3) 非平衡：包晶反应不完全，出现“包芯”组织。","c5"],["根据Pt-Ag相图回答：(1)画合金I冷却曲线及相组成；(2)指出合金Ⅱ和Ⅲ在400℃的平衡组织；(3)包晶转变结束时得30%β相，求Ag含量","(1) 略；(2) Ⅱ：α+β，Ⅲ：β+αⅡ；(3) Ag含量为20.10%或59.16%（两个解）。","c5"],["根据A-B相图回答：(1)写出各水平线反应类型；(2)分析各成分范围室温组织；(3)分析合金I冷却过程；(4)写出合金I室温相组成和合金Ⅱ室温组织组成的表达式","(1) 包晶、共晶等；(2) 略；(3) 冷却曲线略；(4) 表达式略。","c5"],["Au(1064℃)、V(1929℃)，中间相β(43-45%V)，α中V溶解度19%，γ中Au溶解度25%，存在1400℃和1522℃包晶反应，画Au-V相图","略。\n考点5 写出复杂相图的三相反应式","c2"],["写出Al-La相图全部等温转变反应式，并注明(1)(2)(3)相区的相组成","640℃共晶、873℃包晶、1090℃共析、1170℃包析、1220℃共晶、1240℃包晶、550℃包晶、547℃共晶。相区(1)(2)(3)略。","c5"],["什么是伪共晶？伪共晶区的形状、位置与组成金属的熔点有何关系？","伪共晶：非共晶成分合金得100%共晶组织。两相结晶速度接近时伪共晶区对称；低熔点相结晶速度快，伪共晶区偏向高熔点一侧。","c5"],["什么是离异共晶？在什么条件下可能得到？","离异共晶：共晶组织特征消失，两相分离。条件：①平衡凝固时成分远离共晶点，先共晶相多；②非平衡凝固时固相线偏离，共晶温度仍有少量液相。","c5"],["简述一种非平衡凝固包晶组织的形成过程","包晶反应不完全，初生α相被β包围形成“包芯”，剩余液相直接结晶或参与其他反应。\n考点7 相图与反应扩散的结合","c5"],["为什么铸件常选共晶成分？压力加工件选单相固溶体成分？","共晶合金结晶温度区间小，流动性好，铸造性能好；单相固溶体塑性好，易于加工变形。","c2"],["根据Al-Cu相图，说明Al-Cu合金适合铸造、热加工和热处理强化的成分及理由","铸造：共晶成分附近（结晶温度区间小）；热加工：α单相区（塑性好）；热处理强化：固溶度极限以内（可固溶时效）。\n8.3 铁碳合金相图\n考点1 高频名词解释","c5"],["莱氏体、低温莱氏体","莱氏体：1148℃共晶转变产物（γ+Fe₃C）；低温莱氏体（变态莱氏体Ld′）：727℃共析转变后珠光体+共晶渗碳体的混合物。","c1"],["渗碳体、共晶渗碳体、共析渗碳体","渗碳体Fe₃C；共晶渗碳体：莱氏体中的渗碳体；共析渗碳体：珠光体中的渗碳体。","c5"],["铁素体、奥氏体","铁素体：C在α-Fe中的间隙固溶体；奥氏体：C在γ-Fe中的间隙固溶体。","c1"],["珠光体","727℃共析转变产物（α+Fe₃C）的机械混合物。\n考点2 铁碳相图基础知识","c1"],["T12钢（1.2%C）过共析钢，回答：(1)室温相组成物及含量；(2)室温组织组成物及含量；(3)780℃脱碳后表面至心部碳浓度分布曲线，标出相区","(1) α 82.07%，Fe₃C 17.93%；(2) P 92.74%，Fe₃CⅡ 7.26%；(3) 表面为纯铁（α），向内依次为α+γ两相区、单相γ区，浓度从0升至1.2%。","c5"],["(1)某合金室温组织含50%珠光体和50%铁素体，求含碳量；(2)分析其平衡凝固过程，画室温组织示意图；(3)加热到730℃和850℃各得到什么组织？","(1) 由，得C=0.385%；(2) 平衡凝固过程：δ→包晶→γ→γ→α+γ→P+α→室温；(3) 730℃：α+γ；850℃：γ。","c6"],["w_C=3.0%亚共晶白口铸铁，回答：(1)描述平衡凝固过程；(2)画冷却曲线和组织转变示意图；(3)室温组织及组织组成物和相组成物含量","(1) L→γ+L→Ld→Ld’+Fe₃CⅡ+ P；(2) 略；(3) 室温组织：Ld’+P+Fe₃CⅡ；组织组成：Ld’ 40.64%，P 45.92%，Fe₃CⅡ 13.44%；相组成：α 55.16%，Fe₃C 44.84%。","c5"],["说明一次、二次、三次、共晶、共析渗碳体的形成条件和组织形态","表略。详见参考答案。","c5"],["二次和三次渗碳体的最大含量各是多少？","二次Fe₃C最大22.6%（C=2.11%）；三次Fe₃C最大0.3%（C=0.0218%）。","c1"],["成分三角形","等边三角形ABC，顶点表示纯组元A、B、C，边表示二元系，内部点表示三元合金成分。","c1"],["共轭连线","两相平衡时，合金成分点与两个平衡相成分点连线，三点共线，该连线称为共轭连线。","c1"],["共轭三角形","三相平衡时，三个平衡相成分点连线构成的三角形。","c1"],["共轭曲线","等温截面中相同温度下的一对液-固相界线。","c1"],["重心法则和直线法则","重心法则：三相平衡时合金成分点位于三个平衡相成分点连线的三角形重心；直线法则：两相平衡时三点共线。","c1"],["单变量线","三元相图中只有一个独立变量的相界线。\n考点2 成分三角形及特殊线的性质","c1"],["根据浓度三角形回答：(1)写出P、R、S点的成分；(2)2kg P + 4kg R + 2kg S混熔后的成分点X；(3)，A、B之比与S相同，求Y；(4)2kg P与多少Z混熔得6kg R，求Z成分；(5)标出X、Y、Z","(1) P:20%A,10%B,70%C；R:10%A,60%B,30%C；S:40%A,50%B,10%C；(2) X:20%A,45%B,35%C；(3) Y:41%A,51%B,8%C；(4) Z:4kg,成分5%A,85%B,10%C；(5) 略。\n考点3 杠杆定律及重心定律的应用","c1"],["三元合金K分解为纯B和液相，，液相中B=40%，合金K中A:C=3:1，求K的成分","由直线法则，$ (x_B-40)/(100-x_B)=2x_B=80%$；A+C=20%，A:C=3:1，A=15%，C=5%。K:15%A,80%B,5%C。","c1"],["三元合金质量分数40%A,30%B,30%C，某温度下形成三相平衡，各相成分如表，求：(1)液相、α、β各占百分比；(2)若α和β各占50%，求合金成分","(1) 设液相x，α相y，β相z，由质量守恒解得x=55.3%，y=10.5%，z=34.2%；(2) 由杠杆定律，合金成分点在α-β连线上，解得A=47.5%，B=15%，C=37.5%。\n考点4 简单三元共晶相图","c1"],["固态互不溶解三元共晶投影图，E点成分30%A,30%B,40%C。一液态合金65%A,15%B,20%C（与E相同）平衡凝固至室温，求共晶组织(A+B+C)共的相对含量","该合金成分点位于AE线上，设O点。共晶组织含量等于液相刚到达E点时的液相相对含量，由杠杆定律：。可求得为50%，选B。","c5"],["A-B-C三元相图投影图，固态有限互溶。写出四相平衡反应；根据A-B投影画A-B二元相图；分析X和Y点合金平衡冷却过程及室温组织","(1) 四相平衡共晶：；(2) 二元相图略；(3) X点：L→α初→L→(α+β)共→(α+β+γ)共→从α、β脱溶；Y点：L→(α+β)共→(α+β+γ)共。","c5"],["根据三元共晶相图投影图回答：(1)说明O和O’合金平衡凝固过程及室温平衡相组成，画冷却曲线；(2)写出I-VI区域合金的室温组织","(1) O：L→α初→L→(α+β)共→(α+β+γ)共→脱溶；O’：L→β初→L→(α+β)共→脱溶。相组成均为α、β、γ。冷却曲线略；(2) I:α；II:α+βⅡ；III:α+βⅡ+γⅡ；IV:α+(α+β)共+βⅡ；V:α+(α+β)共+βⅡ+γⅡ；VI:α+(α+β)共+(α+β+γ)共+βⅡ+γⅡ。","c5"],["Bi-Pb-Sn三元系投影图。写出等温反应；分析70%Bi-10%Pb-20%Sn合金和E点合金的平衡冷却过程，画冷却曲线及组织示意图；假设固态互不相溶，Bi₃Pb₇为计量比化合物，画Bi-Pb二元相图并写等温反应","(1) E点共晶：L→(Sn)+(Bi)+β；U点包共晶：L+Pb→(Sn)+β；(2) 70Bi-10Pb-20Sn：L→Bi初→L→(Bi+Sn)共→L→(Bi+Sn+β)共；E点：L→(Bi+Sn+β)共；(3) Bi-Pb相图：有化合物Bi₃Pb₇，T₁共晶L→Bi+Bi₃Pb₇，T₂包晶L+Pb→Bi₃Pb₇。","c5"],["某三元合金系在和等温截面，若，确定三相平衡反应类型并写反应式","共析反应（γ→α+β），因为随温度降低γ相区缩小，α、β相区扩大。\n题组2 垂直截面图","c1"],["含Pb15%的Sn-Sb-Pb三元垂直截面，200℃水平线上发生什么反应？写出反应式；水平线上方和下方各有几个三相区？写出各三相区相组成","(1) 200℃包共晶反应：SbSn+L→β-Sn+Pb；(2) 上方2个三相区：β-Sn+SbSn+L 和 Pb+SbSn+L；下方2个三相区：β-Sn+Pb+SbSn 和 β-Sn+Pb+L。","c1"],["根据Al-Cr-Si局部液相面投影图，写出四相不变反应式","；；；；；。","c1"],["Al-Cu-Mg液相面投影图，写出处的四相平衡反应类型及反应式","共晶：L→α+θ+S；包共晶：L+Q→S+T；包共晶：L+S→α+T；共晶：L→α+β+T。","c1"],["根据四相平衡平面图回答：(1)写出反应名称及反应式；(2)O合金稍高于四相温度时的平衡相组成，估算质量分数；(3)生成相及稍低于四相温度时的平衡相组成","(1) 包共晶反应：L+α→β+γ；(2) 平衡相L、α、γ，质量分数用杠杆定律和重心法则计算；(3) 生成β和γ；稍低于四相温度时平衡相为α、β、γ。\n考点9 三元相图的一般规律","c1"],["从热力学角度分析三元合金三相平衡相区为空间三棱柱，等温截面截出的共轭三角形是直边三角形的原因","三元系三相平衡时自由度，温度固定时各相成分固定，三点确定一个三角形。三个平衡相两两平衡，满足直线法则，因此连接线是直线，构成直边三角形。\n专题10 固态相变\n10.1 固态相变理论与实例\n考点1 高频名词解释","c1"],["一级相变、二级相变","一级相变：相变时化学势一阶偏导不等，有潜热和体积变化；二级相变：化学势二阶偏导不等，无潜热无体积变化，热容、压缩系数等突变。","c5"],["扩散型相变、切变型相变（非扩散型相变","扩散型相变：依靠原子长距离扩散进行，相界面非共格，如珠光体转变；切变型相变：原子集体切变位移，无扩散，相界面共格，成分不变，如马氏体转变。","c4"],["惯习面","固态相变中新相优先发展的特定晶面。","c1"],["过渡相（亚稳相","固态相变中先形成的晶体结构或成分与母相接近的亚稳相，是减少相变阻力的折中手段。","c1"],["连续脱溶、不连续脱溶","连续脱溶：母相成分连续变化，无新界面；不连续脱溶：以胞状形式同时析出饱和α和β相，形成突变界面。","c1"],["调幅分解","过饱和固溶体通过上坡扩散，自发分解成成分不同、结构相同、共格的纳米微区，无形核阶段。","c1"],["固溶处理","将合金加热到单相区保温，获得过饱和固溶体的热处理。","c1"],["时效强化","过饱和固溶体在室温或较高温度保温，析出细小弥散沉淀相，使强度硬度升高的现象。","c1"],["人工时效、自然时效","人工时效：加热到一定温度保温；自然时效：室温下长时间放置。","c1"],["过时效","时效时间过长，沉淀相粗化，强度硬度下降的阶段。","c1"],["重结晶","固态金属加热或冷却通过相变点时，从一种晶体结构转变为另一种的过程。\n考点2 固态相变的分类\n题组1 按相变热力学分类","c6"],["何谓一级相变和二级相变？说明参量突变，各举一例","一级相变：体积、熵突变，有潜热（如液-固相变）；二级相变：热容、压缩系数突变，无潜热（如磁性转变）。","c5"],["固态相变包括哪些变化？举例说明扩散型与非扩散型相变","晶体结构变化、化学成分变化、有序程度变化。扩散型：珠光体转变；非扩散型：马氏体转变。","c4"],["按相变方式分为哪两类？主要特征？","形核-长大型（有形核阶段，有相界面）和不需要形核的（如调幅分解，无相界面）。","c5"],["试述金属固态相变的主要特征","①阻力包括界面能和应变能；②非均匀形核；③可能形成共格/半共格/非共格界面；④存在位向关系与惯习现象；⑤新相形态受应变能和界面能控制；⑥易出现过渡相；⑦可能发生马氏体相变。\n题组2 相变的驱动力和阻力","c5"],["分析固态相变中应变能产生的原因及影响因素","原因：新旧相比体积差和界面错配。影响因素：共格应变能（共格>半共格>非共格）；体积应变能（比体积差大则大、弹性模量大则大、球状最大盘状最小）。\n题组3 相变时的非均匀形核","c5"],["液态相变和固态相变的异同点？为什么固态相变多为非均匀形核？","相同：驱动力都是自由能差，有形核长大（除无核相变）。不同：固态有应变能，扩散慢，易在缺陷处形核，有惯习现象，易出现过渡相。固态相变中缺陷处能量高，可降低形核功，故多非均匀形核。\n题组4 新、旧相的界面关系","c5"],["为什么过饱和固溶体脱溶析出的新相粒子呈不同形状？","应变能和界面能共同作用。应变能主导时呈盘状（最小），界面能主导时呈球状（最小），两者相近时呈针状。","c2"],["固态相变时为什么常先形成亚稳过渡相？","相变阻力大时，直接形成稳定相困难。先形成与母相结构/成分接近的过渡相，形核功小，是降低阻力的折中手段。","c5"],["分析缺陷促进固态相变形核的原因","缺陷处能量高，可降低形核功，作为非均匀形核的优先位置。","c5"],["推导球形晶核的临界晶核尺寸，说明物理意义","，由得。物理意义：时晶胚长大自由能升高，不稳定；时成为稳定晶核。","c1"],["试述调幅分解的概念、特点及与脱溶分解的主要区别","调幅分解：过饱和固溶体通过上坡扩散分解成结构相同、成分不同的共格微区。特点：无形核，无相界面，仅浓度梯度，产物弥散分布。与脱溶分解的主要区别：调幅分解无形核阶段，通过上坡扩散；脱溶分解有形核，通过下坡扩散。","c1"],["以Al-4.5%Cu为例，分析脱溶贯序及脱溶温度的影响","脱溶贯序：α过饱和固溶体→G.P.区→θ″相→θ′相→θ相(CuAl₂)。温度影响：低温时效出现完整贯序，强化效果好；中温时效可能跳过G.P.区；高温时效直接析出平衡θ相。","c1"],["(1)如何获得Al-Cu过饱和固溶体？(2)什么是时效处理？说明沉淀相析出过程。(3)如何消除时效强化？","(1) 加热到单相区（~540℃）保温，快速淬火；(2) 时效：过饱和固溶体在室温或加热保温析出沉淀相的过程。析出顺序：G.P.区→θ″→θ′→θ；(3) 过时效处理（长时间加热），使沉淀相粗化。\n题组2 时效强化及强化机制","c2"],["(1)哪个阶段强化效果最大？(2)用位错理论说明脱溶强化原因","(1) θ″相充分析出时；(2) 细小共格沉淀相产生共格应变场，阻碍位错运动；位错需切过或绕过粒子，消耗额外能量。","c3"],["说明Al-4.5%Cu脱溶过程、影响脱溶动力学的因素及时效性能演化规律","脱溶过程见41题。影响因素：①晶体缺陷（越多越快）；②时效温度（适宜温度最快）；③成分（Cu越高过饱和度越大）。性能演化：硬度上升→峰值（θ″相）→下降（θ′相）→软化（θ相）。","c1"],["分析Al-Cu过饱和α固溶体在不同温度退火的脱溶差异","低温或自然时效：完整贯序；中温时效：部分中间产物可能不析出；高温时效：平衡脱溶，直接析出θ相。","c2"],["根据两组铝铜合金时效硬化曲线，讨论成分和时效温度对硬度的影响及原因","Cu含量越高，硬度峰值越高（过饱和度大）；时效温度越高，硬度峰值越低（沉淀相粗化）。原因：高Cu、低温促进细小弥散沉淀相形成。","c8"],["结合时效硬化曲线，讨论不同成分和热处理条件下可能出现的脱溶，说明各阶段脱溶相的大小、形状、分布、界面关系及强化效果","见表10-2（母题660参考答案P179）。G.P.区：圆盘状，共格，第一峰值；θ″相：圆盘状，共格，第二峰值（最高）；θ′相：较大圆片，半共格，过时效；θ相：粗大粒子，非共格，软化。\n考点7 脱溶相颗粒的粗化","c1"],["说明Ostwald熟化过程中小颗粒溶解、大颗粒长大的原因","小颗粒周围母相溶质浓度高，大颗粒周围浓度低，形成浓度梯度，溶质从小颗粒周围向大颗粒周围扩散，破坏相平衡，导致小颗粒溶解、大颗粒长大。\n10.2 钢在冷却时的固态相变\n考点1 高频名词解释","c6"],["马氏体相变","钢从奥氏体快速冷却，抑制扩散，在较低温度下原子协同切变进行的无扩散型相变。","c5"],["贝氏体相变","中温转变，Fe原子不扩散（切变），C原子扩散，形成非片层排列的铁素体与碳化物两相组织。","c5"],["形状记忆效应","某些合金冷却形成马氏体后变形，再加热使马氏体逆转变，外形恢复原状的现象。","c1"],["热弹性马氏体","马氏体转变具有可逆性，冷却时形成马氏体，加热时马氏体直接逆转变母相，随温度升降马氏体长大或缩小。\n考点2 马氏体转变\n题组1 马氏体转变及其特点","c8"],["钢中马氏体转变的特点","①无扩散、切变；②表面浮凸；③共格界面；④惯习现象；⑤确定位向关系；⑥温度范围（）；⑦转变速度快；⑧转变不完全（有残余奥氏体）；⑨部分合金可逆。","c1"],["说明马氏体转变的晶体学特点","切变无扩散、表面浮凸、共格界面、惯习面、位向关系。","c1"],["马氏体是单相组织还是两相组织？分析驱动力和阻力","单相组织（C在α-Fe中的过饱和固溶体）。驱动力：母相与马氏体自由能差；阻力：应变能+界面能。","c1"],["从热力学角度分析马氏体转变需在低温下进行的原因","马氏体转变需较大过冷度提供驱动力克服应变能能垒，且温度低可抑制扩散。\n题组2 马氏体的结构与组织","c1"],["钢中马氏体的组织形态及亚结构","板条马氏体（低碳）：高密度位错（位错马氏体）；片状马氏体（高碳）：孪晶（孪晶马氏体）。","c1"],["说明片状马氏体与板条马氏体的区别","金相：片状呈针状/竹叶状，板条呈束状；立体形态：片状双凸透镜，板条扁条状；亚结构：片状孪晶，板条位错；性能：片状高强度低韧性，板条高强度高韧性。","c1"],["简述马氏体高强度、高硬度的主要原因","①固溶强化（间隙C原子畸变）；②相变强化（高密度位错或孪晶）；③时效强化（C原子偏聚钉扎位错）；④细晶强化（马氏体片/板条细小）。","c8"],["贝氏体的实质？为什么是半扩散型相变？上、下贝氏体的组织结构和力学性能特点","实质：非片层排列的铁素体+碳化物。Fe不扩散（切变），C扩散，故称半扩散型。上贝氏体：羽毛状，铁素体板条间有断续渗碳体，强度低、韧性差；下贝氏体：针状，内有细小碳化物弥散分布，强度高、韧性好。","c4"],["比较共析转变、贝氏体转变与马氏体转变的异同点","见表10-3（母题660参考答案P183-184）。","c5"],["稳态组织","材料中自由能最低的结构，即平衡态组织。","c1"],["非晶态合金","通过液态急冷等方法得到的非晶态金属，原子排列短程有序、长程无序，又称金属玻璃。","c1"],["玻璃化转变温度","过冷液体在冷却过程中，黏度急剧增大、原子扩散迁移困难而处于“冻结”状态的临界温度，记作。","c1"],["非晶、准晶、纳米晶","非晶：短程有序、长程无序的固体；准晶：具有长程有序但无平移对称性（有5次或更高次对称轴）的固体；纳米晶：至少一个维度尺寸为纳米级（<100nm）的晶体材料。\n考点2 亚稳态存在的原因和形式","c1"],["从热力学角度简述材料能够存在非平衡亚稳态的原因","自由能曲线中存在多个局域极小值（亚稳态）和全局极小值（稳态）。从亚稳态到稳态需越过能垒，若无足够驱动力（如热激活），体系可长时间停留在亚稳态。","c1"],["什么是材料的亚稳态？亚稳态可能出现哪些形式？举例说明用途","亚稳态：材料以高于平衡态自由能的状态存在。形式及用途：①细晶组织（纳米材料）；②高密度缺陷（加工硬化强化）；③过饱和固溶体（固溶+时效强化）；④非平衡转变产物（马氏体强化）；⑤非晶态（金属玻璃）。\n考点3 非晶态材料\n题组1 玻璃及玻璃化转变","c1"],["什么是玻璃化转变温度？与哪些因素有关？","玻璃化转变温度：过冷液体固化成玻璃态的临界温度。影响因素：①冷却速度（快则高）；②原子间键能（强则高）；③分子组态（主链刚性强则高）。","c1"],["液相冷却形成晶体或非晶的内因和外因是什么？为什么金属易形成晶体，陶瓷易形成玻璃？","内因：材料自身晶化能力（黏度、临界冷却速度）；外因：冷却速度。金属晶体结构简单、黏度小，结晶易发生；陶瓷结构复杂、黏度大，扩散困难，晶化能力低。","c1"],["欲获得金属玻璃，为什么选用液相线很陡、共晶温度低的二元系？","液相线陡、共晶温度低时，过冷液相稳定性高，可在较宽温度范围内存在，容易抑制结晶，在较低冷却速度下获得金属玻璃。\n考点4 准晶态材料","c5"],["从结构、形成、性能对比准晶与非晶","结构：准晶长程有序、无平移周期性（有五次对称）；非晶短程有序、长程无序。\n形成：准晶需适当冷却速度，有形核长大；非晶需快速冷却，无形核长大。\n性能：准晶低摩擦、低导热、高硬度、高抗蚀；非晶高强度、高硬度、良好磁性。\n考点5 纳米晶材料","c1"],["什么是纳米材料？它们有哪些结构优势？","纳米材料：至少一维尺寸<100nm，或以它们为基本单元的固体。优势：比表面积大、表面能高；熔点低；蓝移现象；强、硬度高，塑、韧性较好。","c1"],["简述纳米晶体材料的形成途径","①非晶态晶化；②强烈塑性变形（高能球磨等）；③沉积（PVD、CVD、电化学）；④沉淀反应（溶胶-凝胶、时效沉淀）。","c1"]]</script>
