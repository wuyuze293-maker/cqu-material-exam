function loadState(){try{var s=JSON.parse(sg(LK,'null'));if(!s)return;if(s.A)A=s.A;if(s.B)B=s.B;if(s.W)W=s.W;if(s.L)L=s.L;if(s.RD)RD=s.RD;if(s.RH)RH=s.RH;if(s.RI!=null)S.reciteIdx=s.RI;if(s.RC)S.reciteCategory=s.RC;if(s.M)S.mode=s.M;if(s.QT)S.quizTab=s.QT;if(s.TH)S.theme=s.TH;}catch(e){}}
function saveState(){try{ss(LK,JSON.stringify({A:A,B:B,W:W,L:L,RD:RD,RH:RH,RI:S.reciteIdx,RC:S.reciteCategory,M:S.mode,QT:S.quizTab,TH:S.theme}));}catch(e){}}
loadState();document.body.dataset.theme=S.theme;
try{document.getElementById('themeBtn').textContent=S.theme=='light'?'🌙':'☀️';}catch(e){}
setInterval(function(){try{document.getElementById('cd-days').textContent=Math.max(0,Math.ceil((new Date('2026-12-19')-new Date())/864e5));}catch(e){}},60000);
try{document.getElementById('cd-days').textContent=Math.max(0,Math.ceil((new Date('2026-12-19')-new Date())/864e5));document.getElementById('mottoText').textContent=MS[mi];}catch(e){}
setInterval(function(){mi=(mi+1)%MS.length;try{document.getElementById('mottoText').textContent=MS[mi];}catch(e){}},20000);
function chName(cid){var c=CH.find(function(x){return x.id===cid;});return c?c.icon+' '+c.name:cid;}
function tCN(t){return{single:'单选',judge:'判断',fill:'填空',multi:'多选'}[t]||t;}
function tIcon(t){return{single:'📋',judge:'⚖️',fill:'✏️',multi:'☑️'}[t]||'?';}
var TC={single:0,judge:1,fill:2,multi:3};
function getFQ(){var qs=getQ();if(S.chapterFilter!=='all')qs=qs.filter(function(q){return q[1]===S.chapterFilter;});if(S.typeFilter!=='all'){var tc=TC[S.typeFilter];qs=qs.filter(function(q){return q[0]===tc;});}if(S.quizTab==='wrong')qs=qs.filter(function(q,i){return W[i+1];});if(S.quizTab==='fav')qs=qs.filter(function(q,i){return B[i+1];});if(S.searchQuery){var kw=S.searchQuery.toLowerCase();qs=qs.filter(function(q){return(q[2]||'').toLowerCase().indexOf(kw)!==-1||(q[5]||'').toLowerCase().indexOf(kw)!==-1;});}return qs;}
function getStats(){var qs=getQ(),tot=qs.length,ans=0,cor=0;for(var i=0;i<tot;i++){var aid=i+1;if(A[aid]){ans++;if(A[aid]==='c')cor++;}}return{tot:tot,ans:ans,cor:cor,wr:Object.keys(W).length,bm:Object.keys(B).length};}
function render(){try{if(S.mode==='quiz')rQ();else rR();}catch(e){console.error(e);}}
function E(id){return document.getElementById(id);}

// ===== ALL innerHTML uses BACKTICK template literals =====
// This eliminates ALL quote escaping issues!

function rQ(){
    try{E('tabbar').style.display='flex';E('reciteSubtabs').style.display='none';E('reciteStats').style.display='none';}catch(e){}
    var m=E('mainContent'),em=E('emptyState');if(!m)return;
    var pk=S.quizTab+'|'+S.chapterFilter+'|'+S.typeFilter;if(!VI[pk])VI[pk]=S.pageSize;var sn=VI[pk],qs;
    if(S.quizTab==='random'){var p=S.chapterFilter!=='all'?getQ().filter(function(q){return q[1]===S.chapterFilter;}):getQ().slice();for(var i=p.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=p[i];p[i]=p[j];p[j]=t;}qs=p.slice(0,15);sn=999;}
    else qs=getFQ();
    var st=getStats(),acc=st.ans>0?Math.round(st.cor/st.ans*100):0;
    try{
        E('statsBar').innerHTML='<span class="stat-chip">📝 '+st.tot+'</span><span class="stat-chip">✅ '+st.ans+'</span><span class="stat-chip">🎯 '+acc+'%</span><span class="stat-chip">❌ '+st.wr+'</span><span class="stat-chip">⭐ '+st.bm+'</span>';
        E('filterRow').innerHTML=CH.map(function(ch){return'<span class="filter-chip '+(S.chapterFilter===ch.id?'active':'')+'" onclick="setCF(\''+ch.id+'\')">'+ch.icon+ch.name+'</span>';}).join('');
    }catch(e){}
    if(qs.length===0){m.innerHTML='';if(em){em.style.display='block';em.querySelector('p').textContent=S.quizTab==='wrong'?'🎉 错题本已清空！':S.quizTab==='fav'?'还没有收藏题目~':'暂无题目';}return;}
    if(em)em.style.display='none';
    var disp=qs.slice(0,Math.min(sn,qs.length)),more=sn<qs.length,h='';
    if(S.quizTab==='all'&&S.chapterFilter==='all'&&S.typeFilter==='all'&&!S.searchQuery){var grp={};disp.forEach(function(q){if(!grp[q[1]])grp[q[1]]=[];grp[q[1]].push(q);});CH.forEach(function(ch){var g=grp[ch.id];if(!g||g.length===0)return;h+='<div class="section-title">'+ch.icon+' '+ch.name+'</div>';h+=g.map(qCard).join('');});}
    else h=disp.map(qCard).join('');
    if(more)h+='<div style="text-align:center;padding:12px 0 20px"><button class="bulk-btn" style="background:var(--accent);color:#fff;font-size:14px;padding:10px 40px" onclick="loadMore(\''+pk+'\')">加载更多</button></div>';
    m.innerHTML=h;
}
function loadMore(pk){VI[pk]=(VI[pk]||S.pageSize)+S.pageSize;render();}

// qCard - generates HTML string, uses backtick for onclick values
function qCard(q){
    var qs=getQ(),aid=qs.indexOf(q)+1,st=A[aid],ic=st==='c',iw=st==='w',bm=B[aid],fq=fmtQ(q);
    var h='<div class="q-card'+(ic?' correct':iw?' wrong':'')+'" id="qc_'+aid+'">';
    h+='<div class="q-meta"><span class="q-type '+fq.t+'">'+tIcon(fq.t)+' '+tCN(fq.t)+'</span><span class="q-chapter">'+chName(fq.c)+'</span><span class="q-num">#'+aid+'</span></div>';
    h+='<div class="q-question">'+fq.q+'</div><div class="q-options">';
    
    if(fq.t==='multi'){
        (fq.o||[]).forEach(function(o,i){
            var lt=String.fromCharCode(65+i),cl='opt-btn';
            if(st){if((fq.a||'').indexOf(lt)!==-1)cl+=' correct-ans';else if((L[aid]||'').indexOf(lt)!==-1)cl+=' wrong-ans';}
            h+='<button class="'+cl+'" onclick="togM('+aid+',''+lt+'')" '+(st?'disabled':'')+'><span class="opt-label">'+lt+'</span>'+(o||'').replace(/^[A-D][.、]?\s*/,'')+'</button>';
        });
        if(!st)h+='<button class="bulk-btn btn-primary" style="margin-top:8px;width:100%" onclick="subM('+aid+')">提交多选</button>';
    }else if(fq.t==='single'){
        (fq.o||[]).forEach(function(o,i){
            var lt=String.fromCharCode(65+i),cl='opt-btn';
            if(st&&lt===fq.a)cl+=' correct-ans';
            if(st&&lt!==fq.a&&iw&&L[aid]===lt)cl+=' wrong-ans';
            h+='<button class="'+cl+'" onclick="ans('+aid+',''+lt+'')" '+(st?'disabled':'')+'><span class="opt-label">'+lt+'</span>'+(o||'').replace(/^[A-D][.、]?\s*/,'')+'</button>';
        });
    }else if(fq.t==='judge'){
        h+='<button class="opt-btn'+(st&&fq.a==='对'?' correct-ans':'')+'" onclick="ans('+aid+','对')" '+(st?'disabled':'')+'><span class="opt-label">✓</span>正确</button>';
        h+='<button class="opt-btn'+(st&&fq.a==='错'?' correct-ans':'')+'" onclick="ans('+aid+','错')" '+(st?'disabled':'')+'><span class="opt-label">✗</span>错误</button>';
    }else{
        h+='<input class="fill-input" id="f_'+aid+'" placeholder="输入答案..." '+(st?'disabled':'')+'>';
        h+='<button class="bulk-btn btn-primary" style="margin-top:8px;width:100%" onclick="ans('+aid+',E('f_'+aid+'').value)" '+(st?'disabled':'')+'>提交</button>';
        if(st)h+='<div style="margin-top:8px;font-size:13px">答案：<strong style="color:var(--accent)">'+fq.a+'</strong></div>';
    }
    h+='</div>';
    if(st){
        h+='<div class="q-actions"><button class="action-btn'+(bm?' bookmarked':'')+'" onclick="tBM('+aid+')">'+(bm?'⭐ 已收藏':'☆ 收藏')+'</button><button class="action-btn" onclick="rst('+aid+')">🔄 重做</button></div>';
        h+='<div class="q-explanation show"><strong>💡 解析：</strong>'+fq.e+'</div>';
    }
    h+='</div>';
    return h;
}

function togM(aid,lt){if(!MSel[aid])MSel[aid]=[];var i=MSel[aid].indexOf(lt);if(i===-1)MSel[aid].push(lt);else MSel[aid].splice(i,1);MSel[aid].sort();var bs=document.querySelectorAll('#qc_'+aid+' .opt-btn:not(.correct-ans):not(.wrong-ans)');bs.forEach(function(b){var l=b.querySelector('.opt-label');if(l)b.style.background=MSel[aid].indexOf(l.textContent)!==-1?'var(--accent)':'';});}
function subM(aid){ans(aid,(MSel[aid]||[]).join(''));delete MSel[aid];}
function ans(aid,pick){var q=getQ()[aid-1];if(!q)return;L[aid]=pick;var fq=fmtQ(q),ok=false;if(fq.t==='multi'){var a=(fq.a||'').replace(/[、,，\s]/g,''),u=(pick||'').replace(/[、,，\s]/g,'');ok=a===u&&a.length>0;}else if(fq.t==='fill'){var a=(fq.a||'').trim().toLowerCase(),u=(pick||'').trim().toLowerCase();ok=a===u||(a.length>3&&u.indexOf(a)!==-1)||(u.length>3&&a.indexOf(u)!==-1);}else ok=pick===fq.a;A[aid]=ok?'c':'w';if(!ok)W[aid]=1;else delete W[aid];saveState();render();toast(ok?'✅ 正确！':'❌ 错误');}
function tBM(aid){if(B[aid])delete B[aid];else B[aid]=1;saveState();render();toast(B[aid]?'⭐ 已收藏':'已取消');}
function rst(aid){delete A[aid];delete W[aid];delete L[aid];saveState();render();}

function switchMode(m){S.mode=m;var ts=document.querySelectorAll('.mode-tab');ts.forEach(function(t){t.classList.remove('active');if(t.textContent.indexOf(m==='quiz'?'刷题':'背诵')!==-1)t.classList.add('active');});VI={};render();}

function rR(){
    try{E('tabbar').style.display='none';E('statsBar').innerHTML='';E('filterRow').innerHTML='';E('reciteSubtabs').style.display='block';
    E('reciteSubtabs').innerHTML='<div class="recite-subtab" style="display:flex;gap:8px"><span class="filter-chip '+(S.reciteCategory==='terms'?'active':'')+'" onclick="setRC(\'terms\')">📝 名词解释('+getTerms().length+')</span><span class="filter-chip '+(S.reciteCategory==='qna'?'active':'')+'" onclick="setRC(\'qna\')">📋 简答题('+getQna().length+')</span></div>';}catch(e){}
    var items=S.reciteCategory==='terms'?getTerms():getQna();
    if(!items||items.length===0){try{E('mainContent').innerHTML='<div class="empty-state"><div class="emoji">📭</div><p>暂无内容</p></div>';}catch(e){}return;}
    var tot=items.length,dn=Object.keys(RD).filter(function(k){return RD[k];}).length,hd=Object.keys(RH).filter(function(k){return RH[k];}).length;
    try{E('reciteStats').style.display='flex';E('reciteStats').innerHTML='<span>✅ '+dn+'/'+tot+'</span><span>🔴 '+hd+'</span><span>📊 '+Math.round(dn/tot*100)+'%</span>';}catch(e){}
    if(S.reciteIdx>=tot)S.reciteIdx=0;
    var item=items[S.reciteIdx],key=S.reciteCategory+'_'+S.reciteIdx,isDone=RD[key],isHard=RH[key],f,b;
    if(S.reciteCategory==='terms'){var ti=fmtT(item);f='<div class="r-label">📝 #'+(S.reciteIdx+1)+'/'+tot+'</div><div class="r-q">'+ti.t+'</div><div class="r-hint">👆点击查看</div>';b='<div class="r-ans-label">✅答案</div><div class="r-a">'+ti.d+'</div>';}
    else{var ni=fmtN(item);f='<div class="r-label">📋 #'+(S.reciteIdx+1)+'/'+tot+'</div><div class="r-q">'+ni.q+'</div><div class="r-hint">👆点击查看</div>';b='<div class="r-ans-label">✅答案</div><div class="r-a">'+ni.a+'</div>';}
    var dots='';for(var i=0;i<tot;i++){var dk=S.reciteCategory+'_'+i,dc='recite-dot';if(RD[dk])dc+=' done';else if(RH[dk])dc+=' hard';if(i===S.reciteIdx)dc+=' current';dots+='<span class="'+dc+'" onclick="S.reciteIdx='+i+';render()" style="cursor:pointer"></span>';}
    try{E('mainContent').innerHTML='<div style="margin-top:8px"><div class="recite-wrap"><div class="recite-card'+(isDone?' flipped':'')+'" id="reciteCard" onclick="flipCard()"><div class="recite-front">'+f+'</div><div class="recite-back">'+b+'</div></div></div><div class="recite-progress">'+dots+'</div><div class="recite-actions"><button class="recite-btn review" onclick="mkHard()">🔴复习</button><button class="recite-btn got-it" onclick="mkDone()">🟢掌握</button><button class="recite-btn skip" onclick="nxtR()">⏭跳过</button></div><div style="display:flex;justify-content:center;gap:12px;margin-top:12px"><button class="bulk-btn" style="background:var(--border)" onclick="S.reciteIdx=0;render()">🔝第一</button><button class="bulk-btn btn-danger" onclick="confirmDialog(\'重置\',\'清除背诵进度？\',rstR)">🗑️重置</button></div></div>';E('emptyState').style.display='none';}catch(e){}}
function flipCard(){var c=E('reciteCard');if(c)c.classList.toggle('flipped');}
function mkDone(){var k=S.reciteCategory+'_'+S.reciteIdx;RD[k]=1;delete RH[k];saveState();var c=E('reciteCard');if(c)c.classList.add('flipped');toast('✅已掌握');setTimeout(nxtR,500);}
function mkHard(){var k=S.reciteCategory+'_'+S.reciteIdx;RH[k]=1;delete RD[k];saveState();var c=E('reciteCard');if(c)c.classList.add('flipped');toast('🔴需复习');setTimeout(nxtR,500);}
function nxtR(){var items=S.reciteCategory==='terms'?getTerms():getQna();S.reciteIdx=(S.reciteIdx+1)%items.length;render();}
function setRC(cat){S.reciteCategory=cat;S.reciteIdx=0;saveState();render();}
function rstR(){RD={};RH={};S.reciteIdx=0;saveState();render();toast('已重置');}
function setCF(id){S.chapterFilter=id;if(S.quizTab==='random')S.quizTab='all';VI={};render();}
function setTF(id){S.typeFilter=id;if(S.quizTab==='random')S.quizTab='all';VI={};render();}
function switchQuizTab(t){S.quizTab=t;VI={};if(t!=='random'){S.chapterFilter='all';S.typeFilter='all';}var ts=document.querySelectorAll('#tabbar .tab'),m={all:'全部',random:'随机',wrong:'错题',fav:'收藏',stats:'统计'};ts.forEach(function(b){b.classList.remove('active');if(b.textContent.indexOf(m[t])!==-1)b.classList.add('active');});if(t==='stats'){sStats();return;}render();}
function sStats(){var st=getStats(),qs=getQ(),acc=st.ans>0?Math.round(st.cor/st.ans*100):0,h='<div style="text-align:center;padding:20px"><svg viewBox="0 0 100 100" style="width:100px;height:100px;transform:rotate(-90deg)"><circle cx="50" cy="50" r="44" fill="none" stroke="var(--ring)" stroke-width="6"/><circle cx="50" cy="50" r="44" fill="none" stroke="var(--accent)" stroke-width="6" stroke-dasharray="'+2*Math.PI*44+'" stroke-dashoffset="'+2*Math.PI*44*(1-acc/100)+'"/></svg><div style="font-size:20px;font-weight:700;margin-top:-60px">'+acc+'%</div></div><p style="color:var(--sub)">'+st.ans+'/'+st.tot+'题 正确'+st.cor+'</p>';CH.forEach(function(ch){var cq=qs.filter(function(q){return q[1]===ch.id;});var an=cq.filter(function(q,i){return A[qs.indexOf(q)+1];});var co=an.filter(function(q,i){return A[qs.indexOf(q)+1]==='c';});var pct=cq.length>0?Math.round(an.length/cq.length*100):0,cpct=an.length>0?Math.round(co.length/an.length*100):0;h+='<div style="padding:8px 0;border-bottom:1px solid var(--border)"><span>'+ch.icon+ch.name+'</span> <span style="font-size:12px">'+an.length+'/'+cq.length+'</span><div style="height:4px;background:var(--ring);margin-top:4px;border-radius:2px"><div style="height:100%;width:'+pct+'%;background:'+(cpct>=70?'var(--success)':cpct>=40?'var(--warning)':'var(--danger)')+';border-radius:2px"></div></div></div>';});h+='<div style="margin-top:16px;display:flex;gap:8px"><button class="bulk-btn btn-danger" onclick="confirmDialog(\'清空\',\'清空所有记录？\',rstAll)">🗑️清空</button><button class="bulk-btn btn-primary" onclick="exp()">📥导出</button><button class="bulk-btn" onclick="E(\'if\').click()" style="background:var(--card);border:1px solid var(--border)">📤导入</button><input type="file" id="if" accept=".json" style="display:none" onchange="imp(event)"></div>';try{E('mainContent').innerHTML=h;E('emptyState').style.display='none';E('filterRow').innerHTML='';}catch(e){}}
function rstAll(){A={};W={};B={};L={};RD={};RH={};S.reciteIdx=0;saveState();render();toast('已清空');}
function exp(){try{var b=new Blob([JSON.stringify({A:A,W:W,B:B,RD:RD,RH:RH,ts:new Date().toISOString()})],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='cqu_bak.json';a.click();toast('已导出');}catch(e){}}
function imp(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);confirmDialog('导入','覆盖当前进度？',function(){if(d.A)A=d.A;if(d.W)W=d.W;if(d.B)B=d.B;if(d.RD)RD=d.RD;if(d.RH)RH=d.RH;saveState();render();toast('已导入');});}catch(e){toast('格式错误');}};r.readAsText(f);e.target.value='';}
function toggleTheme(){S.theme=S.theme=='light'?'dark':'light';document.body.dataset.theme=S.theme;try{E('themeBtn').textContent=S.theme=='light'?'🌙':'☀️';}catch(e){}saveState();}
function toast(m){var e=E('toast');if(!e)return;e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},1800);}
var _cb=null;
function confirmDialog(t,m,fn){try{E('confirmTitle').textContent=t;E('confirmMsg').textContent=m;_cb=fn;E('confirmOverlay').classList.add('show');}catch(e){}}
function closeConfirm(){try{E('confirmOverlay').classList.remove('show');}catch(e){}_cb=null;}
function execConfirm(){if(_cb)_cb();closeConfirm();}
function showSheet(tp){if(tp==='menu'){var st=getStats(),c='<div class="sheet-row" onclick="closeSheet();switchMode(\'recite\')">📖背诵模式</div><div class="sheet-row" onclick="closeSheet();showSearch()">🔍搜索</div><div class="sheet-row" onclick="closeSheet();exp()">📥导出</div><div class="sheet-row" onclick="E(\'if\').click();closeSheet()">📤导入</div><div class="sheet-row" onclick="closeSheet();switchQuizTab(\'random\')">🎲随机</div><div class="sheet-row" onclick="closeSheet();confirmDialog(\'清空错题\',\'清空所有错题？\',function(){W={};saveState();render();toast(\'已清空\');})">🗑️清空错题</div><div class="sheet-row" onclick="closeSheet();confirmDialog(\'重置背诵\',\'清除进度？\',rstR)">🔄重置背诵</div><div class="sheet-row" onclick="closeSheet();toggleTheme()">'+(S.theme=='light'?'🌙暗色':'☀️亮色')+'</div><div style="padding:16px;text-align:center;font-size:11px;color:var(--sub)">V4.0 | '+st.tot+'题 | 名词'+getTerms().length+'条 | 简答'+getQna().length+'题<br>赵杰《材料科学基础》第3版</div>';try{E('sheetTitle').textContent='更多';E('sheetContent').innerHTML=c;E('sheet').classList.add('show');E('overlay').classList.add('show');}catch(e){}}}
function closeSheet(){try{E('sheet').classList.remove('show');E('overlay').classList.remove('show');}catch(e){}}
function showSearch(){try{E('mainContent').innerHTML='<input class="search-box" id="si" placeholder="搜索题目..." oninput="doSearch(this.value)" autofocus><div id="sr"></div>';E('emptyState').style.display='none';E('filterRow').innerHTML='';setTimeout(function(){var si=E('si');if(si)si.focus();},100);}catch(e){}}
function doSearch(kw){S.searchQuery=kw;if(!kw){render();return;}var qs=getFQ(),el=E('sr');if(el)el.innerHTML=qs.map(qCard).join('');}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeSheet();closeConfirm();if(S.searchQuery){S.searchQuery='';render();}}if(e.key===' '&&S.mode==='recite'){e.preventDefault();flipCard();}if(e.key==='ArrowRight'&&S.mode==='recite'){e.preventDefault();nxtR();}});
setTimeout(function(){try{render();var el=E('app-loading');if(el){el.classList.add('hide');setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},400);}}catch(e){console.error(e);var el=E('app-loading');if(el)el.innerHTML='<p style="color:#dc2626">加载失败，请刷新</p>';}},10);
</script>
