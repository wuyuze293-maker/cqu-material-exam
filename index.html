<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>重大材料考研 V4.0</title>
<style>
#app-loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;transition:opacity .3s}
#app-loading .spinner{width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#app-loading p{margin-top:16px;font-size:14px;color:#64748b}
#app-loading.hide{opacity:0;pointer-events:none}

:root{--bg:#f0f4f8;--card:#fff;--text:#1a202c;--sub:#64748b;--accent:#2563eb;--accent2:#7c3aed;--danger:#dc2626;--success:#16a34a;--warning:#ea580c;--border:#e2e8f0;--ring:#cbd5e1;--shadow:0 1px 3px rgba(0,0,0,.1);--correct:#dcfce7;--wrong:#fee2e2}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--text:#e2e8f0;--sub:#94a3b8;--accent:#3b82f6;--accent2:#8b5cf6;--border:#334155;--ring:#475569;--shadow:0 1px 3px rgba(0,0,0,.4);--correct:#14532d;--wrong:#7f1d1d}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);max-width:600px;margin:0 auto;min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom,0));overflow-x:hidden}
header{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.hdr-btns{display:flex;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:active{background:var(--accent);color:#fff}
.countdown{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;padding:10px 16px;font-size:13px;text-align:center;font-weight:600}
.countdown span{background:rgba(255,255,255,.2);padding:3px 8px;border-radius:6px;margin:0 4px}
.motto-bar{background:linear-gradient(135deg,#2563eb10,#7c3aed10);padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);font-size:12px;color:var(--sub)}
.mode-tabs{display:flex;margin:8px 16px;border-radius:12px;overflow:hidden;border:2px solid var(--accent)}
.mode-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text);border:none;transition:all .15s}
.mode-tab.active{background:var(--accent);color:#fff}
.stats-bar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
.stats-bar::-webkit-scrollbar{display:none}
.stat-chip{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;background:var(--card);border:1px solid var(--border);white-space:nowrap}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px;align-items:center}
.filter-chip{padding:5px 12px;border-radius:16px;font-size:12px;border:1px solid var(--border);background:var(--card);cursor:pointer;white-space:nowrap}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.main-content{padding:0 16px}
.section-title{font-size:14px;font-weight:700;color:var(--sub);padding:12px 0 4px}
.q-card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.q-card.correct{border-color:#22c55e;background:var(--correct)}
.q-card.wrong{border-color:#ef4444;background:var(--wrong)}
.q-meta{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.q-type{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.q-type.single{background:#dbeafe;color:#2563eb}
.q-type.judge{background:#fef3c7;color:#d97706}
.q-type.fill{background:#fce7f3;color:#db2777}
.q-chapter{font-size:11px;color:var(--sub)}
.q-num{font-size:11px;color:var(--sub);font-weight:600}
.q-question{font-size:15px;line-height:1.6;margin:8px 0 12px;font-weight:500}
.q-options{display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:14px;cursor:pointer;text-align:left;transition:all .12s;line-height:1.5;color:var(--text)}
.opt-btn:active{transform:scale(.98)}
.opt-btn.correct-ans{border-color:#22c55e;background:#dcfce7}
.opt-btn.wrong-ans{border-color:#ef4444;background:#fee2e2}
.opt-label{font-weight:700;min-width:24px;color:var(--accent)}
.q-actions{display:flex;gap:8px;margin-top:10px}
.action-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:12px;cursor:pointer;text-align:center;color:var(--text)}
.action-btn.bookmarked{background:#fef3c7;border-color:#f59e0b;color:#d97706}
.q-explanation{display:none;margin-top:10px;padding:12px;background:var(--bg);border-radius:8px;font-size:13px;line-height:1.7;border-left:3px solid var(--accent)}
.q-explanation.show{display:block}
.fill-input{width:100%;padding:10px 14px;border-radius:10px;border:2px solid var(--border);font-size:15px;background:var(--bg);color:var(--text)}
.fill-input:focus{outline:none;border-color:var(--accent)}
.empty-state{text-align:center;padding:48px 20px;color:var(--sub)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0);z-index:60}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;font-size:11px;color:var(--sub);cursor:pointer;border:none;background:none}
.tab.active{color:var(--accent)}
.tab-icon{font-size:20px}
/* Recite */
.recite-wrap{position:relative;margin-bottom:16px}
.recite-card{background:var(--card);border-radius:16px;padding:28px 20px;box-shadow:var(--shadow);border:1px solid var(--border);min-height:200px;cursor:pointer;position:relative;transition:all .3s;overflow:hidden}
.recite-card.flipped{border-color:var(--success)}
.recite-front{transition:opacity .3s}
.recite-front .r-label{font-size:12px;color:var(--sub);margin-bottom:8px}
.recite-front .r-q{font-size:17px;line-height:1.7;font-weight:600;color:var(--text)}
.recite-front .r-hint{font-size:12px;color:var(--ring);margin-top:16px;text-align:center}
.recite-back{position:absolute;top:0;left:0;right:0;bottom:0;padding:28px 20px;background:var(--card);opacity:0;transition:opacity .3s;overflow-y:auto;display:none}
.recite-card.flipped .recite-back{opacity:1;display:block}
.recite-card.flipped .recite-front{opacity:0}
.recite-back .r-ans-label{font-size:13px;color:var(--success);font-weight:700;margin-bottom:8px}
.recite-back .r-a{font-size:14px;line-height:1.9;color:var(--text)}
.recite-actions{display:flex;gap:10px;margin-top:16px;justify-content:center}
.recite-btn{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.recite-btn:active{transform:scale(.95)}
.recite-btn.got-it{background:#dcfce7;color:#16a34a}
.recite-btn.review{background:#fee2e2;color:#dc2626}
.recite-btn.skip{background:var(--border);color:var(--text)}
.recite-progress{display:flex;gap:4px;margin:12px 0 0;justify-content:center;flex-wrap:wrap}
.recite-dot{width:7px;height:7px;border-radius:50%;background:var(--ring)}
.recite-dot.done{background:var(--success)}
.recite-dot.current{background:var(--accent);width:9px;height:9px}
.recite-dot.hard{background:var(--danger)}
.recite-stats{padding:8px 16px;font-size:12px;color:var(--sub);text-align:center;display:flex;justify-content:center;gap:16px}
.recite-subtab{padding:8px 16px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:70;display:none}
.overlay.show{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translate(-50%,110%);width:100%;max-width:600px;background:var(--card);border-radius:20px 20px 0 0;z-index:80;transition:transform .3s;max-height:80vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,12px)}
.sheet.show{transform:translate(-50%,0)}
.sheet-handle{width:36px;height:4px;background:var(--ring);border-radius:2px;margin:12px auto}
.sheet-title{font-size:16px;font-weight:700;text-align:center;padding:4px 0 12px}
.sheet-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);font-size:14px;cursor:pointer}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:100;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.confirm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:90;display:none;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--card);border-radius:16px;padding:24px;width:85%;max-width:360px;text-align:center}
.confirm-box h3{font-size:16px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;color:#fff}
.btn-cancel{background:var(--border);color:var(--text)!important}
.btn-danger{background:var(--danger)}
.btn-primary{background:var(--accent)}
.search-box{width:100%;padding:10px 14px;border-radius:10px;border:2px solid var(--border);font-size:14px;background:var(--bg);color:var(--text);margin-bottom:12px}
.bulk-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.streak-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#ea580c);color:#fff}

</style></head>

<script type="application/json" id="q-data">[[0,"c1","立方晶系中，晶面族{100}包含几个等效晶面？",["A. 3个","B. 4个","C. 6个","D. 8个"],"C","立方晶系中{100}晶面族包含(100)、(010)、(001)、(̅100)、(̅010)、(̅001)，共6个等效晶面。晶面族用大括号{}表示所有对称等效晶面的集合。"],[0,"c1","立方晶系中晶向族<111>包含几个等效晶向？",["A. 4个","B. 6个","C. 8个","D. 12个"],"C","<111>晶向族包含[111]、[1̅11]、[1̅1̅1]、[11̅1]及其反向共8个等效方向。立方晶系中<111>是体对角线方向。"],[0,"c1","面心立方晶体中，(111)晶面的晶面间距与点阵常数a的关系为？",["A. d=a","B. d=a/√2","C. d=a/√3","D. d=a/2"],"C","立方晶系晶面间距公式：d=a/√(h²+k²+l²)。对于(111)面，h=1,k=1,l=1，d=a/√3。这是FCC中最密排面。"],[0,"c1","体心立方晶体中，(110)面的晶面间距为？",["A. d=a","B. d=a/√2","C. d=a/√3","D. d=a/2"],"B","对于(110)面，h=1,k=1,l=0，d=a/√(1+1+0)=a/√2。BCC中(110)是密排面。"],[0,"c1","晶带定律的数学表达式为？",["A. hu+kv+lw=0","B. hu+kv+lw=1","C. h²+k²+l²=u²+v²+w²","D. h/u=k/v=l/w"],"A","晶带定律：若晶面(hkl)属于晶带轴[uvw]，则满足hu+kv+lw=0。这是判断晶面是否属于某晶带的基本判据。"],[0,"c1","7大晶系中，对称性最高的是？",["A. 立方晶系","B. 六方晶系","C. 四方晶系","D. 正交晶系"],"A","立方晶系具有4个三次对称轴（3或3̅），对称性最高。其次是六方晶系（1个六次轴），四方晶系（1个四次轴），正交晶系（3个二次轴）。"],[0,"c1","14种布拉维点阵中，属于立方晶系的有几种？",["A. 1种","B. 2种","C. 3种","D. 4种"],"C","立方晶系包含3种布拉维点阵：简单立方(P)、体心立方(I)、面心立方(F)。底心立方(C)因不满足立方对称性而不存在。"],[0,"c1","六方晶系中常用的四轴坐标系（Miller-Bravais指数），晶面指数(hkil)中i与h、k的关系为？",["A. i=h+k","B. i=-(h+k)","C. i=h-k","D. i=k-h"],"B","在四轴坐标系中，a₁、a₂、a₃三轴共面互成120°，满足a₁+a₂+a₃=0，因此i=-(h+k)。第三个指数不是独立的。"],[0,"c1","晶面指数(hkl)中数值越大，表示该晶面？",["A. 原子密度越高","B. 晶面间距越大","C. 晶面间距越小","D. 与点阵常数无关"],"C","由d=a/√(h²+k²+l²)可知，hkl数值越大，分母越大，晶面间距越小。通常低指数面原子密度高、晶面间距大。"],[0,"c1","下列哪个不是七大晶系之一？",["A. 三斜晶系","B. 单斜晶系","C. 三角晶系","D. 八面体晶系"],"D","七大晶系为：三斜、单斜、正交、四方、立方、六方、三方（菱方/三角）。没有\"八面体晶系\"。"],[0,"c1","倒易点阵中，倒易矢量g_hkl的方向代表？",[],"B","倒易矢量g_hkl=ha*+kb*+lc*，其方向垂直于正空间中的晶面(hkl)，大小等于该晶面间距的倒数|g|=1/d_hkl。"],[0,"c1","在立方晶系中，晶向[110]与晶面(110)的关系是？",["A. 平行","B. 垂直","C. 夹角45°","D. 无特殊关系"],"B","立方晶系中，同指数的晶面和晶向互相垂直（仅在立方晶系成立）。因为晶面(hkl)的法线方向即为晶向[hkl]，所以[110]是(110)面的法线方向，二者垂直。验证：晶向[uvw]在晶面(hkl)内的条件为hu+kv+lw=0，这里1×1+1×1+0×0=2≠0，说明[110]不在(110)面内。"],[1,"c1","立方晶系中，所有相互平行的晶面和晶向都具有相同的指数。",[],"立方晶系中，平行的晶面属于同一晶面族，指数成比例；平行晶向方向相同，指数也成比例。",""],[0,"c1","晶面(123)和晶面(246)是什么关系？",["A. 相互垂直","B. 相互平行","C. 夹角为45°","D. 属于不同晶带"],"B","(246)=2×(123)，两者指数成比例，代表平行的晶面。在晶体学中，指数成比例的晶面互相平行。"],[0,"c2","面心立方(FCC)晶体的配位数为？",["A. 6","B. 8","C. 12","D. 4"],"C","FCC结构中每个原子周围有12个最近邻原子，配位数为12。这是密排结构的特征，致密度为0.74。"],[0,"c2","体心立方(BCC)晶体的致密度约为？",["A. 0.52","B. 0.68","C. 0.74","D. 0.80"],"B","BCC致密度=原子体积/晶胞体积。BCC含2个原子，晶胞体积a³，原子半径r=√3a/4，致密度=2×(4/3)πr³/a³≈0.68。"],[0,"c2","FCC晶体中每个晶胞含几个原子？",["A. 1个","B. 2个","C. 4个","D. 6个"],"C","FCC晶胞：8个顶点原子各贡献1/8 + 6个面心原子各贡献1/2 = 1+3 = 4个原子。"],[0,"c2","HCP（密排六方）晶体中，原子半径r与点阵常数a的关系为？",["A. r=a/2","B. r=a/√2","C. r=a/√3","D. r=a/4"],"A","HCP中基面上原子相互接触，2r=a，即r=a/2。理想轴比c/a=√(8/3)≈1.633。"],[0,"c2","下列哪种金属在室温下具有HCP结构？",["A. Al","B. Fe(α)","C. Mg","D. Cu"],"C","Mg（镁）在室温下为HCP结构。Al和Cu为FCC，α-Fe（铁素体）为BCC。常见HCP金属：Mg、Zn、Ti(α)、Zr(α)、Be等。"],[0,"c2","FCC晶体中最大的间隙类型是？",["A. 四面体间隙","B. 八面体间隙","C. 三角间隙","D. 两者一样大"],"B","FCC中八面体间隙半径r_o≈0.414R（R为原子半径），四面体间隙半径r_t≈0.225R。八面体间隙更大。FCC的八面体间隙位于体心和棱中点。"],[0,"c2","BCC晶体中，八面体间隙与四面体间隙哪个更大？",["A. 八面体间隙更大","B. 四面体间隙更大","C. 一样大","D. 不存在八面体间隙"],"B","BCC中四面体间隙半径≈0.291R（位于面心和棱中点），八面体间隙半径≈0.154R（位于(1/2,1/4,0)等位置）。四面体间隙比八面体间隙大。这与FCC相反（FCC中八面体间隙0.414R>四面体间隙0.225R）。注意BCC的八面体间隙虽然小但数量多，对碳原子溶解有重要意义。"],[0,"c2","NaCl型晶体结构属于什么类型的点阵？",["A. 简单立方","B. 面心立方","C. 体心立方","D. 六方"],"B","NaCl结构中，Cl⁻构成FCC点阵，Na⁺占据全部八面体间隙位置。也可以看作Na⁺和Cl⁻各自构成FCC亚点阵，互相穿插。"],[0,"c2","CsCl型晶体结构中，Cs⁺的配位数为？",["A. 4","B. 6","C. 8","D. 12"],"C","CsCl结构中Cs⁺位于8个Cl⁻构成的立方体中心，配位数为8。这是简单立方结构，不是BCC。"],[0,"c2","γ-Fe（奥氏体）的晶体结构是？",["A. BCC","B. FCC","C. HCP","D. 简单立方"],"B","γ-Fe（奥氏体）在912°C~1394°C之间稳定，具有FCC结构。α-Fe（铁素体）为BCC，δ-Fe（高温铁素体）也为BCC。"],[0,"c2","下列哪对金属在固态下可以无限互溶（形成连续固溶体）？",["A. Cu-Ni","B. Fe-C","C. Al-Si","D. Pb-Sn"],"A","形成无限固溶体的条件：同种晶体结构、原子尺寸差<15%、电负性相近。Cu-Ni均为FCC结构，原子半径差约2.5%，可无限互溶。"],[0,"c2","金刚石晶体结构中每个碳原子的配位数为？",["A. 4","B. 6","C. 8","D. 12"],"A","金刚石为共价晶体，每个碳原子以sp³杂化轨道与4个碳原子形成共价键，正四面体配位，配位数为4。"],[0,"c2","BCC晶胞中原子半径r与点阵常数a的关系为？",["A. r=a/2","B. r=√2a/4","C. r=√3a/4","D. r=a/4"],"C","BCC中体对角线方向原子相切，体对角线长=√3a=4r，故r=√3a/4。FCC中面对角线方向相切，r=√2a/4。"],[0,"c2","FCC结构中，(111)面的原子堆积方式是？",["A. 简单正方排列","B. 密排六方排列","C. ABAB...堆积","D. ABCABC...堆积"],"D","FCC结构沿[111]方向（即(111)面法线方向）的堆积顺序为ABCABC...三层重复。HCP则为ABAB...两层重复。"],[0,"c3","空位的平衡浓度随温度升高而？",["A. 降低","B. 不变","C. 升高","D. 先升后降"],"C","空位平衡浓度C=exp(-Q_f/kT)，温度T升高，指数项增大，空位浓度呈指数上升。这是热力学平衡的结果。"],[0,"c3","刃型位错的柏氏矢量与位错线的关系是？",["A. 平行","B. 垂直","C. 夹角45°","D. 任意角度"],"B","刃型位错中柏氏矢量⊥位错线。螺型位错中柏氏矢量∥位错线。混合位错中二者成任意角度。这是区分位错类型的基本判据。"],[0,"c3","位错滑移的驱动力是什么？",["A. 化学位梯度","B. 温度梯度","C. 切应力","D. 正应力"],"C","位错滑移是位错在切应力作用下沿滑移面的运动。作用于单位长度位错上的力F=τb（τ为切应力，b为柏氏矢量大小）。"],[0,"c3","刃型位错攀移的实质是？",["A. 位错线沿滑移面运动","B. 位错线垂直于滑移面运动","C. 空位或间隙原子扩散到位错线","D. 位错线旋转"],"C","刃型位错攀移是半原子面的扩展或收缩，需要空位或间隙原子的扩散。攀移方向垂直于滑移面，是一种非保守运动。螺型位错不能攀移。"],[0,"c3","Frank-Read位错源产生位错环的临界切应力与位错线长度L的关系是？",["A. τ∝L","B. τ∝1/L","C. τ∝L²","D. 无关"],"B","F-R源开动临界应力τ_c=Gb/L，与位错线长度L成反比。L越长，所需应力越小，越容易开动。"],[0,"c3","小角度晶界可以用什么模型描述？",["A. 空位模型","B. 位错模型","C. 扩散模型","D. 相变模型"],"B","小角度晶界（θ<10°~15°）可用位错模型描述：倾转晶界由一列刃型位错构成，扭转晶界由螺型位错网络构成。大角度晶界不能用位错模型。"],[0,"c3","两个柏氏矢量分别为b₁和b₂的位错反应生成新位错b₃，反应能进行的几何条件和能量条件分别是什么？",["A. b₁+b₂=b₃；|b₁|²+|b₂|²<|b₃|²","B. b₁×b₂=b₃；|b₁|²+|b₂|²=|b₃|²","C. b₁+b₂=b₃；|b₁|²+|b₂|²>|b₃|²","D. b₁+b₂=0；|b₃|=0"],"C","位错反应条件：(1)几何条件：∑b_前=∑b_后（柏氏矢量守恒）；(2)能量条件：∑|b_前|²>∑|b_后|²（反应后能量降低）。反应自发向降低弹性能方向进行。"],[0,"c3","螺型位错可以发生攀移吗？",["A. 可以","B. 不可以","C. 取决于温度","D. 取决于应力"],"B","螺型位错没有多余的半原子面，其柏氏矢量平行于位错线，不存在攀移所需的半原子面扩展/收缩机制。螺型位错只能滑移或交滑移。"],[0,"c3","面心立方晶体中全位错的柏氏矢量通常为？",["A. a<100>","B. a/2<110>","C. a/3<111>","D. a<111>"],"B","FCC中全位错柏氏矢量为a/2<110>，对应最短点阵平移矢量。BCC中全位错柏氏矢量为a/2<111>。HCP中为a/3<112̅0>。"],[0,"c3","FCC晶体中Shockley分位错的柏氏矢量是什么？",["A. a/2<110>","B. a/6<112>","C. a/3<111>","D. a/2<100>"],"B","FCC中全位错a/2[110]可分解为两个Shockley分位错：a/6[211]+a/6[12̅1]。Shockley分位错是FCC中最重要的不全位错，可滑移。"],[0,"c3","层错能高的材料，其位错交滑移？",["A. 更容易","B. 更困难","C. 不受影响","D. 无法判断"],"A","层错能高时，全位错分解成的扩展位错宽度小（分位错间距d=Gb²/(2πγ)，γ为层错能），容易束集成全位错进行交滑移。Al（高层错能）易交滑移，Cu（低层错能）难交滑移。"],[0,"c3","点缺陷中，弗兰克尔(Frenkel)缺陷是指？",["A. 只有空位","B. 只有间隙原子","C. 空位和间隙原子成对出现","D. 置换原子"],"C","弗兰克尔缺陷：原子从正常格点跳到间隙位置，同时产生一个空位和一个间隙原子，二者成对出现。肖脱基(Schottky)缺陷仅有空位。"],[0,"c3","大角度晶界的结构模型通常采用？",["A. 位错模型","B. 重合位置点阵模型(CSL)","C. 空位模型","D. 扩散模型"],"B","大角度晶界（θ>15°）不能用位错模型描述，常用CSL（重合位置点阵）模型、O点阵模型或结构单元模型。CSL用Σ值表示重合度。"],[1,"c3","空位是热力学上稳定的缺陷，间隙原子也是热力学稳定的。",[],"空位是热力学平衡缺陷，其存在使晶体自由能降低（混合熵效应）。但间隙原子的形成能远大于空位（约2-4倍），平衡浓度极低，不属于热力学稳定缺陷。",""],[0,"c4","菲克第一定律的数学表达式为？",["A. J=-D(dC/dx)","B. ∂C/∂t=D(∂²C/∂x²)","C. J=D·C","D. C=C₀exp(-Q/RT)"],"A","菲克第一定律：J=-D(dC/dx)，描述稳态扩散，扩散通量J与浓度梯度dC/dx成正比，D为扩散系数，负号表示扩散沿浓度降低方向进行。"],[0,"c4","菲克第二定律描述的是？",["A. 稳态扩散","B. 非稳态扩散","C. 反应扩散","D. 上坡扩散"],"B","菲克第二定律∂C/∂t=D(∂²C/∂x²)描述非稳态扩散，即浓度随时间变化的扩散过程。渗碳、脱碳等实际问题通常需要解菲克第二定律。"],[0,"c4","扩散系数D与温度的关系遵循什么公式？",["A. D=D₀exp(Q/RT)","B. D=D₀exp(-Q/RT)","C. D=D₀Texp(-Q/RT)","D. D=D₀/T"],"B","扩散系数服从Arrhenius公式：D=D₀exp(-Q/RT)，其中D₀为频率因子，Q为扩散激活能。lnD与1/T呈线性关系。"],[0,"c4","在置换固溶体中，扩散主要通过什么机制进行？",["A. 间隙机制","B. 空位机制","C. 直接交换机制","D. 环形交换机制"],"B","置换固溶体中溶质原子主要通过空位机制扩散：原子跳到相邻空位，等价于空位反向运动。间隙固溶体（如C在Fe中）通过间隙机制扩散，速度更快。"],[0,"c4","碳在α-Fe（BCC铁素体）中扩散比在γ-Fe（FCC奥氏体）中快，主要原因是？",["A. α-Fe中碳浓度更高","B. α-Fe致密度更低","C. α-Fe中扩散激活能更低","D. α-Fe温度更高"],"B","BCC致密度(0.68)低于FCC(0.74)，原子堆积较疏松，间隙扩散更容易。尽管BCC的间隙尺寸较小，但间隙数量多且通道更通畅，碳在α-Fe中扩散系数约比γ-Fe大100倍。"],[0,"c4","上坡扩散（扩散沿浓度升高方向进行）的驱动力是？",["A. 浓度梯度","B. 化学位梯度","C. 温度梯度","D. 应力梯度"],"B","扩散的驱动力是化学位梯度，而非浓度梯度。当化学位梯度与浓度梯度方向相反时（如存在弹性应力场或界面能效应时），原子可从低浓度向高浓度扩散，称为上坡扩散。"],[0,"c4","柯肯达尔(Kirkendall)效应证明了什么？",["A. 扩散通过空位机制进行","B. 扩散通过间隙机制进行","C. 两种组元扩散速率相同","D. 扩散与温度无关"],"A","柯肯达尔效应：在Cu-黄铜扩散偶中，发现标记面向黄铜侧移动，Zn原子扩散比Cu快。这证明了扩散通过空位机制进行，且不同组元扩散速率不同（本征扩散系数不同）。"],[0,"c4","扩散激活能Q的物理意义是？",["A. 原子振动能量","B. 原子扩散需克服的势垒高度","C. 晶格能","D. 键能"],"B","扩散激活能Q是原子从一个平衡位置跃迁到相邻位置所需克服的能量势垒。Q越大，扩散越困难。Q=空位形成能+空位迁移能（空位机制）。"],[0,"c4","晶界扩散比体扩散更快，这是因为？",["A. 晶界处原子排列更规则","B. 晶界处原子排列松散、能量高","C. 晶界处温度更高","D. 晶界处原子更大"],"B","晶界处原子排列不规则、结构疏松、能量高，原子沿晶界扩散的激活能Q_gb约为体扩散Q的0.5~0.7倍，因此晶界扩散更快（尤其在低温下）。表面扩散更快。"],[0,"c4","在半无限大固体中，恒定表面浓度C_s的扩散问题，其初始条件和边界条件对应的解包含什么函数？",["A. 指数函数","B. 对数函数","C. 误差函数erf","D. 三角函数"],"C","恒定表面浓度扩散解：C(x,t)=C_s-(C_s-C₀)erf(x/(2√(Dt)))，含误差函数erf。常用于渗碳问题的计算。"],[0,"c4","下列因素中，哪个对扩散速率的影响最大？",["A. 晶体结构","B. 温度","C. 晶粒大小","D. 杂质含量"],"B","温度对扩散速率影响最大，扩散系数D与温度呈指数关系。温度每升高几十度，D可能增大数倍。其次是晶体结构（致密度）、扩散机制等因素。"],[1,"c4","扩散总是从高浓度区域向低浓度区域进行。",[],"扩散的驱动力是化学位梯度而非浓度梯度。当化学位梯度与浓度梯度方向相反时，可发生上坡扩散（从低浓度向高浓度）。例如调幅分解就是典型的上坡扩散过程。",""],[0,"c5","吉布斯相律的表达式为？",["A. f=C-P+1","B. f=C-P+2","C. f=C+P-2","D. f=P-C+2"],"B","吉布斯相律：f=C-P+2（常压下f=C-P+1），其中f为自由度，C为组元数，P为相数。用于确定平衡系统中独立可变因素的数量。"],[0,"c5","二元匀晶相图中，液相线和固相线之间的区域为？",["A. 单相区","B. 两相区（L+α）","C. 三相区","D. 过冷区"],"B","二元匀晶相图中液相线与固相线之间为L+α两相共存区。该区域内可用杠杆定律计算液相和固相的相对量。"],[0,"c5","共晶反应的通式为？",["A. L→α+β","B. α→β+L","C. L+α→β","D. α+β→L"],"A","共晶反应：L→α+β，液相在恒温下同时析出两个固相。共晶点为三相平衡，自由度f=2-3+1=0（恒压）。"],[0,"c5","包晶反应的通式为？",["A. L→α+β","B. L+α→β","C. α→β+L","D. α+β→L"],"B","包晶反应：L+α→β，液相与一个固相反应生成另一个固相。包晶反应也是恒温下的三相平衡反应。"],[0,"c5","Fe-Fe₃C相图中，共析反应的温度和成分分别为？",["A. 1148°C, 4.3%C","B. 727°C, 0.77%C","C. 1495°C, 0.17%C","D. 727°C, 0.0218%C"],"B","Fe-Fe₃C相图三个关键反应：(1)包晶反应1495°C,0.17%C: L+δ→γ；(2)共晶反应1148°C,4.3%C: L→γ+Fe₃C（莱氏体）；(3)共析反应727°C,0.77%C: γ→α+Fe₃C（珠光体）。"],[0,"c5","珠光体的组成相是？",["A. 铁素体+奥氏体","B. 铁素体+渗碳体","C. 奥氏体+渗碳体","D. 铁素体+马氏体"],"B","珠光体是奥氏体在727°C共析分解的产物：γ→α+Fe₃C，由铁素体（α）和渗碳体（Fe₃C）片层交替组成。含碳量0.77%。"],[0,"c5","亚共析钢的室温平衡组织为？",["A. 珠光体","B. 珠光体+铁素体","C. 珠光体+二次渗碳体","D. 莱氏体+珠光体"],"B","亚共析钢（0.0218%<C<0.77%）室温平衡组织：先共析铁素体+珠光体。过共析钢（0.77%<C<2.11%）：珠光体+二次渗碳体。"],[0,"c5","杠杆定律适用于什么区域？",["A. 单相区","B. 两相区","C. 三相区","D. 固相线以下"],"B","杠杆定律仅适用于两相区，用于计算两平衡相的相对量。在三相区，杠杆定律不能直接应用（自由度为0，三相比例不确定）。"],[0,"c5","含碳量0.45%的亚共析钢，在室温下的珠光体相对量约为？",["A. 45%","B. 55%","C. 65%","D. 75%"],"B","杠杆定律：珠光体%=(0.45-0.0218)/(0.77-0.0218)×100%≈57%。先共析铁素体≈43%。亚共析钢中碳含量越高，珠光体越多。"],[0,"c5","共晶白口铸铁（含碳4.3%）的室温组织为？",["A. 珠光体","B. 莱氏体","C. 莱氏体+一次渗碳体","D. 变态莱氏体"],"D","共晶白口铸铁凝固得到莱氏体（γ+Fe₃C），冷却到室温时其中的奥氏体转变为珠光体，得到变态莱氏体（珠光体+Fe₃C）。"],[0,"c5","二元共晶相图中，共晶点对应的自由度f为？",["A. 0","B. 1","C. 2","D. 3"],"A","常压下二元系共晶点：C=2，P=3（L+α+β），f=C-P+1=2-3+1=0。自由度为零意味着共晶反应必须在恒温下进行。"],[0,"c5","在Fe-Fe₃C相图中，碳在奥氏体中的最大溶解度为？",["A. 0.0218%","B. 0.77%","C. 2.11%","D. 4.3%"],"C","碳在γ-Fe（奥氏体）中最大溶解度为2.11%（1148°C时）。碳在α-Fe（铁素体）中最大溶解度仅0.0218%（727°C时）。FCC的八面体间隙虽比BCC大，但γ-Fe的溶解度更大是因为FCC间隙尺寸更大。"],[0,"c5","二元相图中，液相完全互溶而固相完全不互溶时，相图类型为？",["A. 匀晶相图","B. 共晶相图","C. 包晶相图","D. 偏晶相图"],"B","液相完全互溶+固相完全不互溶→共晶相图。液相完全互溶+固相完全互溶→匀晶相图。这是根据液固相溶情况判断相图类型的基本方法。"],[0,"c5","铁碳合金中，二次渗碳体从哪里析出？",["A. 液相","B. 铁素体","C. 奥氏体","D. 莱氏体"],"C","二次渗碳体（Fe₃C_II）是从奥氏体中沿晶界析出的。随温度降低，奥氏体溶碳能力下降（从2.11%降至0.77%），过饱和的碳以Fe₃C形式析出。"],[0,"c5","三元相图中，等温截面图的主要作用是？",["A. 表示凝固过程","B. 表示特定温度下的相平衡关系","C. 表示液相面投影","D. 表示相变动力学"],"B","三元相图的等温截面（水平截面）表示固定温度下的相区分布和相平衡关系。变温截面（垂直截面）用于分析凝固路径。液相面投影图表示初生相。"],[1,"c5","铁碳相图中，共晶反应和共析反应都是恒温下进行的。",[],"共晶反应(L→γ+Fe₃C,1148°C)和共析反应(γ→α+Fe₃C,727°C)均为三相平衡反应，恒压下自由度f=0，必须在恒定温度下进行。",""],[0,"c6","均匀形核的临界晶核半径r*与过冷度ΔT的关系为？",["A. r*∝ΔT","B. r*∝1/ΔT","C. r*∝ΔT²","D. 无关"],"B","临界晶核半径r*=2γ·T_m/(ΔH·ΔT)，与过冷度ΔT成反比。过冷度越大，临界半径越小，越容易形核。"],[0,"c6","与均匀形核相比，非均匀形核的临界形核功？",["A. 更大","B. 相同","C. 更小","D. 可能大也可能小"],"C","非均匀形核（在模壁、杂质等基底上形核）的临界形核功ΔG*_het=ΔG*_hom·f(θ)，f(θ)≤1，润湿角θ越小，形核功越小。实际凝固几乎都是非均匀形核。"],[0,"c6","晶体长大时，光滑界面（小平面界面）的生长机制是？",["A. 连续生长","B. 二维形核或螺型位错生长","C. 扩散控制生长","D. 对流控制生长"],"B","光滑界面（原子尺度上平整）需通过二维形核或螺型位错提供的台阶生长。粗糙界面（原子尺度上粗糙）可连续生长，速度更快。金属多为粗糙界面，非金属多为光滑界面。"],[0,"c6","成分过冷产生的根本原因是？",["A. 温度梯度不足","B. 凝固界面前沿溶质富集导致液相线温度变化","C. 冷却速度太快","D. 形核率不足"],"B","成分过冷：凝固时溶质在界面前沿富集（k₀<1时），液相线温度随成分变化而降低，当实际温度低于液相线温度时即产生成分过冷。成分过冷是决定晶体生长形态的关键因素。"],[0,"c6","获得细晶组织的常用方法不包括？",["A. 增大过冷度","B. 加入变质剂","C. 采用振动搅拌","D. 减慢冷却速度"],"D","细化晶粒方法：增大过冷度（提高形核率）、加入变质剂（非均匀形核）、振动搅拌（破碎枝晶）。减慢冷却速度会降低形核率，导致晶粒粗大。"],[0,"c6","铸锭的典型宏观组织从外到内依次为？",["A. 等轴晶区→柱状晶区→细晶区","B. 细晶区→柱状晶区→等轴晶区","C. 柱状晶区→细晶区→等轴晶区","D. 等轴晶区→细晶区→柱状晶区"],"B","铸锭三层结构：表层细晶区（激冷区）→中层柱状晶区→中心等轴晶区。表层因激冷快速形核，柱状晶沿热流方向择优生长，中心因成分过冷形成等轴晶。"],[0,"c6","凝固时，形核率N和长大速率G的比值N/G对晶粒大小的影响是？",["A. N/G越大，晶粒越细","B. N/G越大，晶粒越粗","C. N/G与晶粒大小无关","D. G/N越大，晶粒越细"],"A","N/G比值越大，晶粒越细小。增大过冷度可同时提高N和G，但N增加更快，因此快冷可得细晶组织。"],[0,"c6","均匀形核的临界形核功ΔG*与什么有关？",["A. 仅与界面能有关","B. 与界面能和体积自由能差有关","C. 仅与温度有关","D. 仅与成分有关"],"B","ΔG*=16πγ³/(3ΔG_v²)，其中γ为界面能，ΔG_v为单位体积固液相自由能差（与过冷度ΔT成正比）。过冷度增大→ΔG_v增大→ΔG*减小→形核更容易。"],[0,"c6","单晶生长中，为获得单晶通常采用什么方法？",["A. 尽可能快的冷却","B. 引入大量形核剂","C. 保证只有一个晶核并控制其生长","D. 搅拌熔体"],"C","单晶生长方法（提拉法Czochralski、布里奇曼法等）的核心是控制只有一个晶核形成并稳定生长。工业上还常用籽晶法。"],[1,"c6","实际金属的凝固总是在过冷的条件下进行的。",[],"从热力学角度，只有当温度低于理论熔点T_m（即有过冷度ΔT）时，固相自由能低于液相，凝固才有驱动力。实际凝固必须有形核过冷度。",""],[0,"c7","施密特(Schmid)定律的表达式为？",["A. τ_c=σ·cosφ·cosλ","B. τ_c=σ/cosφ","C. τ_c=σ·sinφ","D. τ_c=σ·tanλ"],"A","施密特定律：τ_c=σ·cosφ·cosλ=σ·m（m为施密特因子），当分解到滑移方向上的切应力达到临界分切应力τ_c时，滑移系开动。cosφ·cosλ最大的取向为软取向。"],[0,"c7","FCC晶体有多少个独立的滑移系？",["A. 6个","B. 8个","C. 12个","D. 24个"],"C","FCC：滑移面{111}×4个，滑移方向<110>×3个=12个滑移系。但独立滑移系只有5个（满足一般塑性变形的von Mises条件）。BCC有12-48个滑移系，HCP仅3-6个。"],[0,"c7","多晶体塑性变形时，为保证各晶粒变形的协调性，至少需要几个独立滑移系？",["A. 3个","B. 5个","C. 8个","D. 12个"],"B","von Mises准则：多晶体各晶粒间变形需协调，至少需要5个独立滑移系。FCC恰好有12个滑移系（5个独立），塑性好。HCP独立滑移系不足，塑性差。"],[0,"c7","加工硬化的微观机制主要是？",["A. 晶粒细化","B. 位错密度增加及相互缠结","C. 相变强化","D. 固溶强化"],"B","加工硬化（应变硬化）是因塑性变形使位错密度急剧增加（从10⁶~10⁷增至10¹¹~10¹²/cm²），位错相互缠结、交割，运动阻力增大，强度硬度升高，塑性韧性下降。"],[0,"c7","回复阶段的微观机制主要是？",["A. 位错的滑移","B. 点缺陷运动和位错的重新排列","C. 大角度晶界迁移","D. 相变"],"B","回复阶段：低温时点缺陷（空位、间隙原子）运动消失；高温时位错滑移和攀移→位错重新排列→多边形化（形成亚晶）。回复不涉及大角度晶界迁移，组织基本不变。"],[0,"c7","再结晶的驱动力是？",["A. 温度梯度","B. 变形储存能（畸变能）","C. 相变驱动力","D. 浓度梯度"],"B","再结晶驱动力是冷变形储存的畸变能（主要是位错弹性能）。再结晶通过大角度晶界迁移，无畸变的新晶粒吞并变形组织，使能量降低。再结晶不是相变，晶体结构不变。"],[0,"c7","再结晶温度通常与熔点的关系为？",["A. T_再≈(0.1~0.2)T_m","B. T_再≈(0.3~0.5)T_m","C. T_再≈(0.6~0.8)T_m","D. T_再≈T_m"],"B","纯金属再结晶温度T_再≈(0.35~0.4)T_m（K），高纯度时更低。合金元素、第二相粒子、预变形量等都会影响再结晶温度。工程上再结晶退火温度通常比T_再高100~200°C。"],[0,"c7","影响再结晶后晶粒大小的因素，变形量在什么范围时晶粒最大？",["A. 很小（<5%）","B. 临界变形度（约2%~10%）","C. 中等变形（30%~50%）","D. 很大（>80%）"],"B","临界变形度（约2%~10%）时，形核率极低而少数晶核可充分长大，导致再结晶后晶粒异常粗大。应避免在临界变形度范围内进行再结晶退火。"],[0,"c7","热加工与冷加工的区别在于？",["A. 是否加热","B. 加工温度是否高于再结晶温度","C. 变形量大小","D. 变形速度"],"B","热加工：加工温度>T_再（约0.5T_m以上），变形同时发生再结晶（动态再结晶），不产生加工硬化。冷加工：加工温度<T_再，产生加工硬化。温加工介于两者之间。"],[0,"c7","孪生变形通常在什么条件下发生？",["A. 滑移容易进行的取向","B. 滑移难以进行的取向或高速变形","C. 任何条件下都可发生","D. 只有单晶中"],"B","孪生通常在滑移系开动困难的条件下发生：HCP金属（滑移系少）、BCC金属低温高速变形、FCC金属极低温变形。孪生的临界切应力通常高于滑移。"],[0,"c7","BCC金属的滑移方向为？",["A. <110>","B. <111>","C. <112>","D. <100>"],"B","BCC滑移方向始终为密排方向<111>，滑移面可为{110}、{112}或{123}（取决于温度）。FCC滑移方向<110>，滑移面{111}。HCP滑移方向<112̅0>。"],[0,"c7","回复过程中电阻率显著下降，主要是因为？",["A. 位错密度降低","B. 点缺陷（空位）浓度大幅降低","C. 晶粒长大","D. 相变"],"B","回复阶段电阻率下降主要是点缺陷（特别是空位）浓度降低所致。位错对电阻率贡献较小，位错密度的显著降低发生在再结晶阶段。"],[0,"c7","细化晶粒可以提高材料的？",["A. 强度","B. 塑性","C. 强度和塑性","D. 仅硬度"],"C","细晶强化是唯一能同时提高强度和塑性的方法。Hall-Petch公式σ_s=σ₀+kd^(-1/2)，晶粒越细，强度越高；同时细晶使变形更均匀，塑性也提高。"],[1,"c7","再结晶后的晶粒大小仅取决于再结晶退火温度。",[],"再结晶晶粒大小受多因素影响：(1)预变形量（临界变形度时最大）；(2)退火温度（温度越高晶粒越大）；(3)原始晶粒度；(4)杂质和第二相粒子（阻碍晶界迁移）。不仅仅是退火温度。",""],[0,"c8","工程应力-应变曲线上，屈服强度的定义为？",["A. 产生0.2%塑性应变对应的应力","B. 最大载荷对应的应力","C. 断裂时的应力","D. 弹性极限"],"A","屈服强度σ_0.2（条件屈服强度）定义为产生0.2%残余塑性应变对应的应力值。有明显屈服平台的低碳钢则取下屈服点。"],[0,"c8","断面收缩率ψ的计算公式为？",["A. ψ=(l₁-l₀)/l₀×100%","B. ψ=(A₀-A₁)/A₀×100%","C. ψ=A₁/A₀×100%","D. ψ=l₀/l₁×100%"],"B","断面收缩率ψ=(A₀-A₁)/A₀×100%，其中A₀为原始截面积，A₁为断后最小截面积。ψ是衡量材料塑性的重要指标，比延伸率更真实反映塑性。"],[0,"c8","Hall-Petch公式描述了屈服强度与什么的关系？",["A. 温度","B. 应变速率","C. 晶粒尺寸","D. 位错密度"],"C","Hall-Petch: σ_s=σ₀+k·d^(-1/2)，晶粒越细（d越小），屈服强度越高。这是细晶强化的理论依据，晶界阻碍位错运动。"],[0,"c8","疲劳断裂的特征不包括？",["A. 断裂应力低于屈服强度","B. 断口有海滩花样（疲劳辉纹）","C. 无明显塑性变形","D. 在高温下发生"],"D","疲劳断裂特点：低应力（<σ_s）下发生、无明显塑性变形（脆性断裂特征）、有裂纹源→扩展区→瞬断区。疲劳不一定在高温发生，高温下的循环载荷失效称为热机械疲劳。"],[0,"c8","布氏硬度HB的测试采用什么压头？",["A. 金刚石圆锥","B. 淬硬钢球或硬质合金球","C. 金刚石四棱锥","D. 钢球"],"B","布氏硬度用淬硬钢球（HB）或硬质合金球（HBW）压头，适合较软材料。洛氏硬度HR用金刚石圆锥或钢球。维氏硬度HV用金刚石四棱锥。"],[0,"c8","断裂韧性K_IC表征材料抵抗什么的能力？",["A. 塑性变形","B. 弹性变形","C. 裂纹失稳扩展","D. 疲劳"],"C","断裂韧性K_IC（平面应变断裂韧性）表征含裂纹材料抵抗裂纹失稳扩展的能力，是材料常数。当裂纹尖端的应力强度因子K_I≥K_IC时，裂纹失稳扩展导致断裂。"],[0,"c8","应力腐蚀开裂(SCC)需要哪些条件？",["A. 仅拉应力","B. 仅腐蚀环境","C. 拉应力+特定腐蚀环境","D. 压应力+腐蚀环境"],"C","SCC三要素：拉应力（含残余应力）+特定腐蚀介质+敏感材料。三者缺一不可。压应力不会导致SCC。常见如黄铜的氨脆、奥氏体不锈钢的Cl⁻应力腐蚀。"],[0,"c8","蠕变曲线通常分为几个阶段？",["A. 2个","B. 3个","C. 4个","D. 5个"],"B","典型蠕变曲线三阶段：(1)减速蠕变（瞬态蠕变）；(2)恒速蠕变（稳态蠕变，最重要阶段）；(3)加速蠕变（导致断裂）。温度≥0.3~0.5T_m时蠕变显著。"],[0,"c8","下列哪种强化机制对提高高温蠕变抗力最有效？",["A. 加工硬化","B. 细晶强化","C. 第二相弥散强化","D. 固溶强化"],"C","高温蠕变时，晶界是薄弱环节（晶界滑动），细晶反而不利。弥散分布的第二相粒子（如氧化物弥散强化ODS合金）可有效阻碍位错运动和晶界滑动，提高蠕变抗力。"],[1,"c8","硬度测试是一种破坏性试验。",[],"硬度测试通常是微损或无损的（仅表面微小压痕），属于非破坏性检测方法。硬度与强度有经验换算关系，工程中广泛应用。",""],[0,"c9","德拜(Debye)模型描述的是什么？",["A. 电导率","B. 晶格热容","C. 热膨胀","D. 扩散"],"B","德拜模型描述晶格振动对热容的贡献。低温下C_v∝T³（德拜T³定律），高温下C_v趋近于3R（杜隆-珀替定律）。德拜温度Θ_D是重要参数。"],[0,"c9","金属热膨胀的微观机理是？",["A. 原子间距增大","B. 原子间势能曲线的不对称性","C. 电子运动加快","D. 缺陷增多"],"B","热膨胀源于原子间相互作用势能曲线的不对称性：温度升高→原子振动振幅增大→原子间平均距离增大（因排斥力比吸引力变化更陡）→宏观膨胀。"],[0,"c9","纯金属的电阻率随温度升高而？",["A. 降低","B. 不变","C. 升高","D. 先降后升"],"C","金属电阻主要源于电子与晶格振动（声子）的散射。温度升高→晶格振动加剧→散射增强→电阻率升高。纯金属ρ=ρ₀+ρ(T)，ρ(T)≈αT（高温近似线性）。"],[0,"c9","马西森(Matthiessen)定则描述的是？",["A. 电阻率的加和性","B. 热导率的加和性","C. 扩散系数的加和性","D. 弹性模量的加和性"],"A","马西森定则：ρ=ρ_热+ρ_残，总电阻率=热振动贡献（与温度有关）+残余电阻率（杂质和缺陷贡献，与温度无关）。合金电阻率遵循：ρ=ρ₀+ρ'(T)+ρ''(C)。"],[0,"c9","金属的热导率主要由什么贡献？",["A. 晶格振动（声子）","B. 自由电子","C. 空位运动","D. 以上各占一半"],"B","纯金属导热主要靠自由电子（电子导热），电子导热贡献远大于声子导热。陶瓷等非金属主要靠声子导热。Wiedemann-Franz定律：κ/(σT)=L（Lorentz常数）。"],[0,"c9","居里温度是指？",["A. 超导转变温度","B. 铁磁-顺磁转变温度","C. 熔点","D. 再结晶温度"],"B","居里温度（Curie温度T_c）是铁磁性材料由铁磁态转变为顺磁态的临界温度。Fe:T_c≈770°C，Ni:T_c≈358°C，Co:T_c≈1120°C。高于T_c时铁磁性消失。"],[0,"c9","荧光(光致发光)分析中，材料的特征光谱主要取决于？",["A. 晶粒大小","B. 能带结构（电子能级）","C. 密度","D. 硬度"],"B","光致发光（荧光/磷光）源于电子在能级间的跃迁，光谱特征取决于材料的能带结构（禁带宽度、杂质能级、缺陷能级等）。可用于材料成分和缺陷分析。"],[1,"c9","所有材料的电阻率都随温度升高而增大。",[],"金属电阻率随温度升高而增大（正温度系数）。但半导体和绝缘体电阻率随温度升高而降低（负温度系数），因为载流子浓度增大。超导体在临界温度以下电阻率为零。",""],[2,"c1","立方晶系中晶面间距公式为 d = a / √(_____)。",[],"立方晶系晶面间距公式：d_hkl = a/√(h²+k²+l²)。这是计算晶面间距的基本公式，只适用于立方晶系。其他晶系公式更复杂。",""],[2,"c2","FCC晶体每个晶胞中含有_____个原子。",[],"FCC晶胞：8个顶点×1/8 + 6个面心×1/2 = 1+3 = 4个原子。",""],[2,"c2","γ-Fe（奥氏体）的晶体结构是_____。",[],"γ-Fe在912°C~1394°C之间为FCC结构。FCC的致密度0.74，配位数12，最大溶碳量2.11%。",""],[2,"c3","刃型位错的柏氏矢量与位错线_____（填\"平行\"或\"垂直\"）。",[],"刃型位错：柏氏矢量⊥位错线。螺型位错：柏氏矢量∥位错线。这是区分位错类型的根本判据。",""],[2,"c4","扩散系数D与温度的关系为 D = D₀exp(_____)。",[],"Arrhenius公式：D=D₀exp(-Q/RT)，其中Q为扩散激活能，R为气体常数。lnD~1/T为线性关系。",""],[2,"c5","Fe-Fe₃C相图中，共析反应的温度为_____°C。",[],"共析反应：γ(0.77%C) → α(0.0218%C) + Fe₃C(6.69%C)，在727°C恒温进行，产物为珠光体。",""],[2,"c5","珠光体是_____和_____的机械混合物。（两个答案用\"和\"连接）",[],"珠光体（P）是铁素体（α）和渗碳体（Fe₃C）片层交替排列的机械混合物，含碳量0.77%，由奥氏体共析分解得到。",""],[2,"c7","再结晶的驱动力是_____。",[],"再结晶驱动力是冷变形储存的畸变能。再结晶通过大角度晶界迁移消除变形组织，不是相变，晶体结构不变。再结晶温度约0.35~0.4Tm(K)。",""],[2,"c7","FCC晶体有_____个滑移系。",[],"FCC：4个{111}滑移面 × 3个<110>滑移方向 = 12个滑移系。其中独立滑移系为5个，满足Von Mises准则，故FCC金属塑性好。",""],[2,"c8","Hall-Petch公式描述屈服强度与_____的关系。",[],"Hall-Petch：σ_s=σ₀+k·d^(-1/2)，晶粒越细(d越小)，强度越高。细化晶粒是唯一同时提高强度和塑性的方法。",""],[0,"c5","铁碳合金中，含碳量0.77%的钢称为？",["A. 亚共析钢","B. 共析钢","C. 过共析钢","D. 共晶白口铁"],"B","按含碳量分类：工业纯铁(C<0.0218%)、亚共析钢(0.0218%~0.77%)、共析钢(0.77%)、过共析钢(0.77%~2.11%)、亚共晶白口铁(2.11%~4.3%)、共晶白口铁(4.3%)、过共晶白口铁(>4.3%)。"],[0,"c5","Fe-Fe₃C相图中存在几个恒温转变（三相平衡反应）？",["A. 1个","B. 2个","C. 3个","D. 4个"],"C","三个恒温反应：(1)包晶1495°C：L(0.53%)+δ(0.09%)→γ(0.17%)；(2)共晶1148°C：L(4.3%)→γ(2.11%)+Fe₃C；(3)共析727°C：γ(0.77%)→α(0.0218%)+Fe₃C。"],[0,"c3","位错密度的单位通常为？",["A. 个/m³","B. 个/cm³","C. cm/cm³（cm⁻²）","D. 个/g"],"C","位错密度定义为单位体积晶体中位错线的总长度，量纲为长度/体积=cm⁻²。退火态约10⁶~10⁷cm⁻²，冷变形后可达10¹¹~10¹²cm⁻²。"],[0,"c7","下列哪种方法不能细化晶粒？",["A. 增大过冷度","B. 加入变质剂","C. 提高再结晶退火温度","D. 振动搅拌"],"C","提高再结晶退火温度会使晶粒长大（晶界迁移加速），不能细化晶粒。增大过冷度、加变质剂（促进非均匀形核）、振动搅拌（破碎枝晶）均可细化铸态组织。"],[0,"c8","金属材料拉伸时的四个阶段依次为？",["A. 弹性→屈服→强化→颈缩","B. 屈服→弹性→强化→颈缩","C. 强化→屈服→弹性→颈缩","D. 弹性→强化→屈服→颈缩"],"A","典型应力-应变曲线四阶段：(1)弹性阶段（胡克定律）、(2)屈服阶段（塑性变形开始）、(3)均匀塑性变形（强化）阶段、(4)颈缩（局部变形）→断裂。"],[0,"c6","非均匀形核比均匀形核更容易发生，是因为非均匀形核的临界形核功更小，润湿角θ越小形核功越小。当θ=0°时，ΔG*为？",["A. 等于均匀形核","B. 为0","C. 等于均匀形核的一半","D. 无穷大"],"B","ΔG*_het=ΔG*_hom·f(θ)，f(θ)=(2-3cosθ+cos³θ)/4。当θ=0°时f(0)=0，即无需形核功，基底本身就是晶核（完全润湿）。θ=180°时f=1，等同于均匀形核。"],[0,"c5","含碳量0.2%的亚共析钢缓慢冷却到室温，其组织组成物中铁素体和珠光体的相对量（质量分数）分别约为？",["A. 铁素体74%, 珠光体26%","B. 铁素体50%, 珠光体50%","C. 铁素体26%, 珠光体74%","D. 铁素体90%, 珠光体10%"],"A","杠杆定律计算：珠光体% = (0.2-0.0218)/(0.77-0.0218) × 100% ≈ 23.8%≈24%；铁素体% = 1-24% = 76%。亚共析钢碳含量越低，珠光体越少，铁素体越多。"],[0,"c5","含碳量1.0%的过共析钢室温平衡组织中，二次渗碳体的质量分数约为？",["A. 2.5%","B. 3.5%","C. 5%","D. 8%"],"B","过共析钢：先共析渗碳体(Fe₃C_II)%= (1.0-0.77)/(6.69-0.77)×100%≈3.9%≈4%，珠光体≈96%。二次渗碳体沿原奥氏体晶界呈网状分布，对韧性不利。"],[0,"c5","共晶白口铸铁（4.3%C）在1148°C发生共晶反应时，奥氏体和渗碳体的相对量为？",["A. γ 48%, Fe₃C 52%","B. γ 52%, Fe₃C 48%","C. γ 40%, Fe₃C 60%","D. γ 60%, Fe₃C 40%"],"B","杠杆定律：γ%=(6.69-4.3)/(6.69-2.11)×100%≈52.2%；Fe₃C%≈47.8%。共晶成分L(4.3%C) → γ(2.11%C) + Fe₃C(6.69%C)。"],[0,"c5","铁碳合金中，含碳量大于2.11%的铁碳合金称为？",["A. 钢","B. 工业纯铁","C. 铸铁","D. 熟铁"],"C","按Fe-Fe₃C相图：C<0.0218%为工业纯铁，0.0218%<C<2.11%为钢，C>2.11%为铸铁（白口铁）。2.11%是碳在γ-Fe中的最大溶解度。"],[0,"c5","在Fe-Fe₃C相图中，ES线的含义是？",["A. 碳在铁素体中的溶解度线","B. 碳在奥氏体中的溶解度线","C. 共析转变线","D. 液相线"],"B","ES线（A_cm线）是碳在奥氏体中的溶解度曲线，随温度降低从2.11%(1148°C)降至0.77%(727°C)。PQ线是碳在铁素体中的溶解度线。GS线是奥氏体→铁素体转变开始线。"],[0,"c5","在Fe-Fe₃C相图中，共晶反应发生在什么温度和成分？",["A. 727°C, 0.77%C","B. 1148°C, 4.3%C","C. 1495°C, 0.17%C","D. 912°C, 0%C"],"B","三相反应：包晶(L+δ→γ)1495°C/0.17%C，共晶(L→γ+Fe₃C)1148°C/4.3%C，共析(γ→α+Fe₃C)727°C/0.77%C。PSK线(A₁线)为共析线。"],[0,"c5","珠光体的片层间距与奥氏体转变温度的关系是？",["A. 转变温度越低，片层间距越大","B. 转变温度越低，片层间距越小","C. 与温度无关","D. 存在最佳温度"],"B","过冷度越大（转变温度越低），珠光体片层越细。细片状珠光体（索氏体、屈氏体）硬度强度更高。珠光体片层间距与过冷度成反比。"],[0,"c5","二元相图中，自由度f=0的含义是？",["A. 温度和成分都可变","B. 只有温度可变","C. 只有成分可变","D. 温度和成分都不可变（恒温恒成分）"],"D","常压下f=C-P+1。f=0意味着温度和平衡相成分都固定，反应必须在恒温下进行，各相成分确定。三相平衡时f=0。"],[0,"c5","二元共晶相图中，共晶点左侧合金的初生相为α，右侧合金的初生相为β。那么亚共晶合金的室温组织为？",["A. 全部共晶体","B. 初生α + 共晶体(α+β)","C. 初生β + 共晶体(α+β)","D. 全部为α相"],"B","亚共晶合金：先析出初生α相（先共晶相），剩余液体在共晶温度转变为共晶体(α+β)。过共晶合金：初生β + 共晶体。"],[0,"c5","具有包晶相图的合金，在包晶反应温度下发生什么反应？",["A. L→α+β","B. L+α→β","C. α→β+γ","D. β→α+L"],"B","包晶反应：L+α→β。典型如Fe-C合金中：L(0.53%C)+δ(0.09%C)→γ(0.17%C)，发生在1495°C。Cu-Zn、Ag-Sn等系也有包晶反应。"],[0,"c5","调幅分解(spinodal decomposition)的特点是？",["A. 需要形核过程","B. 不需要形核，靠浓度起伏自发进行","C. 只在高温发生","D. 只生成稳定相"],"B","调幅分解是连续相变，无需形核，通过上坡扩散使浓度起伏自发长大，形成调幅结构。与形核长大的不连续析出有本质区别。发生在Spinodal线内的热力学不稳定区。"],[0,"c5","铁碳相图中，A₃线（GS线）表示什么转变？",["A. 铁素体→奥氏体（加热）或奥氏体→铁素体（冷却）","B. 共析转变","C. 渗碳体溶解","D. 液相→奥氏体"],"A","GS线(A₃线)：加热时α→γ转变终了温度，冷却时γ→α转变开始温度。A₁线(PSK)为共析线727°C。A_cm线(ES)为碳在γ中溶解度线。"],[0,"c5","二元相图中的\"蝶形规则\"用于确定什么？",["A. 相区接触规则","B. 三相平衡时各相成分","C. 共晶点的位置","D. 冷却曲线斜率"],"B","蝶形规则：在二元相图的三相水平线上，中间相成分点位于液/固相线延长线的交点，形似蝴蝶。用于确定包晶或共晶反应中各相的平衡成分。"],[0,"c5","铁碳合金中，莱氏体(Ld)在室温下的形态称为？",["A. 珠光体","B. 变态莱氏体","C. 贝氏体","D. 索氏体"],"B","莱氏体在共晶温度(1148°C)生成时为γ+Fe₃C，冷却过程中γ→珠光体，室温下为珠光体+Fe₃C的机械混合物，称为变态莱氏体(Ld')。"],[0,"c5","相图热力学中，公切线法则用于确定什么？",["A. 相变温度","B. 两相平衡成分","C. 最大固溶度","D. 共晶成分"],"B","公切线法则：两相自由能-成分曲线(G-x曲线)的公切线的两个切点对应两相的平衡成分。各温度下的平衡成分连线即为相图中的相界线。"],[0,"c5","在Fe-Fe₃C相图中，室温下铁素体的最大含碳量为？",["A. 0.0218%","B. 约0.008%","C. 0.77%","D. 2.11%"],"B","铁素体中碳的溶解度很低：727°C时最大0.0218%，室温时仅约0.008%（沿PQ线下降）。多余的碳以渗碳体形式析出（三次渗碳体）。"],[0,"c5","对二元匀晶相图，固相和液相的平衡成分由什么决定？",["A. 杠杆定律","B. 等温线与液相线和固相线的交点","C. 蝶形规则","D. 公切线法则"],"B","在任一温度作等温线（连接线tie-line），与液相线的交点对应液相平衡成分，与固相线的交点对应固相平衡成分。杠杆定律用于计算两相相对量。"],[0,"c5","铁碳合金中，三次渗碳体从哪里析出？",["A. 液相","B. 奥氏体","C. 铁素体","D. 珠光体"],"C","三次渗碳体(Fe₃C_III)从铁素体中析出（沿PQ线温度降低，碳在α中溶解度下降）。一次渗碳体从液相析出，二次渗碳体从奥氏体析出。"],[0,"c5","若一个二元合金在冷却过程中发生了共晶反应，其室温组织中含有初生α相和共晶体，则该合金为？",["A. 共晶合金","B. 亚共晶合金","C. 过共晶合金","D. 无法判断"],"B","亚共晶合金：成分在共晶点左侧，初生相为α。过共晶合金初生相为β。共晶合金全部为共晶体组织，无初生相。"],[0,"c5","铁碳相图中，1148°C时奥氏体中碳的最大溶解度为2.11%，此点对应什么成分的合金？",["A. 共析钢","B. 钢与铸铁的分界","C. 共晶白口铁","D. 纯铁"],"B","2.11%C是碳在γ-Fe中的最大溶解度，也是钢(C<2.11%)与铸铁(C>2.11%)的分界线。小于此值的合金凝固时不发生共晶反应。"],[0,"c3","单位长度螺型位错的应变能约为？",["A. Gb²","B. Gb²/(4π) · ln(R/r₀)","C. Gb²/2","D. Gb/2π"],"B","螺型位错应变能近似为 Gb²/(4π)·ln(R/r₀)，刃型位错为 Gb²/(4π(1-ν))·ln(R/r₀)，刃型位错应变能约为螺型的1.5倍。应变能与b²成正比，位错倾向于取最短柏氏矢量。"],[0,"c3","两个平行刃型位错，当它们位于同一滑移面上且柏氏矢量同向时，它们之间的相互作用力表现为？",["A. 引力","B. 斥力","C. 先排斥后吸引","D. 无相互作用"],"B","同号同滑移面的平行刃型位错相互排斥，趋于均匀分布。异号则相互吸引至湮灭。位错相互作用力与距离成反比，力的方向取决于相对位置和柏氏矢量方向。"],[0,"c3","Lomer-Cottrell锁是一种什么类型的位错结构？",["A. 可动位错","B. 不可动的固定位错（压杆位错）","C. 螺型位错网络","D. 位错环"],"B","Lomer-Cottrell锁是FCC中在两个{111}滑移面上滑移的位错相遇形成的不可动位错（压杆位错），柏氏矢量不在滑移面上，起强化作用。是加工硬化的重要机制之一。"],[0,"c3","扩展位错的宽度d与层错能γ的关系为？",["A. d∝γ","B. d∝1/γ","C. d与γ无关","D. d∝γ²"],"B","扩展位错宽度d=Gb²/(2πγ)，层错能γ越低，扩展位错越宽。如铝(γ高)扩展位错窄易交滑移，铜(γ低)扩展位错宽难交滑移。"],[0,"c3","扭转晶界由什么类型的位错构成？",["A. 刃型位错","B. 螺型位错","C. 混合位错","D. 不全位错"],"B","扭转晶界由两组交叉的螺型位错构成。倾转晶界由一列平行的刃型位错构成。二者都是小角度晶界（θ<10°~15°），可用位错模型描述。"],[0,"c3","位错交割产生的\"扭折(kink)\"和\"割阶(jog)\"的区别是？",["A. 扭折在滑移面内，割阶垂直于滑移面","B. 扭折垂直于滑移面，割阶在滑移面内","C. 两者都在滑移面内","D. 两者都垂直于滑移面"],"A","扭折(kink)：交割产生的位错段仍在原滑移面内，可沿位错线滑移而消失。割阶(jog)：产生的位错段垂直于原滑移面，不能通过滑移消失，阻碍位错运动。"],[0,"c3","点缺陷中，肖脱基(Schottky)缺陷的特征是？",["A. 空位与间隙原子成对","B. 只有空位，原子迁移到表面","C. 杂质原子","D. 反位缺陷"],"B","肖脱基缺陷：原子从晶格内部迁移到晶体表面，晶体内只留下空位。为保持电中性，离子晶体中正负离子空位按比例生成。弗兰克尔缺陷：原子跳到间隙位置，空位与间隙原子成对。"],[0,"c3","面心立方晶体中，弗兰克(Frank)分位错的柏氏矢量为？",["A. a/2<110>","B. a/3<111>","C. a/6<112>","D. a/2<100>"],"B","Frank分位错（不动位错）：b=a/3<111>，是插入或抽出一层{111}面形成的，不能滑移（柏氏矢量不平行于滑移面），只能攀移。Shockley分位错：b=a/6<112>，可滑移。"],[0,"c3","位错在晶体表面露头处形成什么特征？",["A. 滑移线/滑移带","B. 裂纹","C. 气孔","D. 夹杂"],"A","大量位错滑移到晶体表面形成的台阶在光学显微镜下可见，称为滑移线或滑移带。这是塑性变形的微观证据，滑移带间距与位错运动距离有关。"],[0,"c3","多滑移(multiple slip)是指？",["A. 一个滑移系上的位错运动","B. 多个滑移系同时或交替开动","C. 晶界滑移","D. 孪生变形"],"B","当多个滑移系上的分切应力同时达到临界值时，多个滑移系同时或交替开动，称为多滑移。FCC有12个滑移系，容易出现多滑移，产生胞状位错结构。"],[0,"c4","在半无限大介质中，两无限长金属棒扩散偶（初始浓度分别为C₁和C₂）的解是什么形式？",["A. 指数衰减","B. 误差函数形式","C. 正弦函数","D. 高斯分布"],"B","扩散偶解：C(x,t)=(C₁+C₂)/2 + (C₁-C₂)/2 · erf(x/(2√(Dt)))。erf是误差函数，这是菲克第二定律的典型应用。"],[0,"c4","反应扩散（多相扩散）的特点是什么？",["A. 扩散层中浓度连续变化","B. 扩散层中出现浓度突变（相界面），各相浓度由相图决定","C. 只形成单相固溶体","D. 与温度无关"],"B","反应扩散中扩散层由多个单相区组成，相界面处浓度突变，各相浓度由相图决定。典型如钢的渗碳——表面形成γ相，内部为α相，存在明确的相界面。"],[0,"c4","离子晶体中扩散与金属中扩散的一个重要区别是？",["A. 离子晶体扩散更快","B. 离子晶体需考虑电中性条件","C. 离子晶体只有间隙扩散","D. 离子晶体扩散与温度无关"],"B","离子晶体中正负离子扩散速率通常不同，但需维持电中性，因此扩散受慢扩散离子的控制。如NaCl中Na⁺扩散快于Cl⁻，但Cl⁻的空位扩散速率限制了整体扩散。"],[0,"c4","\"短路扩散\"指的是？",["A. 电场加速扩散","B. 沿晶界、位错、表面等缺陷通道的快速扩散","C. 高温下的扩散","D. 浓度差驱动的扩散"],"B","短路扩散：沿晶界(Q_gb≈0.5~0.7Q_体)、位错(Q_d≈0.6~0.8Q_体)、表面(Q_s≈0.4~0.6Q_体)的扩散激活能低于体扩散，扩散速率更快。低温下短路扩散贡献更大。"],[0,"c4","渗碳处理属于什么类型的扩散问题？",["A. 稳态扩散","B. 非稳态扩散（恒定表面浓度）","C. 扩散偶","D. 反应扩散"],"B","渗碳为恒定表面浓度C_s的非稳态扩散，符合：C(x,t)=C_s-(C_s-C₀)erf(x/(2√(Dt)))。表面碳浓度C_s由气氛碳势决定，内部初始碳浓度C₀为基体含碳量。"],[0,"c4","提高温度对扩散的影响，下面哪种说法正确？",["A. 只提高D₀（频率因子）","B. 指数性地增大扩散系数D","C. 降低扩散激活能Q","D. 只改变浓度梯度"],"B","温度影响体现在Arrhenius式D=D₀exp(-Q/RT)的指数项中。温度升高→指数项增大→D指数上升。D₀和Q在较宽温度范围内可视为常数。"],[0,"c4","在离子晶体中掺杂高价杂质离子会产生什么效应？",["A. 提高扩散速率（产生阳离子空位）","B. 降低扩散速率","C. 无影响","D. 只影响电子导电"],"A","掺杂高价阳离子（如NaCl中掺Ca²⁺替代Na⁺），为维持电中性会产生Na⁺空位，从而提高阳离子扩散速率。这是控制离子导电和扩散的重要手段。"],[0,"c4","化学扩散系数（互扩散系数）与组元本征扩散系数的关系由什么方程描述？",["A. 菲克第一定律","B. 达肯(Darken)方程","C. 爱因斯坦方程","D. 能斯特-爱因斯坦方程"],"B","Darken方程：D̃ = N_AD_B + N_BD_A（互扩散系数与本征扩散系数的关系）。由柯肯达尔效应引入，考虑了标记面移动。D_A和D_B为组元的本征扩散系数。"],[0,"c7","回复过程中，残余变形量随时间的衰减通常满足什么关系？",["A. 线性衰减","B. 对数衰减（与lnt成正比）","C. 指数衰减","D. 抛物线衰减"],"B","回复过程中性能变化遵循对数规律：Δσ∝-lnt（或ΔX∝lnt），回复速率随时间减小。而再结晶遵循Avrami方程（形核长大动力学），是S形曲线。"],[0,"c7","再结晶动力学通常用哪个方程描述？",["A. Johnson-Mehl-Avrami(JMA)方程","B. Arrhenius方程","C. 菲克定律","D. Hall-Petch方程"],"A","再结晶体积分数f=1-exp(-Btⁿ)，即JMA方程（也称Avrami方程）。n为Avrami指数，反映形核和长大机制；B与温度有关（Arrhenius关系）。"],[0,"c7","热加工时发生的回复和再结晶分别称为？",["A. 静态回复和静态再结晶","B. 动态回复和动态再结晶","C. 高温回复和高温再结晶","D. 快速回复和快速再结晶"],"B","热加工中变形与回复/再结晶同时发生：动态回复和动态再结晶。变形后冷却过程中发生静态回复和静态再结晶。动态再结晶可得细小的等轴晶粒。"],[0,"c7","材料表现出超塑性的条件不包括？",["A. 细小等轴晶粒（<10μm）","B. 较高温度（>0.5T_m）","C. 低应变速率","D. 大晶粒尺寸"],"D","超塑性条件：(1)细小等轴晶粒（通常<10μm，最好<5μm）；(2)温度>0.5T_m；(3)低应变速率（10⁻⁴~10⁻²/s）；(4)晶粒在变形中保持等轴（晶界滑移为主）。大晶粒无超塑性。"],[0,"c7","形变织构对材料性能的影响，最典型的是？",["A. 各向同性增强","B. 产生各向异性（如制耳效应）","C. 提高韧性","D. 降低强度"],"B","形变织构使材料力学性能产生各向异性。深冲板材时因各向异性产生\"制耳（earing）\"现象。退火织构（再结晶织构）也有类似效应。织构用极图或ODF表示。"],[0,"c7","残余应力分为哪三类？",["A. 拉应力、压应力、切应力","B. 第一类（宏观）、第二类（晶粒间）、第三类（晶内点阵畸变）","C. 表面应力、内部应力、界面应力","D. 弹性应力、塑性应力、热应力"],"B","三类残余应力：(1)宏观内应力（第一类，整个工件范围）；(2)晶粒间内应力（第二类，晶粒尺度）；(3)晶内点阵畸变（第三类，位错和点缺陷引起）。X射线衍射可测第二、三类。"],[0,"c7","二次再结晶的驱动力是什么？",["A. 变形储存能","B. 界面能（晶界能降低）","C. 相变自由能","D. 温度梯度"],"B","二次再结晶（异常晶粒长大）驱动力是晶界能降低，少数大晶粒吞并小晶粒，晶粒异常长大。它发生在一次再结晶完成后、正常晶粒长大受到抑制（如有第二相粒子钉扎）时。"],[0,"c1","立方晶系中，(110)面和(101)面的夹角为？",["A. 45°","B. 60°","C. 90°","D. 120°"],"B","立方晶系晶面夹角公式：cosφ=(h₁h₂+k₁k₂+l₁l₂)/√[(h₁²+k₁²+l₁²)(h₂²+k₂²+l₂²)]。(110)与(101)：cosφ=(1+0+0)/√(2×2)=1/2，φ=60°。"],[0,"c1","六方晶系中，若已知晶面指数为(hkil)，其晶面间距的表达式包含什么？",["A. 仅h和k","B. 仅h、k和l","C. h、k、i和l","D. 仅l"],"C","六方晶系d=1/√[(4/3)(h²+hk+k²)/a²+l²/c²]。四轴指数(hkil)中i=-(h+k)，实际计算时可化简为三轴。"],[0,"c1","下列哪个不是布拉维点阵（14种空间点阵）之一？",["A. 体心四方","B. 底心立方","C. 面心立方","D. 简单四方"],"B","底心立方(C)不存在，因为它不满足立方对称性（三个a轴等价但底心只在一对面有附加原子）。14种布拉维点阵：三斜P；单斜P,C；正交P,C,I,F；四方P,I；立方P,I,F；六方P；三方R。"],[0,"c1","宏观对称元素中，对称面用什么符号表示？",["A. C","B. P（或m）","C. L","D. S"],"B","宏观对称元素符号：对称面=P(或m)，对称轴=L^n(或n)，对称中心=C(或i̅)，反轴=L_i^n(或n̅)。32种点群是宏观对称元素的组合。"],[0,"c1","立方晶系具有的特征对称元素是？",["A. 1个六次轴","B. 4个三次轴","C. 1个四次轴","D. 3个二次轴"],"B","立方晶系的特征对称元素是4个三次对称轴（3或3̅），沿体对角线方向<111>。这是区分立方晶系与其他晶系的判据。"],[0,"c1","晶面(100)和晶面(200)的晶面间距之比为？",["A. 1:1","B. 2:1","C. 1:2","D. 1:√2"],"B","d_100=a/√1=a，d_200=a/√4=a/2，故d_100:d_200=2:1。指数越高，晶面间距越小。"],[0,"c1","晶带[001]包含下列哪些晶面？",["A. (100)和(010)","B. (111)和(100)","C. (110)和(111)","D. (111)和(011)"],"A","晶带定律hu+kv+lw=0。对[001]，h×0+k×0+l×1=l=0，即l=0的晶面都属于[001]晶带。所以(100)、(010)、(110)等都属于[001]晶带。(111)中l=1≠0，不属于。"],[0,"c1","一个晶体具有a≠b≠c，α=β=γ=90°的点阵常数，该晶体属于？",["A. 立方晶系","B. 正交晶系","C. 四方晶系","D. 单斜晶系"],"B","正交晶系：a≠b≠c，α=β=γ=90°。四方晶系：a=b≠c，α=β=γ=90°。单斜晶系：a≠b≠c，α=γ=90°≠β。立方：a=b=c，α=β=γ=90°。"],[0,"c2","置换固溶体中，溶质原子引起点阵畸变的程度主要取决于？",["A. 溶质原子质量","B. 溶质与溶剂原子半径差","C. 溶质原子价电子数","D. 溶质熔点"],"B","原子尺寸差是影响固溶度的首要因素。Hume-Rothery定则：尺寸差<15%才可能形成无限固溶体。尺寸差越大，点阵畸变越大，固溶度越小。"],[0,"c2","间隙固溶体中，溶质原子通常位于？",["A. 晶格格点上","B. 晶格间隙位置（八面体或四面体间隙）","C. 晶界上","D. 表面上"],"B","间隙固溶体：原子半径较小的非金属元素（C、N、H、B、O等）位于金属晶体间隙中。γ-Fe中碳位于八面体间隙，α-Fe中碳也倾向位于八面体间隙。"],[0,"c2","电子化合物（Hume-Rothery相）的晶体结构取决于什么？",["A. 原子尺寸","B. 电子浓度（价电子数/原子数）","C. 电负性差","D. 温度"],"B","电子化合物（如CuZn、Cu₃Al等）结构由电子浓度决定：e/a=3/2时BCC(β相)，e/a=21/13时复杂立方(γ相)，e/a=7/4时HCP(ε相)。"],[0,"c2","有序固溶体（超结构）在低温下原子排列的特征是？",["A. 溶质原子随机分布","B. 溶质和溶剂原子在晶格中有规律排列","C. 形成非晶结构","D. 原子完全混乱"],"B","有序固溶体（超结构）如Cu₃Au、CuZn(β')等，在低于临界温度Tc时溶质和溶剂原子占据特定位置，形成长程有序排列。X射线衍射出现超点阵线条。"],[0,"c2","鲍林第一规则（配位多面体规则）指出：离子晶体中阳离子的配位数取决于？",["A. 阴离子半径","B. 阴阳离子半径比r_c/r_a","C. 电负性","D. 温度"],"B","鲍林第一规则：配位数由r_c/r_a决定。r_c/r_a>0.732配位数8(CsCl型)，0.414~0.732配位数6(NaCl型)，0.225~0.414配位数4(ZnS型)，0.155~0.225配位数3。"],[0,"c2","Ni₃Al（γ'相）属于什么类型的中间相？",["A. 正常价化合物","B. 电子化合物","C. 间隙相","D. 几何密堆相（拓扑密堆相）"],"D","Ni₃Al是L1₂结构的几何密堆相（有序FCC），是高温合金中最主要的强化相。几何密堆相的结构特征为高配位数（>12），包括Laves相、σ相、μ相等。"],[0,"c2","无限固溶体的四个必要条件不包括？",["A. 相同晶体结构","B. 原子尺寸差<15%","C. 相同熔点","D. 电负性相近"],"C","Hume-Rothery定则：(1)尺寸差<15%；(2)相同晶体结构；(3)电负性相近；(4)相对价效应（低价溶剂可溶解更多高价溶质）。熔点相同不是必要条件（如Cu-Ni熔点差约370°C但仍无限互溶）。"],[0,"c2","典型的间隙相（如TiC、WC）具有什么特点？",["A. 低熔点、低硬度","B. 高熔点、高硬度","C. 低熔点、高硬度","D. 高熔点、低硬度"],"B","间隙相（如TiC、VC、WC、TiN等）由过渡金属与非金属（C、N）形成，非金属原子填入金属间隙，具有高熔点（>3000°C）、极高硬度，是硬质合金和耐磨涂层的基体。"],[0,"c6","固液界面的微观结构分为哪两种基本类型？",["A. 平面和曲面","B. 光滑界面（小平面）和粗糙界面（非小平面）","C. 共格和非共格","D. 对称和不对称"],"B","杰克逊(Jackson)因子α>2为光滑界面（小平面界面，原子尺度上平整），α<2为粗糙界面（非小平面界面，原子尺度上粗糙）。金属多为粗糙界面，非金属多为光滑界面。"],[0,"c6","树枝晶的生长方向在立方晶系中通常沿什么晶向？",["A. <110>","B. <111>","C. <100>","D. <112>"],"C","立方晶系枝晶主干沿<100>方向生长（热流和晶体学各向异性共同决定），二次枝晶臂垂直于主干。FCC和BCC金属枝晶均沿<100>生长。"],[0,"c6","微观偏析中最常见的是？",["A. 正常偏析（区域偏析）","B. 枝晶偏析（晶内偏析）","C. 比重偏析","D. 气体偏析"],"B","枝晶偏析（晶内偏析/显微偏析）是凝固时由于非平衡冷却、溶质在固液界面分配(k₀≠1)导致的晶粒内成分不均匀。可通过扩散退火（均匀化退火）消除。"],[0,"c6","平衡分配系数k₀=C_s/C_L，当k₀<1时，凝固过程中溶质在固液界面前沿？",["A. 富集","B. 贫化","C. 不变","D. 先富集后贫化"],"A","k₀<1时C_s<C_L，凝固时多余溶质被排入液相，在界面前沿液相中形成溶质富集层，这是产生成分过冷和枝晶偏析的根本原因。"],[0,"c6","快速凝固技术获得非晶态合金的关键是？",["A. 高纯度","B. 足够快的冷却速度（>10⁵~10⁶ K/s）","C. 高压","D. 加入大量合金元素"],"B","非晶合金（金属玻璃）需极快冷却（10⁵~10⁸K/s），使原子来不及有序排列就被\"冻结\"。常用甩带法、雾化法等。非晶无晶界、无位错，强度极高。"],[0,"c6","铸锭中V形偏析和倒V形偏析属于什么类型的偏析？",["A. 显微偏析","B. 宏观偏析（区域偏析）","C. 枝晶偏析","D. 晶界偏析"],"B","V形和倒V形偏析属于宏观偏析（区域偏析），在铸锭中心等轴晶区形成，由凝固收缩和富溶质液相的流动造成。无法通过扩散退火消除，严重时导致材料报废。"],[0,"c6","共晶合金凝固时获得层片状或棒状共晶组织，取决于什么？",["A. 冷却速度","B. 两相体积分数（体积分数较小的相倾向于棒状）","C. 温度梯度","D. 杂质含量"],"B","共晶两相中体积分数较小的相（<1/π≈32%）倾向于形成棒状（纤维状），以减少界面面积。体积分数接近时形成层片状。界面能最小化是决定因素。"],[0,"c6","定向凝固技术可获得的组织特征是？",["A. 等轴晶","B. 沿特定方向排列的柱状晶或单晶","C. 非晶","D. 细晶"],"B","定向凝固（如航空发动机涡轮叶片的定向柱晶和单晶制造）通过控制热流方向，使晶体沿<001>择优方向生长，消除横向晶界，提高高温性能。"],[0,"c7","BCC金属中常见的滑移面不包括？",["A. {110}","B. {112}","C. {123}","D. {111}"],"D","BCC滑移方向始终为<111>，滑移面可为{110}、{112}、{123}（48个滑移系）。{111}是FCC的滑移面，不是BCC的。BCC没有单一确定的密排面。"],[0,"c7","HCP金属塑性差（如Mg、Zn）的根本原因是？",["A. 原子间结合力弱","B. 独立滑移系不足（<5个）","C. 晶粒粗大","D. 致密度低"],"B","HCP通常只有基面{0001}上3个滑移系（<5个独立），不满足Von Mises准则要求的多晶体协调变形条件，故塑性差。Mg中加入Li等可激活非基面滑移。"],[0,"c7","弥散强化（如ODS合金）中，第二相粒子阻碍位错运动的机制是？",["A. 位错切过粒子","B. 位错绕过粒子（Orowan机制）或切过粒子","C. 粒子溶解","D. 粒子转动"],"B","硬粒子（不可变形）→ Orowan绕过机制，τ∝1/λ（λ为粒子间距）；软粒子（可变形）→ 切过机制，有多种强化贡献。时效强化铝合金中两种机制均有。"],[0,"c7","固溶强化中，溶质原子与位错的相互作用不包括？",["A. 弹性相互作用（尺寸效应）","B. 化学相互作用（Suzuki效应）","C. 电相互作用","D. 热相互作用"],"D","固溶强化机制：(1)弹性（Cottrell气团）；(2)模量效应；(3)电（带电位错与溶质离子）；(4)化学（Suzuki，扩展位错与溶质）；(5)有序强化。没有\"热相互作用\"这一说。"],[1,"c7","纯金属的再结晶温度随预变形量的增大而降低。",[],"预变形量增大→储存能增加→再结晶驱动力增大→再结晶温度降低。但当变形量超过一定值后，再结晶温度趋于一个稳定值（该金属的最低再结晶温度）。",""],[0,"c8","弹性模量E的物理本质是什么？",["A. 原子间结合力（键合强度）的反映","B. 位错密度","C. 晶粒大小","D. 第二相含量"],"A","弹性模量反映原子间结合力的强弱，是对组织不敏感的力学性能指标。共价键材料E最高，金属次之，聚合物最低。热处理几乎不改变弹性模量。"],[0,"c8","内耗（阻尼）产生的微观机制不包括？",["A. 位错弦振动","B. 晶界黏滞滑动","C. 弹性变形","D. 应力诱导有序化"],"C","内耗（阻尼）机制：(1)位错内耗（弦振动，Granato-Lücke模型）；(2)晶界内耗（黏滞滑动，葛庭燧发现）；(3)热弹性内耗；(4)Zener效应（应力诱导有序化）。纯弹性变形不产生内耗。"],[0,"c8","解理断裂的特征不包括？",["A. 沿特定晶面断裂","B. 断裂前无明显塑性变形","C. 宏观断口呈纤维状","D. 微观上有\\",""],"C","解理断裂：沿特定解理面（如BCC的{100}）发生的脆性断裂，断裂前几乎无塑性变形。微观有河流花样、舌状花样。宏观断口呈放射状或人字纹。纤维状是韧窝断裂的特征。"],[0,"c8","韧窝断口的微观形貌特征为？",["A. 河流花样","B. 韧窝（微孔聚集型）","C. 冰糖状（沿晶）","D. 疲劳辉纹"],"B","韧性断裂（微孔聚集型）：第二相粒子或夹杂物处形成微孔→长大→聚合→断裂，微观上呈韧窝(dimple)形貌。韧窝大小和深浅反映材料塑性。沿晶断口呈\"冰糖状\"。"],[0,"c8","疲劳极限的定义是？",["A. 材料能承受的最大应力","B. 材料经受无限次应力循环而不发生断裂的最大应力","C. 断裂时的应力","D. 屈服应力"],"B","疲劳极限σ_{-1}：钢铁等材料在对称循环应力下，经10⁷（或10⁸）次循环不断裂的最大应力。铝合金等无明确疲劳极限，工程上用10⁷次对应的条件疲劳极限。"],[0,"c8","冲击韧性的测试通常用什么试验？",["A. 拉伸试验","B. 夏比(Charpy)冲击试验或艾氏(Izod)冲击试验","C. 硬度试验","D. 疲劳试验"],"B","冲击韧性（a_k或冲击功A_K/A_KV）用摆锤式冲击试验机（夏比V型/U型缺口）测定，反映材料抵抗冲击载荷的能力，特别是缺口敏感性和韧脆转变温度。"],[0,"c8","体心立方金属（如低碳钢）存在韧脆转变温度(DBTT)，而面心立方金属几乎不存在。这是因为？",["A. BCC金属强度更高","B. BCC中位错的Peierls力对温度敏感","C. FCC金属有更多滑移系","D. BCC金属晶粒更粗大"],"B","BCC中位错运动的Peierls-Nabarro力（晶格阻力）随温度降低而急剧增大，低温下位错难以运动→脆性断裂。FCC的Peierls力对温度不敏感，低温仍保持良好塑性。"],[0,"c8","硬度测试中，维氏硬度(HV)和努氏硬度(HK)的压头形状分别为？",["A. 球形和圆锥形","B. 正四棱锥金刚石和菱形金刚石","C. 钢球和金刚石圆锥","D. 两者相同"],"B","维氏HV：正四棱锥金刚石压头（对角136°），压痕为正方形。努氏HK：菱形金刚石压头（长对角线约为短对角线7倍），适合薄层和脆性材料。洛氏HR则用金刚石圆锥或钢球。"],[0,"c8","材料的理论断裂强度σ_th与实际断裂强度σ_f的比值约为？",["A. σ_th≈σ_f","B. σ_th≈10~100σ_f","C. σ_th≈100~1000σ_f","D. σ_th≈0.01σ_f"],"C","理论强度σ_th≈E/10，实际强度远低于理论值（差2~3个数量级），因为实际材料中存在微裂纹、位错等缺陷。Griffith理论解释了这一差异：σ_f=√(2Eγ/πa)，裂纹长度a越大强度越低。"],[0,"c8","高温蠕变中，稳态蠕变速率ε̇与应力的关系通常为？",["A. ε̇∝σ（线性）","B. ε̇∝σ^n（幂律蠕变，n≈3~8）","C. ε̇∝1/σ","D. ε̇与σ无关"],"B","稳态蠕变速率ε̇∝σ^n exp(-Q/RT)，n为应力指数（通常3~8）。低应力下为扩散蠕变（n=1，Nabarro-Herring或Coble蠕变），高应力下为位错蠕变（幂律蠕变）。"],[0,"c8","磨损的五种基本类型不包括？",["A. 磨粒磨损","B. 粘着磨损","C. 疲劳磨损","D. 拉伸磨损"],"D","五种磨损：磨粒磨损、粘着磨损、疲劳磨损（接触疲劳）、腐蚀磨损（摩擦化学）、微动磨损。没有\"拉伸磨损\"。冲蚀磨损常归入磨粒磨损的变种。"],[1,"c8","细晶强化能同时提高材料的强度和塑性。",[],"Hall-Petch关系：σ_s=σ₀+kd^(-1/2)，晶粒细化使强度提高。同时细晶使变形均匀分散在更多晶粒中，推迟微裂纹形成，也提高塑性。细晶强化是唯一能同时改善强度和塑性的方法。",""],[0,"c9","爱因斯坦模型和德拜模型描述热容的主要区别是什么？",["A. 爱因斯坦模型假设所有原子振动频率相同，德拜模型考虑频率分布","B. 爱因斯坦模型更准确","C. 德拜模型不适用于低温","D. 两者完全相同"],"A","爱因斯坦模型（1907）：假设所有原子以相同频率ν_E独立振动，低温热容C_v∝exp(-Θ_E/T)，下降过快。德拜模型（1912）：考虑连续频率分布（截止频率ν_D），低温C_v∝T³与实验吻合更好。"],[0,"c9","金属的导热与导电之间存在什么关系？",["A. 没有关系","B. Wiedemann-Franz定律：κ/(σT)=常数（洛伦兹常数）","C. 导热越好导电越差","D. 只在低温有关"],"B","Wiedemann-Franz定律：κ/(σT)=L（Lorentz常数≈2.45×10⁻⁸ W·Ω/K²），表明金属导热和导电均由自由电子贡献，二者成正比。合金偏离此关系。"],[0,"c9","铁磁材料的磁滞回线中，矫顽力H_c是指？",["A. 饱和磁化强度","B. 剩余磁化强度","C. 使磁化强度降为零所需的反向磁场","D. 饱和磁场"],"C","矫顽力H_c（coercivity）：使磁化强度（或磁感应强度）降为零所需的反向磁场。H_c小→软磁材料（变压器铁芯），H_c大→硬磁材料（永磁体）。"],[0,"c9","抗磁性物质的磁化率χ为？",["A. χ>>0（很大正数）","B. χ>0（正数）","C. χ<0（负数，约10⁻⁵~10⁻⁶）","D. χ=0"],"C","抗磁性：χ为小的负值（约-10⁻⁵~-10⁻⁶），所有材料都有抗磁性贡献。顺磁性：χ为小的正值（约10⁻³~10⁻⁵）。铁磁性：χ很大正值（可达10⁴~10⁶）。"],[0,"c9","半导体的电阻率随温度升高而？",["A. 升高（正温度系数）","B. 降低（负温度系数）","C. 不变","D. 先升后降"],"B","半导体具有负温度系数(NTC)：温度↑→本征激发载流子浓度指数增大→电导率↑、电阻率↓。这与金属相反（金属温度↑→声子散射增强→电阻率↑）。"],[0,"c9","超导体的两个基本特征是什么？",["A. 零电阻和完全抗磁性（Meissner效应）","B. 零电阻和高硬度","C. 完全抗磁性和高导热","D. 高导电和高导热"],"A","超导两特征：(1)临界温度T_c以下电阻为零；(2)Meissner效应：完全排斥磁通（完全抗磁性，B=0），磁悬浮即基于此。此外还有Josephson效应等。"],[0,"c9","热障涂层(TBC)材料（如Y₂O₃稳定ZrO₂）最关键的物理性能要求是？",["A. 高导电","B. 低热导率和高熔点","C. 高密度","D. 高磁性"],"B","TBC（如YSZ）需要极低热导率（隔热）和高熔点（>2700°C），同时热膨胀系数要与金属基底匹配。YSZ是目前应用最广的TBC材料。"],[0,"c9","光致发光（荧光）中，Stokes位移是指？",["A. 发射光波长等于激发光波长","B. 发射光波长长于激发光波长（能量降低）","C. 发射光波长短于激发光波长","D. 发光强度变化"],"B","Stokes位移：发射光波长>激发光波长（光子能量减小），因为部分激发能量以声子（热）形式散失。这是光致发光的普遍特征，少数体系有反Stokes发光。"],[0,"c9","X射线衍射(XRD)分析中，布拉格方程是什么？",["A. nλ=2dsinθ","B. nλ=dcosθ","C. λ=2dcosθ","D. n=2dλsinθ"],"A","布拉格方程：nλ=2d·sinθ，其中n为反射级数，λ为X射线波长，d为晶面间距，θ为布拉格角（入射角=反射角）。是XRD分析晶体结构的基本方程。"],[0,"c9","SEM（扫描电子显微镜）与TEM（透射电子显微镜）的主要区别是？",["A. SEM分辨率更高","B. SEM观察表面形貌（二次电子），TEM观察内部微观结构","C. SEM需要超薄样品","D. 没有区别"],"B","SEM主要收集二次电子（表面形貌）和背散射电子（成分），样品制备简单。TEM电子束透射样品，分辨率更高（原子级），但需超薄样品（<100nm），可观察位错、析出相等。"],[0,"c9","能谱分析(EDS/EDX)主要用于分析材料的？",["A. 晶体结构","B. 化学成分（元素种类和含量）","C. 力学性能","D. 晶粒大小"],"B","EDS（能谱仪）利用特征X射线能量识别元素，可进行微区成分分析（定性+半定量）。常与SEM或TEM联用，探测Be以上元素。波谱仪(WDS)定量更精确但速度慢。"],[0,"c9","差示扫描量热法(DSC)可以测定材料的什么参数？",["A. 弹性模量","B. 相变温度和相变焓","C. 电导率","D. 硬度"],"B","DSC测量样品与参比物之间的热流差，可测定：熔点、玻璃化转变温度T_g、结晶温度、相变焓、比热容等。是材料热分析的核心手段之一。"],[0,"c9","透射电镜中，明场像和暗场像的成像区别是什么？",["A. 明场用透射束成像，暗场用衍射束成像","B. 明场用衍射束，暗场用透射束","C. 两者都用透射束","D. 无区别"],"A","明场像(BF)：用透射电子束（直射束）成像，无缺陷区亮，有缺陷区暗。暗场像(DF)：用某一衍射束成像，有缺陷区亮，无缺陷区暗。可选择性显示特定取向的缺陷。"],[0,"c9","Hall-Petch关系中，斜率k与什么因素有关？",["A. 晶界对位错滑移的阻碍能力","B. 晶体结构","C. 测试温度","D. 以上都是"],"D","Hall-Petch斜率k反映晶界对位错的阻碍能力，与晶体结构、合金元素、温度、应变速率等因素有关。BCC的k值通常大于FCC（BCC中位错源更易在相邻晶粒开动）。"],[1,"c1","倒易点阵中，倒易矢量g_hkl的大小等于晶面间距d_hkl。",[],"倒易矢量大小|g|=1/d_hkl，不是等于d_hkl。倒易点阵的基本性质：g_hkl垂直于晶面(hkl)，大小为该晶面间距的倒数。",""],[0,"c1","立方晶系中，晶向[110]和[100]的夹角为？",["A. 30°","B. 45°","C. 60°","D. 90°"],"B","cosφ=(1×1+1×0+0×0)/√(2×1)=1/√2≈0.707，φ=45°。晶向间夹角公式：cosφ=(u₁u₂+v₁v₂+w₁w₂)/√[(u₁²+v₁²+w₁²)(u₂²+v₂²+w₂²)]。"],[0,"c1","倒易点阵矢量g=ha*+kb*+lc*的物理意义不正确的是？",["A. 方向垂直于正空间(hkl)面","B. 大小等于1/d_hkl","C. 用于解释X射线衍射","D. 大小等于d_hkl"],"D","|g|=1/d_hkl，不是d_hkl。倒易点阵是晶体学中描述衍射条件的核心数学工具，Ewald球（反射球）构建在倒易空间上。"],[0,"c2","FCC和HCP的致密度相同(0.74)，但二者结构不同。FCC的堆积顺序是？",["A. ABAB...","B. ABCABC...","C. AABB...","D. ABAC..."],"B","FCC密排面{111}的堆积顺序为ABCABC（三层重复），HCP密排面{0001}为ABAB（两层重复）。这是二者最本质的区别。"],[0,"c2","CaF₂（萤石）结构中，Ca²⁺和F⁻的配位数分别为？",["A. Ca²⁺配位8, F⁻配位4","B. Ca²⁺配位4, F⁻配位8","C. 两者都是6","D. 两者都是8"],"A","CaF₂中Ca²⁺被8个F⁻包围（立方体配位），F⁻被4个Ca²⁺包围（四面体配位）。反萤石结构（如Na₂O）中阳离子和阴离子配位数互换。"],[0,"c2","钙钛矿(CaTiO₃)结构中，Ti⁴⁺的配位数为？",["A. 4","B. 6","C. 8","D. 12"],"B","钙钛矿ABO₃结构：Ti⁴⁺被6个O²⁻包围（八面体配位），Ca²⁺被12个O²⁻包围。BaTiO₃、SrTiO₃等铁电/压电材料均为此结构。"],[0,"c2","尖晶石(MgAl₂O₄)结构中，O²⁻构成什么点阵？",["A. 简单立方","B. FCC","C. BCC","D. HCP"],"B","尖晶石结构：O²⁻构成FCC骨架，Mg²⁺占据1/8四面体间隙，Al³⁺占据1/2八面体间隙（正尖晶石）。反尖晶石（如Fe₃O₄磁铁矿）中阳离子分布不同。"],[0,"c2","金属间化合物与普通化合物最主要的不同是？",["A. 含有金属元素","B. 以金属键为主，具有一定程度的金属特性","C. 熔点更高","D. 密度更大"],"B","金属间化合物（如Ni₃Al、TiAl）以金属键为主（兼有共价键），具有金属光泽和一定导电性，但脆性大。与离子键为主的NaCl、共价键为主的SiC等本质不同。"],[0,"c3","位错运动的晶格阻力（Peierls-Nabarro力）与什么因素关系最大？",["A. 位错宽度（w=b/(1-ν)）","B. 位错密度","C. 晶粒大小","D. 空位浓度"],"A","Peierls力τ_P-N=(2G/(1-ν))exp(-2πw/b)，位错宽度w越大（即b越小、滑移面间距越大），Peierls力越小，位错越易运动。FCC的Peierls力远小于BCC。"],[0,"c3","位错塞积群对材料力学行为的影响是？",["A. 降低强度","B. 造成应力集中，可能引发相邻晶粒滑移或断裂","C. 提高塑性","D. 无影响"],"B","位错在晶界等障碍前塞积，领头位错处应力集中=n·τ（n为塞积位错数），可能激发相邻晶粒滑移系（Hall-Petch机制）或导致微裂纹形成。"],[0,"c3","应变时效（屈服点现象）的产生机理是？",["A. 相变","B. Cottrell气团（溶质原子钉扎位错）","C. 晶粒长大","D. 空位聚集"],"B","低碳钢屈服点现象：C/N原子扩散到位错周围形成Cottrell气团→钉扎位错→需较高应力使位错脱钉（上屈服点）→位错脱钉后应力下降（下屈服点）→Lüders带扩展。"],[0,"c3","界面能随界面两侧晶粒取向差的增大而？",["A. 先增大后趋于稳定","B. 单调增大","C. 单调减小","D. 不变"],"A","小角度晶界能γ≈γ₀θ(A-lnθ)，随θ增大而增大。θ>15°（大角度晶界）时界面能趋于稳定值（约0.3~0.5J/m²），不再随取向差变化。"],[0,"c3","晶界的三叉结点处，若三个晶界能相等，则三个二面角各为？",["A. 90°","B. 120°","C. 60°","D. 180°"],"B","界面张力平衡：γ₁/sinα₁=γ₂/sinα₂=γ₃/sinα₃。若三者相等，则三个角均为120°。这决定了平衡晶粒的二维形态（正六边形）。"],[0,"c3","提高材料的层错能会导致？",["A. 扩展位错变宽","B. 扩展位错变窄，交滑移更容易","C. 层错增多","D. 无影响"],"B","层错能γ↑→扩展位错宽度d↓→束集容易→交滑移容易→位错绕过障碍的能力增强→加工硬化率降低。Al(γ≈200mJ/m²)高层错能，Cu(γ≈40mJ/m²)低层错能。"],[0,"c3","全位错分解为两个Shockley分位错的反应式是？",[],"A","FCC中全位错a/2[110]→a/6[121]+a/6[2\\\\u030511]（Shockley分位错），中间夹一层错。柏氏矢量满足b²>Σ(b_i)²条件（a²/2>a²/6+a²/6=a²/3）。"],[0,"c3","小角度晶界的位错间距D与取向差θ的关系为？",["A. D∝θ","B. D∝1/θ","C. D与θ无关","D. D∝θ²"],"B","小角度倾转晶界：D=b/θ（b为柏氏矢量大小），θ越小位错间距越大。θ→0时D→∞（趋于完整晶体）；θ>15°时位错重叠，模型失效。"],[0,"c4","间隙原子扩散比置换原子快几个数量级，主要原因是？",["A. 间隙原子更小","B. 间隙机制不需要空位参与，且间隙原子迁移能更低","C. 间隙原子浓度更高","D. 间隙原子带电"],"B","间隙扩散激活能Q_i≈迁移能（无空位形成能项），远小于置换扩散的Q=空位形成能+迁移能。如C在α-Fe中Q≈80kJ/mol，Fe自扩散Q≈250kJ/mol。"],[0,"c4","Nabarro-Herring蠕变和Coble蠕变的区别是？",["A. N-H通过体扩散，Coble通过晶界扩散","B. N-H通过晶界扩散，Coble通过体扩散","C. 两者完全相同","D. N-H只发生在低温"],"A","Nabarro-Herring蠕变：应力诱导空位通过晶粒内部（体扩散）定向流动。Coble蠕变：空位沿晶界扩散。两者都导致晶粒沿拉伸方向伸长，ε̇∝σ（线性关系，n=1）。"],[0,"c4","互扩散（化学扩散）与本征扩散的关系，达肯(Darken)分析引入了什么概念？",["A. 空位平衡","B. 标记面移动速度","C. 温度梯度","D. 应力场"],"B","达肯分析：由于两种组元扩散速率不同（D_A≠D_B），标记面向扩散较快组元一侧移动。引入Kirkendall速度v，互扩散系数D̃=N_AD_B+N_BD_A。"],[0,"c4","对于扩散控制的相变（如沉淀析出），析出相的尺寸与时间的关系通常为？",["A. 与时间成正比","B. 与时间的平方根成正比","C. 与时间无关","D. 与时间的三次方成正比"],"B","扩散控制长大：r∝√(Dt)，即尺寸与√t成正比。界面反应控制长大：r∝t。这是区分相变动力学控制机制的重要判据。"],[0,"c4","下列哪种方法不能用于测定扩散系数？",["A. 放射性同位素示踪法","B. 电子探针(EPMA)成分分析","C. 硬度测试","D. 二次离子质谱(SIMS)"],"C","扩散系数测定方法：放射性示踪（最经典）、EPMA成分剖面分析、SIMS（深度分辨率高）、Auger电子能谱等。硬度测试不能直接测量成分分布。"],[1,"c4","表面扩散的激活能通常高于体扩散的激活能。",[],"表面扩散激活能Q_s≈0.4~0.6Q_体，低于体扩散。扩散速率：表面>晶界>位错>体扩散。激活能越低→扩散越快。低温下短路扩散（表面/晶界/位错）贡献更大。",""],[0,"c5","匀晶相图中，固相和液相的Gibbs自由能-成分曲线(G-x曲线)的公切线决定了什么？",["A. 共晶成分","B. 指定温度下的两相平衡成分","C. 共析温度","D. 最大固溶度"],"B","各温度下作G_S(x)和G_L(x)曲线的公切线，切点横坐标即为该温度的平衡成分。所有温度下的切点轨迹构成相图的固相线和液相线。"],[0,"c5","铁碳相图中，S点（共析点）对应的温度和成分分别是？",["A. 1148°C, 4.3%C","B. 727°C, 0.77%C","C. 1495°C, 0.17%C","D. 912°C, 0%C"],"B","S点(A₁)：共析点，727°C, 0.77%C，γ→α+Fe₃C。C点：共晶点，1148°C, 4.3%C。P点：碳在α中最大溶解度，727°C, 0.0218%C。E点：碳在γ中最大溶解度，1148°C, 2.11%C。"],[0,"c5","含碳量0.5%的钢（45钢），其室温平衡组织中铁素体和珠光体的相对量各约为？",["A. 铁素体35%, 珠光体65%","B. 铁素体65%, 珠光体35%","C. 各50%","D. 铁素体80%, 珠光体20%"],"A","P%=(0.5-0.0218)/(0.77-0.0218)×100%≈64%；α%≈36%。45钢因珠光体较多，强度硬度较高。含碳量越高→珠光体越多→强度硬度越高、塑性韧性越低。"],[0,"c5","三元相图的成分用等边三角形表示，三角形中某一点到三边的距离代表？",["A. 该组元的百分比含量","B. 相体积分数","C. 温度","D. 自由能"],"A","Gibbs三角形（等边三角形）：某点到三边（对边）的垂直距离（或平行线截距）按比例表示三组元含量。三顶点代表纯组元(100%)，重心法则用于计算三相相对量。"],[0,"c5","铁碳合金从奥氏体区急冷（淬火）到室温得到的非平衡组织是？",["A. 珠光体","B. 马氏体","C. 铁素体+珠光体","D. 贝氏体"],"B","淬火（急冷）抑制扩散型相变→发生无扩散型相变→γ→马氏体（C在α-Fe中的过饱和固溶体，BCT结构）。马氏体硬而脆，需回火改善韧性。"],[0,"c5","过冷奥氏体等温转变曲线（TTT曲线/C曲线）的\"鼻子\"温度对应什么？",["A. 转变最快的温度","B. 转变最慢的温度","C. 马氏体开始转变温度M_s","D. 共析温度"],"A","C曲线鼻子处（约550°C）过冷奥氏体最不稳定，珠光体转变最快。鼻子以上→珠光体，鼻子以下→贝氏体（上贝氏体/下贝氏体），M_s以下→马氏体。"],[0,"c5","相图计算的CALPHAD方法的基本思路是？",["A. 完全依靠实验测定","B. 建立各相Gibbs自由能的热力学模型，通过优化实验数据获得模型参数","C. 仅靠第一性原理计算","D. 仅靠经验公式"],"B","CALPHAD（相图计算）：建立各相G(x,T)热力学模型（如Redlich-Kister多项式），用实验数据和第一性原理计算结果优化模型参数，外推多元系相图。"],[0,"c5","二元相图中，若出现液相不互溶区（L₁+L₂），这种反应称为？",["A. 共晶反应","B. 偏晶反应","C. 包晶反应","D. 熔晶反应"],"B","偏晶反应：L₁→L₂+α，液相在冷却时分解为成分不同的另一液相和固相。Cu-Pb、Al-In等系存在偏晶反应。"],[0,"c5","含碳量1.2%的过共析钢，加热到Ac_cm以上完全奥氏体化后空冷，室温组织中二次渗碳体呈什么形态？",["A. 球状","B. 网状沿原奥氏体晶界分布","C. 片层状","D. 粒状"],"B","过共析钢缓冷时二次渗碳体沿奥氏体晶界呈网状析出，严重割裂基体，使钢变脆。可通过正火（快冷）或球化退火改善。"],[0,"c5","二元共晶相图中，共晶体的显微组织形态不包括？",["A. 层片状","B. 棒状（纤维状）","C. 球状（粒状）","D. 马氏体片状"],"D","共晶组织形态：层片状、棒状、球状、螺旋状、树枝状等，取决于两相体积分数、界面能和凝固条件。马氏体是淬火非平衡组织，不属于共晶组织。"],[0,"c5","钢的球化退火的目的是？",["A. 获得马氏体","B. 使渗碳体球化，降低硬度提高切削性","C. 细化晶粒","D. 消除内应力"],"B","球化退火（A₁略低或A₁上下波动加热）：使片状渗碳体转变为球状（粒状），降低硬度，改善切削加工性，为淬火做组织准备。主要用于过共析钢和工具钢。"],[1,"c5","在二元相图中，三相共存时温度为恒定值（恒压下）。",[],"常压下三相平衡时f=C-P+1=2-3+1=0，自由度为零，温度必须恒定。这就是为什么共晶、共析、包晶反应都在水平线上进行的原因。",""],[0,"c6","凝固的驱动力是？",["A. 温度梯度","B. 固液两相自由能差ΔG_v","C. 浓度梯度","D. 压力差"],"B","凝固驱动力：ΔG=G_S-G_L<0（T<T_m时）。ΔG_v=L·ΔT/T_m（L为熔化潜热），过冷度ΔT越大，驱动力越大。"],[0,"c6","区域熔炼（区熔法）提纯的原理基于什么？",["A. 杂质蒸发","B. 平衡分配系数k₀≠1导致杂质在固液相间重新分配","C. 杂质沉淀","D. 过滤"],"B","区域熔炼利用k₀<1的杂质在凝固时富集于液相、k₀>1的杂质富集于固相的原理，通过多次区熔使杂质富集于一端，获得高纯材料（如半导体级Si）。"],[0,"c6","均匀形核速率I（形核率）与过冷度ΔT的关系是？",["A. 随ΔT线性增大","B. 先增大后减小（存在最佳过冷度）","C. 随ΔT线性减小","D. 不变"],"B","I∝exp(-ΔG*/kT)·exp(-Q/kT)。ΔT增大→ΔG*减小（有利形核）但原子扩散变慢（不利）。两者竞争，存在最大形核速率对应的ΔT（金属约0.2T_m）。"],[0,"c6","凝固组织中柱状晶的生长方向通常平行于？",["A. 重力方向","B. 热流方向（散热方向的反方向）","C. 磁场方向","D. 随机方向"],"B","柱状晶沿热流反方向（散热方向）生长，同时受晶体学各向异性影响。铸锭中柱状晶垂直于模壁向中心生长，与<100>择优方向一致或接近。"],[1,"c6","非均匀形核的形核率随过冷度的增大而单调增大。",[],"非均匀形核率变化规律与均匀形核类似，也存在极值点。虽然非均匀形核在很小的过冷度下即可发生，但形核率随ΔT先增后减（受形核位置数量和原子扩散速度的共同制约）。",""],[0,"c7","FCC单晶体的拉伸应力-应变曲线分为几个阶段？",["A. 2个","B. 3个（易滑移→线性硬化→抛物线硬化）","C. 4个","D. 1个"],"B","FCC单晶三个阶段：(I)易滑移阶段（单滑移，硬化率低）；(II)线性硬化阶段（次滑移系开动，位错交互作用增强）；(III)抛物线硬化阶段（交滑移活跃，动态回复）。"],[0,"c7","Cottrell-Lomer位错锁（Lomer-Cottrell锁）形成于什么条件？",["A. 两个相交{111}滑移面上的位错相遇反应","B. 位错与空位反应","C. 位错与晶界反应","D. 刃位错攀移"],"A","FCC中两个不同{111}面上的位错滑移相遇→反应生成Lomer-Cottrell锁（压杆位错），其柏氏矢量不在滑移面上，不可动，是加工硬化的重要机制。"],[0,"c7","\"奥罗万(Orowan)绕过机制\"描述的是？",["A. 位错切过第二相粒子","B. 位错绕过不可变形粒子，留下位错环","C. 位错攀移","D. 位错交滑移"],"B","Orowan机制：位错遇到硬粒子时弯曲绕过，粒子间留下位错环，所需应力Δτ=Gb/λ（λ为粒子间距）。粒子间距越小（弥散度越高），强化效果越好。"],[0,"c7","热变形过程中流变应力随应变先增大后趋于稳定，这是因为？",["A. 发生了形变时效","B. 加工硬化与动态回复/动态再结晶达到动态平衡","C. 温度降低","D. 位错全部消失"],"B","热变形中加工硬化使位错密度↑，同时动态回复/再结晶使位错密度↓。二者达到平衡时流变应力趋于稳态值。这是热加工区别于冷加工的本质特征。"],[0,"c7","\"动态应变时效\"（Portevin-Le Chatelier效应）的表现是？",["A. 应力-应变曲线光滑","B. 应力-应变曲线上出现锯齿形波动","C. 不产生塑性变形","D. 强度降低"],"B","PLC效应（锯齿屈服）：在一定温度和应变速率范围内，溶质原子扩散速率与位错运动速率相当时，反复钉扎-脱钉→应力锯齿波动。如铝合金在一定温度拉伸时出现。"],[0,"c7","再结晶织构的形成原因是？",["A. 随机形核","B. 变形基体中某些取向的晶核优先长大","C. 相变","D. 温度不均匀"],"B","再结晶织构（退火织构）：形变织构中某些特定取向的亚晶具有生长优势，优先长大→再结晶晶粒择优取向。再结晶织构可能与形变织构相同或不同。"],[0,"c7","热加工中动态再结晶获得的晶粒大小主要取决于？",["A. 变形温度和应变速率（Zener-Hollomon参数Z）","B. 原始晶粒度","C. 冷却速度","D. 以上全是"],"A","动态再结晶晶粒大小d∝Z^(-m)，Z=ε̇exp(Q/RT)。Z越大（低温高速变形）→晶粒越细。稳态流变应力也与Z相关（σ∝lnZ）。"],[1,"c7","冷加工金属在回复阶段，其硬度会显著下降。",[],"回复阶段硬度变化很小（最多下降10~20%），因为位错密度基本不变（主要是位错重新排列，而非消失）。硬度显著下降发生在再结晶阶段，当无畸变新晶粒取代变形组织时。",""],[0,"c8","弹性模量随温度升高的一般趋势是？",["A. 升高","B. 降低","C. 不变","D. 先升后降"],"B","温度升高→原子间距增大→原子间结合力减弱→弹性模量降低。一般dE/dT≈-0.03%~-0.1%/°C。弹性模量是对组织不敏感的力学性能。"],[0,"c8","缺口敏感性的物理本质是？",["A. 缺口处温度高","B. 缺口根部产生三向应力状态，限制塑性变形","C. 缺口处化学成分变化","D. 缺口处硬度更高"],"B","缺口根部因应力集中产生三向拉应力状态→塑性变形受约束→脆性倾向增大。缺口敏感性用缺口强度比NSR=σ_b(缺口)/σ_b(光滑)衡量。"],[0,"c8","工程应力-应变曲线与真应力-应变曲线的主要区别是？",["A. 完全相同","B. 工程应力用原始面积A₀，真应力用瞬时面积A","C. 工程应力更大","D. 真应力只在弹性阶段定义"],"B","工程应力σ=F/A₀，真应力S=F/A（A为瞬时截面积）。颈缩后A急剧减小→S>σ且持续增大。真应变ε=∫dl/l=ln(1+e)，e为工程应变。"],[0,"c8","应力腐蚀开裂(SCC)的裂纹扩展速率与应力强度因子K_I的关系曲线通常分为几个区域？",["A. 1个","B. 2个","C. 3个（I区低K不扩展、II区平台扩展、III区快速断裂）","D. 无规律"],"C","SCC裂纹扩展三阶段：I区→存在门槛值K_ISCC；II区→da/dt为平台（与K_I关系不大，受环境控制）；III区→K_I接近K_IC时快速断裂。"],[0,"c8","疲劳裂纹扩展的Paris公式为？",["A. da/dN=C(ΔK)^m","B. da/dt=Cσ^n","C. σ=K/√a","D. N_f=C/Δσ"],"A","Paris公式：da/dN=C(ΔK)^m，描述疲劳裂纹稳定扩展阶段（II区）。ΔK=K_max-K_min为应力强度因子幅，C和m为材料常数（m≈2~7）。"],[0,"c8","高温持久强度是指？",["A. 短时间内断裂的应力","B. 在规定时间内（如10⁵h）发生断裂的应力","C. 屈服强度","D. 室温抗拉强度"],"B","持久强度σ_t^τ：在规定温度和时间（如σ_1000^(100000h)）下发生断裂的应力。与蠕变极限（规定应变速率或总应变量的应力）不同，持久强度关注断裂寿命。"],[0,"c8","Larson-Miller参数P用于关联什么？",["A. 硬度与强度","B. 蠕变断裂寿命、应力和温度","C. 疲劳寿命与应力","D. 韧性转变温度"],"B","Larson-Miller参数：P=T(C+log t_r)，其中T为温度(K)，t_r为断裂时间(h)，C为材料常数（通常≈20）。相同应力下P值恒定，用于外推长期蠕变数据。"],[0,"c8","脆性材料（如陶瓷）的强度通常用什么统计方法描述？",["A. 正态分布","B. Weibull分布","C. 均匀分布","D. 泊松分布"],"B","陶瓷等脆性材料强度由最危险缺陷控制，服从Weibull统计：P_f=1-exp[-(σ/σ₀)^m·V/V₀]，m为Weibull模数（m越大强度分散性越小）。"],[0,"c8","材料阻尼性能的常用表征参数是？",["A. 弹性模量","B. 损耗因子（tanδ或Q⁻¹）","C. 硬度","D. 延伸率"],"B","阻尼表征：(1)损耗因子tanδ（相位差角正切）；(2)内耗值Q⁻¹=ΔW/(2πW)（每周能量损耗/总弹性能）；(3)对数衰减率δ。高阻尼材料用于减振降噪。"],[1,"c8","疲劳裂纹总是在材料表面萌生。",[],"疲劳裂纹多数在表面萌生（表面滑移带挤出/侵入、表面缺陷），但也可能在内部萌生（如内部夹杂物、大尺寸缺陷、超高周疲劳的内部\"鱼眼\"断裂）。不能绝对化。",""],[0,"c9","压电效应是指？",["A. 材料受热产生电流","B. 材料受力产生电荷（正压电效应），或加电场产生形变（逆压电效应）","C. 材料发光","D. 材料变色"],"B","压电效应：某些晶体（如石英、PZT）受力变形→极化→产生电荷（正压电效应）；加电场→产生机械形变（逆压电效应）。无对称中心是必要条件。"],[0,"c9","形状记忆合金（如NiTi）的\"形状记忆效应\"来源于？",["A. 位错运动","B. 热弹性马氏体相变","C. 扩散","D. 再结晶"],"B","形状记忆效应基于热弹性马氏体相变：低温马氏体相变形→加热到A_f以上→逆相变回母相→恢复原形状。NiTi合金还具有超弹性（应力诱发马氏体）。"],[0,"c9","热电效应中，Seebeck效应描述的是？",["A. 电流产生磁场","B. 温差产生电动势","C. 电场产生热","D. 磁场产生电流"],"B","三热电效应：(1)Seebeck效应：温差→电势差；(2)Peltier效应：电流→吸/放热；(3)Thomson效应：有温差的导体通电→吸/放热。热电优值ZT=S²σT/κ。"],[0,"c9","硬磁材料（永磁材料）的关键性能指标是？",["A. 高磁导率","B. 高矫顽力H_c和高剩磁B_r（即高磁能积(BH)_max）","C. 低矫顽力","D. 高电导率"],"B","永磁材料要求：(1)高剩磁B_r；(2)高矫顽力H_c；(3)高磁能积(BH)_max（退磁曲线上B·H的最大值）。NdFeB(钕铁硼)是目前磁能积最高的永磁材料。"],[0,"c9","超导体的临界温度T_c、临界磁场H_c和临界电流密度J_c之间是什么关系？",["A. 无关联","B. 三者相互制约，共同决定超导态的范围","C. 三者线性相关","D. H_c与T_c无关"],"B","超导体必须在T<T_c、H<H_c(T)、J<J_c(H,T)三者同时满足时才能维持超导态。任一参数超出临界值→失超（超导态破坏）。实用超导材料需要高T_c和高J_c。"],[0,"c9","铁电材料与铁磁材料在物理本质上的相似之处是？",["A. 都含有铁元素","B. 都存在自发极化/磁化的畴结构，且畴可在外场下翻转","C. 都具有高导电性","D. 都在高温下性能更好"],"B","铁电体（如BaTiO₃）和铁磁体（如Fe）的类比：自发极化↔自发磁化、电畴↔磁畴、电滞回线↔磁滞回线、Curie温度↔居里温度。钛酸钡的\"铁电\"并非含铁，是历史命名。"],[1,"c9","介电常数越大的材料，其绝缘性能越好。",[],"介电常数反映材料的极化能力（储存电荷能力），高介电常数材料（如铁电陶瓷）用于电容器，但不等于绝缘性能好。绝缘性能由击穿强度（介电强度，单位kV/mm）决定，这是不同的指标。",""],[0,"c5","马氏体相变属于什么类型的相变？",["A. 扩散型相变","B. 无扩散型相变（切变型）","C. 重构型相变","D. 调幅分解"],"B","马氏体相变是无扩散型相变：原子以协作切变方式运动（每个原子相对位移<原子间距），成分不变，新旧相之间保持共格或半共格界面。表面浮突效应是其重要特征。"],[0,"c5","上贝氏体与下贝氏体的主要区别是？",["A. 形成温度不同，上贝氏体在较高温度（~350-550°C），下贝氏体在较低温度（~M_s-350°C）","B. 化学成分不同","C. 含碳量不同","D. 没有区别"],"A","上贝氏体（羽毛状）：较高温形成，碳化物在铁素体条间分布，脆性较大。下贝氏体（针状）：较低温形成，碳化物在铁素体内部析出，强度和韧性均较好。"],[0,"c3","位错密度的增加会引起材料电阻率如何变化？",["A. 降低","B. 升高","C. 不变","D. 先升后降"],"B","位错是晶体缺陷，增加对电子的散射，使电阻率升高。但位错对电阻率的贡献远小于空位等点缺陷。电阻率可用于间接监测回复和再结晶过程。"],[0,"c3","材料中的\"柯氏气团（Cottrell atmosphere）\"是指？",["A. 气体分子在位错周围聚集","B. 溶质原子（如C、N）在位错周围聚集形成的原子云","C. 空位聚集","D. 电子云"],"B","Cottrell气团：溶质原子与位错的弹性相互作用使溶质偏聚在位错周围→钉扎位错。这是低碳钢屈服点现象和应变时效的微观机理。气团形成需溶质原子有足够的扩散能力。"],[0,"c7","经过大变形量的冷加工金属，其储存能的主要形式是？",["A. 空位形成能","B. 位错弹性能（占主要部分）","C. 表面能","D. 化学能"],"B","冷变形储存能≈80~90%为位错弹性能，约10%为空位等点缺陷能量，界面能占比很小。储存能是回复和再结晶的驱动力。"],[0,"c7","金属的流变应力与位错密度的关系（Taylor公式）为？",["A. σ=σ₀+kd^(-1/2)","B. τ=αGb√ρ","C. σ=Eε","D. σ=Kε^n"],"B","Taylor硬化公式：τ=αGb√ρ，流变应力与位错密度的平方根成正比。α为常数（约0.2~0.5），G为剪切模量，b为柏氏矢量，ρ为位错密度。这是加工硬化的微观理论基石。"],[0,"c8","工程应力-应变曲线上的抗拉强度σ_b对应的状态是？",["A. 开始屈服","B. 颈缩开始（最大载荷点）","C. 断裂","D. 弹性极限"],"B","抗拉强度σ_b（强度极限）对应最大载荷F_max/A₀。在σ_b处dF=0，即加工硬化率与截面减小效应相等（Considére判据），此后发生颈缩。"],[0,"c8","GRIFFITH断裂理论中，脆性材料的断裂应力σ_f与裂纹半长a的关系为？",["A. σ_f∝a","B. σ_f∝1/√a","C. σ_f∝a²","D. σ_f与a无关"],"B","Griffith公式：σ_f=√(2Eγ_s/πa)，断裂应力与裂纹长度的平方根成反比。a越大→σ_f越低。这解释了实际强度远低于理论强度的原因，是断裂力学的理论基础。"],[0,"c1","32种点群是宏观对称元素的组合。微观对称元素（含平移）的组合形成多少种空间群？",["A. 32种","B. 230种","C. 14种","D. 7种"],"B","230种空间群是微观对称元素（含平移操作的螺旋轴和滑移面）的所有可能组合。32种点群只含宏观对称元素（无平移）。空间群是描述晶体内部原子排列的完整对称性。"],[0,"c1","螺旋轴（screw axis）是旋转与什么操作的组合？",["A. 反射","B. 反演","C. 平移","D. 中心对称"],"C","螺旋轴=旋转+沿旋转轴的平移。如4₂螺旋轴表示旋转90°+平移c/2。滑移面=反射+平移。两者都是含平移的微观对称元素，在宏观上分别表现为旋转轴和对称面。"],[0,"c1","单斜晶系的特征对称元素是什么？",["A. 1个二次轴或1个对称面","B. 3个二次轴","C. 1个四次轴","D. 1个三次轴"],"A","单斜晶系特征对称元素：1个二次对称轴(L²)或1个对称面(P)，a≠b≠c，α=γ=90°≠β。三斜晶系仅对称中心C或一次轴。这是7大晶系按对称性由低到高的判据。"],[0,"c2","硅酸盐的基本结构单元是什么？",["A. SiO₄四面体","B. SiO₆八面体","C. Si₂O₇双四面体","D. SiO₃三角形"],"A","所有硅酸盐矿物均以[SiO₄]⁴⁻四面体为基本结构单元（Si在中心，4个O在顶点）。通过四面体之间的连接方式（孤立、双聚、环状、链状、层状、架状）形成各类硅酸盐。"],[0,"c2","架状硅酸盐（如石英SiO₂）中每个O原子被几个Si原子共用？",["A. 1个","B. 2个","C. 3个","D. 4个"],"B","架状硅酸盐中每个O原子桥接两个Si，形成三维网络。Si:O=1:2（如石英SiO₂）。层状硅酸盐中3/4的O被共用（Si:O=2:5），链状2/3的O被共用（Si:O=1:3）。"],[0,"c2","准晶（quasicrystal）的显著特征是具有？",["A. 平移对称性","B. 5次或8次、10次、12次等传统晶体学不允许的旋转对称性","C. 简单立方结构","D. 非周期性"],"B","准晶（1984年Shechtman发现，获2011诺贝尔化学奖）具有5次、8次、10次、12次旋转对称性，但无平移周期性。原子排列长程有序但不周期，电子衍射呈尖锐斑点。"],[0,"c2","石墨和金刚石都是碳的同素异形体，其结构差异在于？",["A. 碳原子大小不同","B. 碳原子的杂化方式和键合方式不同（sp² vs sp³）","C. 密度相同","D. 都是sp³杂化"],"B","金刚石：sp³杂化，正四面体配位，三维共价网络，最硬材料。石墨：sp²杂化，层内共价键+层间范德华力，层内导电、层间易滑动（润滑剂）。"],[0,"c2","C₆₀富勒烯（足球烯）的分子结构由多少个碳原子组成？",["A. 50个","B. 60个","C. 70个","D. 84个"],"B","C₆₀由60个碳原子组成，包含12个五元环和20个六元环（截角二十面体）。碳纳米管可视为石墨烯卷成的管，Graphene是单层石墨（二维蜂窝结构）。"],[0,"c2","具有NaCl型结构的化合物通常要求阴阳离子半径比在什么范围？",["A. >0.732","B. 0.414~0.732","C. 0.225~0.414","D. <0.225"],"B","鲍林第一规则：r_c/r_a=0.414~0.732→八面体配位→6配位（NaCl型）。>0.732→立方体配位→8配位（CsCl型）。0.225~0.414→四面体配位→4配位（ZnS型）。"],[0,"c2","氧化锆(ZrO₂)在高温下的稳定相结构是？",["A. 单斜相","B. 四方相","C. 立方萤石结构","D. 六方相"],"C","ZrO₂随温度：单斜(<1170°C)→四方(1170~2370°C)→立方萤石型(>2370°C)。加入Y₂O₃等稳定剂可使立方/四方相稳定到室温（YSZ），用于热障涂层、氧传感器和燃料电池电解质。"],[0,"c2","β-Si₃N₄和α-Si₃N₄的结构共同点是？",["A. 都是层状结构","B. 都由SiN₄四面体通过顶角连接成的三维网络","C. 都是立方结构","D. 都是非晶"],"B","Si₃N₄的基本单元为SiN₄四面体，通过顶角N原子连接成三维网络。α相和β相的区别在于SiN₄层的堆垛顺序。Si₃N₄是重要的高温结构陶瓷，具有高强度、高硬度、良好的抗热震性。"],[0,"c2","MAX相陶瓷（如Ti₃SiC₂）的独特性能组合是？",["A. 仅高硬度","B. 兼具金属的导电导热性和陶瓷的抗氧化耐高温性","C. 仅高导电","D. 仅耐高温"],"B","MAX相（M_n+1AX_n，M为过渡金属，A为A族元素，X为C或N）兼具金属特性（导电导热、可加工）和陶瓷特性（高熔点、抗氧化、高弹性模量）。Ti₃SiC₂是最著名的MAX相。"],[0,"c2","钙钛矿结构ABO₃中，容忍因子t=(r_A+r_O)/[√2(r_B+r_O)]。理想立方钙钛矿的t值范围是？",["A. t<0.7","B. 0.8<t<1.0","C. t>1.1","D. t任意"],"B","Goldschmidt容忍因子t≈0.9~1.0为理想立方钙钛矿；t偏离时结构发生畸变（四方、正交等），伴随铁电/反铁电等物理效应。BaTiO₃(t≈1.06)室温为四方铁电相。"],[0,"c3","位错运动的阻力中，\"晶格摩擦应力\"（Peierls应力）在FCC和BCC中的相对大小为？",["A. FCC远大于BCC","B. BCC远大于FCC","C. 两者相当","D. FCC略大于BCC"],"B","τ_P-N∝exp(-2πd/b)/[b(1-ν)]，d为滑移面间距，b为柏氏矢量。FCC的d/b(111面)≈0.82，BCC的d/b(110面)≈0.41，故BCC的Peierls应力远大于FCC。这解释了BCC低温脆性和FCC低温仍保持塑性的本质。"],[0,"c3","位错的\"攀移\"速度受什么因素控制？",["A. 切应力","B. 空位扩散速率","C. 温度梯度","D. 应变速率"],"B","刃型位错攀移需要空位或间隙原子的扩散（非保守运动），攀移速率受扩散控制。温度越高→扩散越快→攀移越快。高温蠕变中位错攀移是关键机制。"],[0,"c3","\"Orowan应力\"Δτ与第二相粒子间距λ的关系为？",["A. Δτ∝λ","B. Δτ∝1/λ","C. Δτ∝λ²","D. 无关"],"B","Orowan应力Δτ=Gb/λ（简化），粒子间距越小→强化效果越好。当时效时间过长→粒子粗化（Ostwald熟化）→λ增大→强度下降（过时效）。"],[0,"c3","晶界上的\"重合位置点阵(CSL)\"模型中，Σ值表示什么？",["A. 晶界能量","B. 重合位置密度（Σ越小重合度越高）","C. 晶界角度","D. 晶粒尺寸"],"B","CSL模型中Σ定义为重合位置点阵单胞体积与晶体点阵单胞体积之比。Σ=1为完整晶体（100%重合）；Σ=3为孪晶界（FCC中{111}面1/3重合）；Σ值越小，晶界结构越有序，能量越低。"],[0,"c3","退火孪晶通常在什么条件下形成？",["A. 塑性变形","B. 再结晶退火过程中（FCC金属中常见）","C. 凝固","D. 淬火"],"B","退火孪晶在再结晶过程中形成，因层错能较低的FCC金属（Cu、黄铜、奥氏体不锈钢）再结晶时原子堆垛顺序改变所致。孪晶界面为{111}面，是低能Σ3晶界。"],[0,"c3","位错环(dislocation loop)是怎样形成的？",["A. 只有F-R源产生","B. F-R源开动、空位盘塌陷或沉淀粒子周围应力释放","C. 只能是螺型位错","D. 只能是刃型位错"],"B","位错环形成途径：(1)Frank-Read源增殖；(2)过饱和空位聚集→空位盘塌陷→位错环（棱柱位错环）；(3)第二相粒子周围热应力/相变应力释放产生位错环。"],[0,"c3","\"Verigo-Barrett螺型位错交滑移模型\"描述的是？",["A. 刃位错攀移","B. 螺型位错在相交滑移面上的交滑移过程","C. 晶界滑移","D. 位错反应"],"B","螺型位错的交滑移是其从原滑移面转移到另一相交滑移面的过程（因螺型位错无固定滑移面）。交滑移是动态回复的关键机制，高层错能材料（Al）比低层错能材料（Cu）更易交滑移。"],[0,"c3","弥散强化与沉淀强化的主要区别是？",["A. 无区别","B. 弥散强化粒子在基体外引入（通常不与基体反应），沉淀强化粒子从基体内析出","C. 弥散强化只用在陶瓷","D. 沉淀强化效果更弱"],"B","弥散强化（如ODS合金）：外加惰性粒子（ThO₂、Y₂O₃），高温稳定性好。沉淀强化（如Al-Cu合金时效）：过饱和固溶体脱溶析出粒子（GP区→θ'→θ），有最佳时效温度和时间。"],[0,"c3","FCC金属中，扩展位错的两个Shockley分位错之间的区域是什么结构？",["A. 完整晶体","B. 堆垛层错（例如ABC|AB|ABC）","C. 非晶","D. 孪晶"],"B","两个Shockley分位错之间为堆垛层错区，层错破坏了正常的ABCABC堆积顺序。层错能γ反映了单位面积层错的能量，决定了扩展位错宽度。"],[1,"c3","杂质原子对位错的钉扎作用（Cottrell气团）随着温度升高而增强。",[],"Cottrell气团在低温下最显著（溶质原子扩散慢→被位错应力场\"冻结\"在位错周围）。温度升高→溶质原子扩散加快→气团减弱甚至消散→屈服点现象消失。",""],[0,"c4","电迁移(electromigration)是指？",["A. 电场加速扩散","B. 高电流密度下电子流对原子的动量传递导致的原子迁移","C. 电磁场中的扩散","D. 电池中的离子运动"],"B","电迁移：集成电路互连线中高电流密度(>10⁴A/cm²)→电子与金属原子碰撞→动量传递→原子定向迁移→形成空洞(断路)或小丘(短路)。是VLSI可靠性的关键问题。"],[0,"c4","Soret效应（热扩散）是指？",["A. 浓度梯度驱动的扩散","B. 温度梯度驱动的扩散","C. 应力驱动的扩散","D. 电磁场驱动的扩散"],"B","Soret效应（Ludwig-Soret效应）：温度梯度引起组元浓度重新分布。轻原子倾向于向热端迁移，重原子向冷端迁移。是同位素分离（热扩散法）和核燃料中元素再分布的理论基础。"],[0,"c4","原子扩散的微观理论中，扩散系数D可以表示为？",["A. D=α²ν","B. D=αa²νexp(-ΔG_m/kT)（α为几何因子，a为跳跃距离，ν为尝试频率）","C. D=ν/a²","D. D=λν"],"B","D=α·a²·ν·exp(-ΔG_m/kT)，其中α为几何因子（与晶体结构有关），a为原子跳跃距离（b的数量级），ν为Debye频率(~10¹³Hz)，ΔG_m为迁移自由能。"],[0,"c4","低温下（<0.3T_m），晶界扩散与体扩散的贡献对比如何？",["A. 体扩散占主导","B. 晶界扩散占主导（因激活能更低）","C. 两者相等","D. 都不发生扩散"],"B","低温下体扩散极慢（D很小），晶界扩散激活能低（Q_gb≈0.5~0.7Q_体）→相对贡献大。Harrison将扩散行为分为三类：A型（体扩散主导）、B型（晶界+体扩散）、C型（仅晶界扩散，极低温度）。"],[0,"c4","菲克第二定律的高斯解适用于什么初始条件？",["A. 恒定表面浓度","B. 初始薄层源（平面源）","C. 扩散偶","D. 稳态扩散"],"B","高斯解：C(x,t)=M/(2√(πDt))·exp(-x²/(4Dt))，适用于初始薄层源（δ函数初始分布）。误差函数解适用于恒定表面浓度或扩散偶。正弦解适用于周期性初始分布。"],[0,"c4","反应扩散时，扩散层中各相的浓度分布呈什么特征？",["A. 连续渐变","B. 台阶状（每个单相区浓度大致恒定，相界面处突变）","C. 线性","D. 抛物线"],"B","反应扩散层中每个单相区浓度变化很小（因相区狭窄），相界面处浓度跳跃至相图确定的平衡值。扩散层厚度Δx∝√t（抛物线规律）。"],[0,"c4","互扩散中标记面移动的方向是？",["A. 任意方向","B. 向扩散较快的组元一侧移动","C. 向扩散较慢的组元一侧移动","D. 不移动"],"B","Kirkendall效应：标记面向扩散系数较大的组元一侧移动。因为扩散快的组元流出的原子多于流入的→空位向反方向流动→标记面移动。这是空位扩散机制的直接证据。"],[0,"c4","在半导体工艺中，磷(P)向Si中的扩散通常采用什么方法？",["A. 仅固态扩散","B. 预沉积（恒定表面浓度）+ 驱入（限定源）两步法","C. 仅离子注入","D. 仅液相扩散"],"B","半导体掺杂扩散典型两步：(1)预沉积：恒定表面浓度C_s，误差函数分布；(2)驱入（再分布）：去除气源后在更高温度退火→高斯分布扩散→控制结深。也可用离子注入替代预沉积。"],[0,"c4","\"化学扩散系数D̃\"和\"示踪扩散系数D*\"的区别在于？",["A. 完全相同","B. D̃包含热力学因子（活度修正），D*为本征扩散","C. D*总大于D̃","D. D̃仅用于气体"],"B","D̃（互扩散/化学扩散）= D*·Φ，其中Φ=(∂lna/∂lnC)为热力学因子。理想溶液Φ=1时D̃=D*。Φ<0时（Spinodal区内）D̃<0→上坡扩散。"],[1,"c4","示踪扩散系数（自扩散系数）的测定需要放射性或稳定同位素示踪技术。",[],"自扩散系数D*（同位素示踪扩散系数）的测定使用放射性同位素（如⁵⁹Fe测Fe在Fe中扩散）或稳定同位素+SIMS，需要同位素示踪技术。化学扩散系数D̃则可通过成分分析（EPMA等）测定。",""],[0,"c5","三元相图的空间模型中，液相面（liquidus surface）是什么？",["A. 水平面","B. 温度最高的曲面，以上全为液相","C. 固相面","D. 共晶面"],"B","三元相图T-x₁-x₂三维空间中，液相面是温度最高的曲面（类似二元液相线的三维推广），曲面以上全为液相。固相面是温度最低的曲面，以下全为固相。"],[0,"c5","三元相图中，\"重心法则\"用于计算什么？",["A. 单相的量","B. 三相平衡时各相的相对量","C. 温度","D. 凝固顺序"],"B","重心法则：在等温截面的三相三角形中，合金成分点到三顶点的连线将三角形分成三个小三角形，各相相对量与小三角形面积成反比。是杠杆定律的三元推广。"],[0,"c5","铁碳合金中，钢的热处理基础是？",["A. 铁在室温是BCC","B. 奥氏体在冷却时发生共析分解","C. 碳的扩散","D. 铁素体的存在"],"B","钢热处理的基本依据：奥氏体（γ，FCC）→不同冷却速度得到不同组织（珠光体/贝氏体/马氏体），从而大幅调控性能。这是碳钢能够通过热处理获得广泛性能范围的根本原因。"],[0,"c5","完全退火（重结晶退火）的加热温度通常在？",["A. A₁以下","B. A₃或A_cm以上30~50°C","C. 熔化温度","D. 任意温度"],"B","完全退火：加热到A₃（亚共析钢）或A_cm（过共析钢）以上30~50°C，保温后缓慢冷却（炉冷），获得接近平衡的珠光体+铁素体组织，消除内应力、降低硬度。"],[0,"c5","正火与完全退火的主要区别是？",["A. 加热温度不同","B. 冷却方式不同（正火为空冷，退火为炉冷）","C. 保温时间不同","D. 原料不同"],"B","正火=加热到A₃/A_cm以上+空冷（较快冷却），得细珠光体（索氏体），硬度强度高于退火态。退火=炉冷（缓慢冷却），得粗珠光体。正火成本低、效率高，低碳钢常用正火代替退火。"],[0,"c5","钢的淬透性(hardenability)衡量的是？",["A. 钢能获得多高的硬度","B. 钢获得马氏体的能力（马氏体层深度）","C. 钢的强度","D. 钢的韧性"],"B","淬透性（hardenability，不是hardness能力）指钢在淬火时获得马氏体的能力（深度），用顶端淬火（Jominy）试验测定。淬透性与C曲线位置相关——C曲线越右移，淬透性越好。"],[0,"c5","提高钢淬透性的合金元素通常有什么作用？",["A. 使C曲线左移","B. 使C曲线右移（增加过冷奥氏体稳定性）","C. 降低M_s温度","D. 减少碳含量"],"B","大多数合金元素（除Co外）如Cr、Ni、Mn、Mo等都使C曲线右移→临界冷却速度降低→淬透性提高。碳也是提高淬透性的重要元素。多种元素复合加入效果更显著。"],[0,"c5","回火的三个温度阶段对应的组织变化是？（低温→高温）",["A. 马氏体分解→残余奥氏体转变→碳化物聚集长大","B. 碳化物溶解→马氏体形成→奥氏体化","C. 铁素体析出→珠光体形成→渗碳体溶解","D. 无变化"],"A","回火三阶段：(1)低温(150~250°C)：马氏体分解→回火马氏体；(2)中温(350~500°C)：残余奥氏体分解→回火屈氏体；(3)高温(500~650°C)：碳化物聚集长大→回火索氏体。"],[0,"c5","奥氏体不锈钢（如304，18Cr-8Ni）室温保持奥氏体组织的原因是什么？",["A. 冷速足够快","B. Ni是奥氏体稳定化元素，使γ区扩大至室温","C. 含碳量高","D. Cr的作用"],"B","Ni和Mn是强烈扩大γ相区的元素，加入足量Ni可使奥氏体稳定到室温。Cr是铁素体形成元素（缩小γ区），18Cr-8Ni的不锈钢中Ni含量足以抵消Cr的α化作用→室温为奥氏体。"],[0,"c5","三元相图的垂直截面（变温截面）与二元相图的区别是？",["A. 完全相同","B. 垂直截面不满足相律（因为成分变量被约束在一个平面上）","C. 垂直截面更简单","D. 无区别"],"B","三元垂直截面（如固定某一组元含量）上三相区看起来像两相区、两相区边界不一定代表相变开始/结束，因为相变可能发生在截面之外。不能用杠杆定律，必须回到三维空间理解。"],[0,"c5","共晶凝固中，\"离异共晶\"（divorced eutectic）是指？",["A. 两相协同生长","B. 共晶两相分离生长，一相依附于先共晶相","C. 无共晶反应","D. 非平衡凝固"],"B","离异共晶：共晶成分附近但偏离共晶点的合金，初生相体积分数很大→共晶中的同类型相依附初生相生长→另一相孤立分布（常见于过共晶或亚共晶合金近共晶点处）。"],[0,"c5","伪二元相图（pseudo-binary phase diagram）适用于什么体系？",["A. 所有三元系","B. 三元系中两个组元的比例固定时的垂直截面（真正满足相律）","C. 二元系","D. 单元系"],"B","伪二元截面：在三元系中固定两个组元的比例（如Al-Cu-Mg系中固定Cu/Mg比），所得截面满足相律（可视为\"伪二元系\"），杠杆定律适用。在垂直截面中只有伪二元截面可以用杠杆定律。"],[1,"c5","三元相图中，四相平衡反应是恒温下进行的。",[],"三元系中四相共存（如三元共晶L→α+β+γ）时：恒压下f=C-P+1=3-4+1=0，温度必须恒定。三元共晶在等温截面中为三角形，在变温截面中为水平线。",""],[1,"c5","铝合金的时效强化（age hardening）是通过淬火+时效处理实现的。",[],"铝合金（如Al-4%Cu合金，即硬铝/杜拉铝）时效强化流程：固溶处理（加热到单相α区）→淬火（获得过饱和α固溶体）→时效（室温自然时效或150~200°C人工时效）→GP区→θ″→θ′→θ相析出→强度显著提高。",""],[0,"c5","铸铁中石墨形态为球状的铸铁称为？",["A. 灰口铸铁","B. 球墨铸铁","C. 可锻铸铁","D. 白口铸铁"],"B","球墨铸铁（加入Mg/Ce球化剂→石墨呈球状）→力学性能远优于片状石墨的灰口铸铁（无应力集中）。可锻铸铁（石墨呈团絮状）由白口铁石墨化退火得到。蠕墨铸铁石墨呈蠕虫状。"],[0,"c6","共晶凝固时两相之间的间距λ与生长速率R的关系为？",["A. λ∝R","B. λ²R=常数（Jackson-Hunt关系）","C. λ∝1/R²","D. 无关"],"B","Jackson-Hunt共晶生长理论：λ²R=常数，生长速率越快→层片间距越小→组织越细。这与珠光体片层间距与过冷度的关系类似。"],[0,"c6","绝对稳定性理论（Mullins-Sekerka理论）描述的是什么？",["A. 共晶生长","B. 平界面在凝固时的形态稳定性","C. 再结晶","D. 扩散"],"B","M-S理论：凝固平界面在低速和低温度梯度下不稳定→形成胞晶或枝晶。界面稳定性判据：G/R≥ΔT₀/D（G为温度梯度，R为生长速率），满足时平界面稳定。"],[0,"c6","Swift-Hohenberg方程和Brazovskii模型用于描述什么？",["A. 位错运动","B. 凝固或相变中的模式形成（pattern formation）","C. 扩散","D. 电子结构"],"B","凝固中的模式形成理论（包括非线性分析）预测枝晶间距、胞晶间距等特征尺度。属于非平衡态热力学和自组织现象在材料科学中的应用。"],[0,"c6","过冷熔体中自由枝晶的生长速率由什么控制？",["A. 仅热扩散","B. 热扩散和溶质扩散共同控制（Ivantsov解+边缘稳定性判据）","C. 仅溶质扩散","D. 仅界面动力学"],"B","自由枝晶生长：Ivantsov传输解给出枝晶尖端过冷度与Peclet数的关系，边缘稳定性判据确定尖端半径ρ=√(d₀l_c)，二者结合→唯一确定生长速率和尖端半径。"],[0,"c6","共晶团（eutectic colony/cell）是如何形成的？",["A. 纯粹均匀生长","B. 当存在少量杂质或温度梯度时，共晶界面失稳形成","C. 只有单相生长","D. 非平衡相变"],"B","共晶团：杂质在共晶界面富集→成分过冷→界面失稳→形成胞状共晶（类似单相凝固的胞晶）。共晶团边界富集杂质，腐蚀后可见。"],[0,"c6","金属玻璃（非晶合金）形成能力(GFA)与什么关系最大？",["A. 密度","B. 约化玻璃转变温度T_rg=T_g/T_l（>0.6时易形成非晶）","C. 弹性模量","D. 磁性"],"B","GFA判据：(1)T_rg=T_g/T_l>0.6（Turnbull判据）；(2)临界冷却速度R_c（越低越易形成非晶）；(3)ΔT_x=T_x-T_g（过冷液相区宽度）。Zr基、Pd基合金GFA优秀。"],[0,"c6","定向凝固中，平界面生长的条件是？",["A. 高生长速率","B. G_L/R≥ΔT₀/D_L（温度梯度高、生长速率低）","C. 低温度梯度","D. 任意条件"],"B","平界面条件：G_L/R足够大→抑制成分过冷→界面保持平面。定向凝固涡轮叶片采用高G和低R获得平面或胞状生长，避免杂晶形成。"],[0,"c6","枝晶的一次臂间距λ₁主要取决于？",["A. 温度","B. G^(-1/2)R^(-1/4)（温度梯度和生长速率）","C. 合金成分","D. 初始晶粒度"],"B","λ₁∝G^(-a)R^(-b)，其中a≈0.5，b≈0.25。增大G或R减小枝晶间距→细化组织。二次臂间距λ₂∝t_f^(1/3)，t_f为局部凝固时间。"],[1,"c6","共晶合金凝固时，领先相总是体积分数较大的那一相。",[],"共晶凝固的领先相取决于形核过冷度，通常熔点较高的相先形核（在共晶温度附近过冷度较大），不一定是体积分数大的相。领先相形核后另一相在其上非均匀形核，然后两相协同生长。",""],[0,"c6","多孔材料在凝固中的一个应用是？",["A. 提高强度","B. 泡沫金属（通过熔体发泡法或渗流铸造法制备）","C. 提高密度","D. 提高导电性"],"B","泡沫金属制备：熔体发泡法（加发泡剂如TiH₂）、渗流铸造法（熔体渗入可溶预制体后溶出）、电沉积法等。泡沫铝用于吸能、减振、轻量化结构。"],[0,"c6","单晶高温合金叶片中的\"杂晶\"是如何形成的？",["A. 均匀形核","B. 枝晶臂局部重熔脱落成为新晶核","C. 成分偏析","D. 杂质"],"B","杂晶（freckle等）：定向凝固中枝晶间富溶质液相因密度差流动→局部区域成分变化→枝晶臂重熔→碎片成为新晶核→形成与主晶取向不同的杂晶。严格控制工艺参数可避免。"],[1,"c6","快速凝固（>10⁴K/s）可扩展固溶度、细化晶粒、形成亚稳相甚至非晶。",[],"快速凝固的非平衡效应：(1)扩展固溶度（如Al中溶解更多Fe）；(2)晶粒细化（~μm→nm）；(3)形成亚稳相（如Al-Mn准晶）；(4)抑制相变（非晶化）。常用甩带法（melt spinning）和雾化法。",""],[0,"c7","Ashby将材料的强化机制分为几类？",["A. 2类","B. 至少5类：固溶强化、位错强化、晶界强化、沉淀/弥散强化、相变强化等","C. 3类","D. 1类"],"B","Ashby强化机制分类：固溶强化（Δσ∝C^(1/2)或C^(2/3)）、位错强化（Taylor：Δτ=αGb√ρ）、晶界强化（Hall-Petch）、第二相强化（Orowan或切过）、相变强化（马氏体）、复合强化等。总流变应力≈线性叠加。"],[0,"c7","变形机制图（Deformation Mechanism Map）的坐标轴通常是什么？",["A. 应力-应变","B. 归一化应力(σ/G) - 同系温度(T/T_m)","C. 应变速率-温度","D. 时间-温度"],"B","变形机制图（Ashby图）：纵轴σ/G（归一化应力），横轴T/T_m。图中划分出不同主导机制的区域：低温位错滑移、位错蠕变（幂律蠕变）、扩散蠕变（N-H/Coble）、理论强度等。"],[0,"c7","金属材料在极低应变速率下的变形主要机制是？",["A. 位错滑移","B. 扩散蠕变（Nabarro-Herring或Coble蠕变）","C. 孪生","D. 相变"],"B","极低应变速率（<10⁻⁸/s）高温下，位错运动不足以满足变形速率→扩散蠕变主导→晶粒沿拉伸方向伸长。晶粒尺寸越小→Coble蠕变（晶界扩散）越重要。"],[0,"c7","晶界滑移在什么条件下变得显著？",["A. 低温和高应变速率","B. 高温（>0.5T_m）和低应变速率","C. 任何条件","D. 仅单晶中"],"B","晶界滑移在高温低应变速率下显著，是超塑性的主要变形机制（提供>50%变形量）。晶界滑移需晶界扩散、位错攀移等辅助机制协调，否则晶界三叉点会产生应力集中→孔洞。"],[0,"c7","材料的\"加工硬化指数n\"在Hollomon关系σ=Kε^n中的物理意义是？",["A. n越大，均匀变形能力越好（推迟颈缩）","B. n越大越脆","C. n与材料无关","D. n=1是弹性"],"A","Considére判据：颈缩发生在dσ/dε=σ时。对于σ=Kε^n，颈缩时ε=n。n越大→均匀延伸率越大→材料在拉伸时变形越均匀→深冲性能好。退火黄铜n≈0.5，高强度钢n≈0.1~0.15。"],[0,"c7","双相钢（DP钢，如铁素体+马氏体）的优良力学性能来源于？",["A. 单一相的作用","B. 软相（铁素体）提供塑性+硬相（马氏体）提供强度，变形时产生高的加工硬化率","C. 仅靠细晶","D. 仅靠固溶"],"B","DP钢（汽车用先进高强钢AHSS）：铁素体基体（延性）+岛状马氏体（强化）。变形时软相先屈服，硬相逐渐参与变形→持续高加工硬化率→高强度和良好塑性的结合。"],[0,"c7","TRIP钢（相变诱发塑性钢）的强化和增塑机制是？",["A. 仅细晶","B. 变形过程中残余奥氏体→马氏体相变→局部硬化延迟颈缩","C. 仅沉淀强化","D. 仅固溶"],"B","TRIP效应：变形诱发残余奥氏体→马氏体相变→局部区域硬化→颈缩被推迟→均匀延伸率提高。TRIP钢含C、Si/Mn/Al（抑制碳化物析出，保留残余奥氏体）。"],[1,"c7","固溶强化效果与溶质原子浓度成正比关系。",[],"固溶强化Δσ∝C^n，n≈0.5~1（取决于溶质类型和浓度范围）。稀薄固溶体中n≈1/2（Fleischer模型），较高浓度时偏离线性。不是简单的正比关系。",""],[0,"c7","Cu-Be合金（铍青铜）的高强度来源于？",["A. 仅固溶","B. 时效析出共格的富Be GP区/γ″相","C. 仅加工硬化","D. 仅细晶"],"B","Cu-Be合金（最高强度的铜合金之一）：固溶+淬火+时效(315°C)→共格GP区/γ″相→强度接近钢的水平，仍保持铜的良好导电性（用于电子接插件、弹簧）。"],[0,"c7","梯度结构材料（如梯度纳米结构金属）的力学性能优势是？",["A. 仅有表面硬","B. 梯度分布使强度与塑性兼得（表面高强+芯部高韧）","C. 与均匀材料相同","D. 仅提高塑性"],"B","梯度纳米结构（如表面机械研磨处理SMAT）：表层纳米晶→高强硬度，芯部粗晶→高塑性韧性。梯度过渡避免了纳米晶-粗晶间的应变失配，实现强度-塑性协同提升。"],[1,"c7","多晶体的屈服强度高于单晶体，因为晶界阻碍位错运动。",[],"多晶体中晶界阻碍位错从一晶粒传到相邻晶粒（Hall-Petch效应），且各晶粒取向不同→某些晶粒处于\"硬取向\"→需要更高的外应力才能普遍滑移。单晶只有一个取向，屈服较早。",""],[0,"c7","材料的高应变速率变形（如爆炸成形）可能出现什么特殊现象？",["A. 强度降低","B. 绝热剪切带（adiabatic shear band）","C. 塑性提高","D. 再结晶"],"B","高应变速率变形（>10³/s）的绝热效应：热量来不及散失→局部温升→软化→变形集中→绝热剪切带。ASB常见于高速冲击、切削、装甲穿透等场景。"],[0,"c8","J积分在弹塑性断裂力学中的作用是？",["A. 仅用于线弹性","B. 表征弹塑性材料裂纹尖端应力应变场的强度参数","C. 等于K_IC","D. 与裂纹长度无关"],"B","J积分由Rice提出，路径无关积分，适用于弹塑性断裂。J_IC为弹塑性断裂韧性，与K_IC的关系：J_IC=K_IC²(1-ν²)/E（小范围屈服）。J积分还用于描述蠕变裂纹扩展（C*参数）。"],[0,"c8","裂纹尖端张开位移(CTOD/δ)断裂判据适用于什么情况？",["A. 仅线弹性","B. 弹塑性断裂（大范围屈服），如焊接结构的缺陷评定","C. 仅蠕变","D. 仅疲劳"],"B","CTOD（δ，裂纹尖端张开位移）由Wells提出，适用于弹塑性断裂。临界值δ_c为材料韧性指标。常用于焊接结构缺陷安全评定（BS 7448、API 1104等标准）。"],[0,"c8","R曲线（阻力曲线）描述的是什么？",["A. 应力-应变关系","B. 裂纹扩展阻力随裂纹扩展量的变化","C. 硬度分布","D. 温度-强度关系"],"B","R曲线（J_R-Δa曲线或K_R-Δa曲线）：表征材料对裂纹扩展的阻力随裂纹扩展量的增加而增大（因塑性区增大和裂纹尖端钝化等）。撕裂模量T=(E/σ₀²)(dJ/da)反映稳定扩展能力。"],[0,"c8","动态断裂韧性K_Id通常与静态K_IC相比如何？",["A. 总是更大","B. 在高加载速率下K_Id通常低于K_IC","C. 完全相同","D. 总是更小"],"B","高加载速率下BCC金属（钢）的K_Id<K_IC（因Peierls力对温度/速率敏感→局部脆化），而FCC金属和铝合金的速率敏感性小，K_Id≈K_IC。这是结构抗冲击设计的重要考虑。"],[0,"c8","声发射(AE)技术用于监测材料的什么？",["A. 温度变化","B. 材料内部损伤演化（裂纹扩展、塑性变形等发出的应力波）","C. 成分","D. 密度"],"B","声发射（Acoustic Emission）：材料变形和断裂时释放的弹性波被传感器检测。用于实时监测压力容器、桥梁、复合材料的损伤演化，定位缺陷位置。"],[0,"c8","纳米压痕技术可以测量材料的什么性质？",["A. 仅硬度","B. 硬度和弹性模量（通过Oliver-Pharr方法），还可测蠕变、断裂韧性","C. 仅弹性模量","D. 仅导电性"],"B","纳米压痕（nanoindentation）：Berkovich金刚石压头（三棱锥），载荷分辨率nN级，压深nm级。Oliver-Pharr方法从卸载曲线斜率得到约化模量E_r→弹性模量。可测薄膜、微区、晶粒内的力学性能。"],[0,"c8","小冲杆试验(SPT)的优点是什么？",["A. 需要大量样品","B. 微损取样，可从在役构件上获取力学性能（屈服、抗拉、韧脆转变温度等）","C. 只测硬度","D. 仅用于塑料"],"B","小冲杆试验（Small Punch Test）：微小圆片样品（φ3~10mm×0.25~0.5mm）→冲压加载→载荷-位移曲线→关联标准拉伸和断裂韧性数据。用于在役设备剩余寿命评估。"],[0,"c8","材料的高周疲劳(HCF)和低周疲劳(LCF)的分界通常是？",["A. 10³次循环","B. 约10⁴~10⁵次循环","C. 10⁷次循环","D. 10²次循环"],"B","HCF（高周疲劳）：>10⁴~10⁵次，应力低于屈服，弹性应变为主，Basquin关系σ_a=σ_f'(2N_f)^b。LCF（低周疲劳）：<10⁴~10⁵次，应力接近或超过屈服，塑性应变为主，Coffin-Manson关系Δε_p/2=ε_f'(2N_f)^c。"],[0,"c8","平均应力对疲劳寿命的影响通常用哪个公式描述？",["A. Hall-Petch","B. Goodman关系或Gerber关系","C. Paris公式","D. Griffith公式"],"B","Goodman：σ_a/σ_{-1}+σ_m/σ_b=1（线性，偏保守）。Gerber：σ_a/σ_{-1}+(σ_m/σ_b)²=1（抛物线）。拉伸平均应力↓疲劳寿命，压缩平均应力↑疲劳寿命（表面强化处理如喷丸的根据）。"],[0,"c8","腐蚀疲劳与纯疲劳的关键区别是？",["A. 没有区别","B. 腐蚀疲劳无疲劳极限（即使钢铁也无明确σ_{-1}），裂纹多源于表面腐蚀坑","C. 腐蚀疲劳强度更高","D. 腐蚀疲劳只在高温发生"],"B","腐蚀疲劳：交变应力+腐蚀环境协同作用→远低于空中疲劳强度。无明确疲劳极限（随循环次数强度持续降低），断口多裂纹源、有腐蚀产物。防护：表面涂层、阴极保护、缓蚀剂。"],[0,"c8","\"高温合金\"（superalloy）在高温下保持高强度的主要强化机制是？",["A. 加工硬化","B. 共格γ'-Ni₃(Al,Ti)相的沉淀强化","C. 细晶强化","D. 固溶强化为主"],"B","Ni基高温合金：FCC γ基体中析出共格有序L1₂结构的γ'-Ni₃(Al,Ti)相→共格应变强化+有序强化+Orowan绕过。γ'体积分数可达60~70%（如CMSX-10），高温(>1000°C)仍保持高强度。"],[1,"c8","陶瓷材料在压缩状态下的强度远高于拉伸状态。",[],"陶瓷的压缩强度通常是拉伸强度的5~15倍。原因：拉伸时Griffith裂纹/缺陷被拉开→应力集中→低应力断裂；压缩时裂纹闭合或沿与加载方向成角度的方向扩展→应力远高于拉伸。这是陶瓷设计应尽量使其处于受压状态的原因。",""],[0,"c9","直接带隙半导体和间接带隙半导体的主要区别是？",["A. 颜色不同","B. 直接带隙中电子跃迁不需要声子参与（效率高，适合发光），间接带隙需要声子辅助（效率低）","C. 带隙大小不同","D. 没有区别"],"B","直接带隙（GaAs、InP、GaN）：导带底和价带顶在k空间同一点→电子跃迁仅需光子→发光效率高（LED、激光器）。间接带隙（Si、Ge）：需要声子辅助→发光效率极低（Si不能做高效LED）。"],[0,"c9","光纤通信中，光信号在光纤中传输的基本原理是？",["A. 直线传播","B. 全内反射（纤芯折射率>包层折射率）","C. 衍射","D. 干涉"],"B","光纤（SiO₂基）：纤芯折射率n₁>包层折射率n₂→光在芯/包界面发生全内反射→沿光纤传播。单模光纤芯径小(~9μm)传输单一模式，多模光纤芯径大(~50μm)。Rayleigh散射和红外吸收是主要损耗。"],[0,"c9","LED（发光二极管）的发光颜色（波长）由什么决定？",["A. 电流大小","B. 半导体材料的禁带宽度E_g（λ=hc/E_g）","C. 温度","D. 电压"],"B","LED发光波长λ(nm)≈1240/E_g(eV)。GaN(蓝光，E_g≈3.4eV)→λ≈365nm；GaAs(红外)→λ≈870nm。白光LED：蓝光LED+黄色荧光粉(YAG:Ce³⁺)或RGB三色混合。"],[0,"c9","太阳能电池（光伏电池）的基本工作原理是？",["A. 光的热效应","B. 光伏效应：光照产生电子-空穴对→p-n结内建电场分离载流子→外电路电流","C. 化学反应","D. 压电效应"],"B","光伏电池（Si主流）：p-n结区吸收光子(hν>E_g)→电子-空穴对→内建电场分离→电子向n区、空穴向p区→外电路产生电力。效率受Shockley-Queisser极限约束（Si单结~29%）。"],[0,"c9","热电材料性能的优值ZT=S²σT/κ中，S、σ、κ分别代表什么？",["A. S熵, σ强度, κ弹性","B. S-Seebeck系数(V/K), σ-电导率, κ-热导率","C. S-面积, σ-密度, κ-热容","D. S-应力, σ-电导, κ-硬度"],"B","ZT=S²σT/κ，其中S为Seebeck系数（温差电势），σ为电导率，κ为热导率（κ=κ_e+κ_lattice电子+声子贡献）。理想热电材料：\"声子玻璃-电子晶体\"（PGEC）——低声子热导+高电子导电。"],[0,"c9","GMR（巨磁阻效应）的基本原理是什么？",["A. 磁致伸缩","B. 磁性多层膜中，相邻铁磁层磁矩平行→低电阻，反平行→高电阻","C. 超导效应","D. 霍尔效应"],"B","GMR（2007诺贝尔物理学奖）：Fe/Cr等多层膜中自旋相关散射→相邻铁磁层磁化方向平行时电阻低、反平行时电阻高→MR比值可达数十%。应用于硬盘读头、MRAM等。"],[0,"c9","燃料电池中，固体氧化物燃料电池(SOFC)的电解质材料通常是什么？",["A. 聚合物膜","B. 氧化钇稳定的氧化锆(YSZ)","C. 液态酸","D. 金属"],"B","SOFC（工作温度600~1000°C）：YSZ电解质（O²⁻离子导体），Ni-YSZ阳极，LaMnO₃基阴极。高温运行→不需贵金属催化剂→可直接用天然气重整气。PEMFC则用Nafion膜(<100°C运行)。"],[0,"c9","锂离子电池正极材料LiCoO₂的结构类型是？",["A. 尖晶石","B. 层状α-NaFeO₂结构（R3̄m空间群）","C. 橄榄石","D. 钙钛矿"],"B","LiCoO₂（LCO）：层状结构，CoO₂层间嵌入Li⁺（二维扩散通道）。LiFePO₄（LFP）：橄榄石结构（一维扩散通道）。LiMn₂O₄（LMO）：尖晶石结构（三维通道）。结构与电化学性能密切相关。"],[0,"c9","生物医用钛合金（如Ti-6Al-4V ELI）最关键的生物相容性要求是？",["A. 高强度","B. 低弹性模量（接近骨骼~30GPa）+无毒性元素释放","C. 高密度","D. 高硬度"],"B","生物医用钛合金要求：(1)低弹性模量（避免应力屏蔽→骨吸收）；(2)无毒无过敏（避免V、Al释放→开发Ti-Nb、Ti-Mo、Ti-Ta等β钛合金）；(3)良好耐腐蚀；(4)骨整合能力。"],[0,"c9","\"超疏水表面\"（如荷叶效应）的接触角通常需大于？",["A. 90°","B. 150°","C. 120°","D. 180°"],"B","超疏水表面：接触角>150°，滚动角<10°。源于表面微观/纳米粗糙结构+低表面能化学修饰。Cassie-Baxter状态（空气垫在液滴下）比Wenzel状态（液滴浸入粗糙结构）更疏水。"],[0,"c9","自修复材料的常见修复机制不包括？",["A. 微胶囊释放修复剂","B. 动态共价键或超分子作用可逆交联","C. 形状记忆辅助闭合","D. 晶粒长大"],"D","自修复机制：(1)微胶囊/微血管网络（释放单体+催化剂）；(2)动态化学键（Diels-Alder反应、二硫键等）；(3)超分子作用（氢键、金属-配体配位）；(4)热可逆/光可逆交联。晶粒长大是金属学过程，非自修复机制。"],[0,"c9","量子点(Quantum Dot)的发光颜色随粒径减小而？",["A. 红移","B. 蓝移（量子尺寸效应→有效带隙增大）","C. 不变","D. 先红移后蓝移"],"B","量子点（CdSe、InP等）粒径<激子玻尔半径(~5-10nm)→量子限域效应→有效带隙随粒径减小而增大→发光蓝移。尺寸可调的发光颜色是量子点最大的特色（用于QLED显示、生物荧光标记）。"],[1,"c9","透明导电氧化物(TCO，如ITO)既透明又导电，是因为其带隙大于可见光能量，同时又具有高载流子浓度。",[],"ITO（In₂O₃:Sn，Sn掺杂In₂O₃）：E_g>3eV→可见光透明；Sn替代In提供自由电子→n型导电→ρ低至~10⁻⁴Ω·cm。FTO（F:SnO₂）和AZO（Al:ZnO）是替代材料。核心矛盾：提高载流子浓度有助于导电但增加自由载流子吸收→降低红外透过率。",""],[1,"c5","钢中马氏体的硬度主要取决于其含碳量，碳含量越高马氏体越硬。",[],"马氏体硬度随碳含量增加而升高（C<0.6%时线性增加，之后趋缓）。碳原子固溶在BCT结构的八面体间隙中→强烈晶格畸变→阻碍位错运动。0.1%C马氏体硬度~40HRC，0.6%C马氏体~65HRC。",""],[1,"c7","冷变形金属在加热时，回复、再结晶和晶粒长大三个过程是完全独立、依次进行的。",[],"这三个过程有重叠：回复后期可能已有再结晶核形成；再结晶后期新晶粒已开始长大。它们都是变形储存能驱动的热激活过程，不是严格按先后顺序完全独立的。",""],[0,"c9","石墨烯(Graphene)的优异性能源于其什么结构特征？",["A. 三维网络结构","B. 单层sp²杂化碳原子构成的二维蜂窝状晶格","C. 多层堆积","D. 非晶结构"],"B","石墨烯（2010诺贝尔物理学奖）：单层碳原子sp²杂化→二维六角蜂窝结构。特点：超高载流子迁移率(>200000cm²/V·s)、极高强度(~130GPa)、优异导热(~5000W/m·K)、完全透光(~97.7%)、超大比表面积。"],[2,"c1","表征原子核外电子运动状态的四个量子数分别是______、______、______、______",[],"主量子数 ，角量子数 ，磁量子数 ，自旋量子数 。",""],[2,"c1","Al（原子序数为13）的基态电子组态是______",[],"。",""],[0,"c1","化学键中通过共用电子对形成的是",["A. 共价键","B. 离子键","C. 金属键"],"A","A"],[3,"c1","下列结合键中，既有饱和性又有方向性的是",["A. 金属键","B. 共价键","C. 离子键","D. 氢键"],"A","B、D\n2.1 晶体学基础\n2.1.1 空间点阵\n2.1.2 晶胞\n2.1.3 晶系与布拉维点阵\n2.1.1 空间点阵"],[1,"c2","四方晶系有简单四方、体心四方、底心四方、面心四方点阵。（",[],"错","×"],[2,"c2","三种典型的金属晶体结构的配位数分别是多少？",[],"面心立方（FCC）：12；体心立方（BCC）：8；密排六方（HCP）：12。",""],[0,"c2","简单立方晶体中
